name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ansible-lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"
      - name: Run ansible-lint
        run: |
          source /opt/ansible-runner/venv/bin/activate
          # Unset VIRTUAL_ENV so ansible-compat doesn't attempt to cache into
          # the read-only system venv; it falls back to .ansible/ in the project dir.
          unset VIRTUAL_ENV
          ANSIBLE_VAULT_PASSWORD_FILE="$RUNNER_TEMP/vault-pass" ansible-lint playbooks/

  yamllint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Run yamllint
        # Covers the GitOps service payload under playbooks/provision/files/,
        # which ansible-lint deliberately excludes. Lenient by design — see
        # .yamllint — so it flags only deploy-breaking errors (unparsable
        # YAML, duplicate keys), not cosmetic style.
        run: |
          source /opt/ansible-runner/venv/bin/activate
          unset VIRTUAL_ENV
          yamllint .

  config-validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Validate Docker Compose schemas
        # --no-interpolate validates structure without substituting the
        # vault-derived env vars (which aren't present in CI).
        run: |
          rc=0
          while IFS= read -r f; do
            if docker compose -f "$f" config --no-interpolate -q; then
              echo "[ok] $f"
            else
              echo "[FAIL] $f"
              rc=1
            fi
          done < <(find playbooks/provision/files -name docker-compose.yml | sort)
          exit $rc
      - name: Validate Grafana dashboard JSON
        run: |
          rc=0
          while IFS= read -r f; do
            if jq empty "$f" 2>/dev/null; then
              echo "[ok] $f"
            else
              echo "[FAIL] $f"
              rc=1
            fi
          done < <(find playbooks/provision/files -name '*.json' | sort)
          exit $rc

  deploy-coverage:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Check deploy filter covers all services
        run: scripts/check-deploy-coverage.sh

  prometheus-validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Validate Prometheus alerting rules
        run: promtool check rules playbooks/provision/files/monitoring/prometheus/rules/*.yml
      - name: Validate Alertmanager config
        # The config is a Jinja template; substitute every {{ ... }} with a
        # placeholder so amtool can check the structure without vault values.
        run: |
          tmp=$(mktemp)
          sed -E 's#\{\{[^}]*\}\}#http://example.invalid/placeholder#g' \
            playbooks/provision/templates/monitoring/alertmanager.yml.j2 > "$tmp"
          amtool check-config "$tmp"
          rm -f "$tmp"

  shellcheck:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Run shellcheck
        # The runner's shellcheck is 0.10.0, which flags SC2015 on the benign
        # `[[ -z x ]] && x=... || true` set-e guards in pull-secrets.sh (0.11.0
        # dropped that). Exclude only SC2015 and keep default severity so
        # info-level checks like SC2086 (unquoted vars) stay enforced.
        run: shellcheck --exclude=SC2015 scripts/*.sh

  k8s-validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Build and validate k8s manifests
        # kustomize build catches missing file references and broken overlays.
        # kubeconform validates the rendered manifests against the k8s 1.32 API
        # schema (-strict rejects unknown fields; -ignore-missing-schemas skips
        # any CRDs we haven't registered schemas for rather than hard-failing).
        # flux-system is bootstrapped by Flux itself and contains Flux CRDs not
        # in the standard schema catalog — skip it.
        run: |
          fail=0
          for root in k8s/apps k8s/infrastructure; do
            echo "=== kustomize build ${root} ==="
            if ! kustomize build "${root}" \
                | kubeconform \
                    -strict \
                    -ignore-missing-schemas \
                    -kubernetes-version 1.32.0 \
                    -summary; then
              echo "FAIL: ${root}"
              fail=1
            fi
          done
          exit $fail

  terraform:
    runs-on: self-hosted
    env:
      TF_PLUGIN_CACHE_DIR: /opt/terraform-plugin-cache
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Check Terraform formatting
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Validate Terraform configuration
        run: |
          cd terraform
          terraform init -backend=false -input=false
          terraform validate
