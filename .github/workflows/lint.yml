name: Lint

on:
  pull_request:
    branches: [main]
  push:
    # Re-validate main after merge so the README status badge reflects the
    # default branch, not just the last PR.
    branches: [main]
  workflow_dispatch:

jobs:
  ansible-lint:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"
      - name: Run ansible-lint
        run: |
          source /opt/ansible-runner/venv/bin/activate
          # Unset VIRTUAL_ENV so ansible-compat doesn't attempt to cache into
          # the read-only system venv; it falls back to .ansible/ in the project dir.
          unset VIRTUAL_ENV
          ANSIBLE_VAULT_PASSWORD_FILE="$RUNNER_TEMP/vault-pass" ansible-lint playbooks/

  yamllint:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Run yamllint
        # Covers the GitOps service payload under playbooks/provision/files/,
        # which ansible-lint deliberately excludes. Lenient by design — see
        # .yamllint — so it flags only deploy-breaking errors (unparsable
        # YAML, duplicate keys), not cosmetic style.
        run: |
          source /opt/ansible-runner/venv/bin/activate
          unset VIRTUAL_ENV
          yamllint .
      - name: Lint YAML-structured Jinja2 templates
        # yamllint skips .j2 files when given a directory; lint pure-YAML
        # templates explicitly. Jinja-only templates (env files, conf files)
        # are excluded — only Compose/YAML-structured ones belong here.
        run: |
          source /opt/ansible-runner/venv/bin/activate
          unset VIRTUAL_ENV
          yamllint playbooks/provision/templates/musicbrainz/memory-settings.yml.j2

  config-validate:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Validate Docker Compose schemas
        # --no-interpolate validates structure without substituting the
        # vault-derived env vars (which aren't present in CI).
        run: |
          rc=0
          while IFS= read -r f; do
            if docker compose -f "$f" config --no-interpolate -q; then
              echo "[ok] $f"
            else
              echo "[FAIL] $f"
              rc=1
            fi
          done < <(find playbooks/provision/files -name docker-compose.yml | sort)
          exit $rc
      - name: Validate Grafana dashboard JSON
        run: |
          rc=0
          while IFS= read -r f; do
            if jq empty "$f" 2>/dev/null; then
              echo "[ok] $f"
            else
              echo "[FAIL] $f"
              rc=1
            fi
          done < <(find playbooks/provision/files -name '*.json' | sort)
          exit $rc

  deploy-coverage:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Check deploy filter covers all services
        run: scripts/check-deploy-coverage.sh

  talos-rpi5-overlay:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Check Image Factory serves rpi_5 for the pinned Talos version
        # Overlay releases can lag a Talos patch release by a few days
        # (siderolabs/talos#12748); merging a version bump before the overlay
        # exists would strand the Pi nodes. Also catches drift between
        # terraform.tfvars and the installer tags in talos/patches/.
        run: scripts/check-talos-rpi5-overlay.sh

  prometheus-validate:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Validate Prometheus alerting rules
        run: promtool check rules playbooks/provision/files/monitoring/prometheus/rules/*.yml
      - name: Validate Alertmanager config
        # The config is a Jinja template; substitute every {{ ... }} with a
        # placeholder so amtool can check the structure without vault values.
        run: |
          tmp=$(mktemp)
          sed -E 's#\{\{[^}]*\}\}#http://example.invalid/placeholder#g' \
            playbooks/provision/templates/monitoring/alertmanager.yml.j2 > "$tmp"
          amtool check-config "$tmp"
          rm -f "$tmp"

  shellcheck:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Run shellcheck
        # The runner's shellcheck is 0.10.0, which flags SC2015 on the benign
        # `[[ -z x ]] && x=... || true` set-e guards in pull-secrets.sh (0.11.0
        # dropped that). Exclude only SC2015 and keep default severity so
        # info-level checks like SC2086 (unquoted vars) stay enforced.
        run: shellcheck --exclude=SC2015 scripts/*.sh

  k8s-validate:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Build and validate k8s manifests
        # kustomize build catches missing file references and broken overlays.
        # kubeconform validates the rendered manifests against the k8s 1.32 API
        # schema (-strict rejects unknown fields; -ignore-missing-schemas skips
        # any CRDs we haven't registered schemas for rather than hard-failing).
        # flux-system is bootstrapped by Flux itself and contains Flux CRDs not
        # in the standard schema catalog — skip it.
        run: |
          fail=0
          for root in k8s/apps k8s/infrastructure; do
            echo "=== kustomize build ${root} ==="
            if ! kustomize build "${root}" \
                | kubeconform \
                    -strict \
                    -ignore-missing-schemas \
                    -kubernetes-version 1.32.0 \
                    -summary; then
              echo "FAIL: ${root}"
              fail=1
            fi
          done
          exit $fail

  helm-render:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Render HelmReleases and validate the output
        # kustomize build (the k8s-validate job) passes Flux HelmRelease CRs
        # through opaquely — it never invokes Helm — so the Deployments,
        # Services and PVCs the bjw-s app-template chart actually renders are
        # otherwise unvalidated. flux-local resolves each HelmRelease against
        # its (public OCI) HelmRepository, runs helm template, and we pipe the
        # rendered manifests through kubeconform against the k8s 1.32 schema.
        run: |
          flux-local test --enable-helm --path k8s/flux-system --kube-version 1.32.0
          flux-local build all --enable-helm --output-file "$RUNNER_TEMP/rendered.yaml" k8s/flux-system
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -kubernetes-version 1.32.0 \
            -summary \
            "$RUNNER_TEMP/rendered.yaml"
      - name: Check no workload owns its own PVC
        # Data-safety contract: every config/state PVC must be a raw, Flux-owned
        # manifest bound via existingClaim, never created by the app-template
        # chart (which Flux would then prune → data loss). Reuses the render
        # above to avoid a second helm pull.
        run: scripts/check-helm-pvc-safety.sh "$RUNNER_TEMP/rendered.yaml"

  talos-config-validate:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Render and validate Talos machine configs
        # Generates each control-plane machine config from talos/patches/ with
        # throwaway secrets and runs `talosctl validate -m metal`. Catches a
        # malformed patch (bad field, broken interface/VIP) before it reaches a
        # node — the VM/network surface the docker integration test can't cover.
        run: scripts/check-talos-config.sh

  tofu:
    runs-on: arc-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Check OpenTofu formatting
        run: tofu -chdir=terraform fmt -check -recursive
      - name: Validate OpenTofu configuration
        run: |
          cd terraform
          tofu init -backend=false -input=false
          tofu validate
