name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_musicbrainz:
        description: 'Force deploy musicbrainz'
        type: boolean
        default: false
      force_lidarr_ui:
        description: 'Force rebuild/deploy lidarr-ui'
        type: boolean
        default: false

# Serialize deploys: never let two ansible runs hit the same hosts at once.
# Queue rather than cancel — interrupting a half-applied playbook is worse
# than waiting.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: self-hosted
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
      vps: ${{ steps.filter.outputs.vps }}
      pve: ${{ steps.filter.outputs.pve }}
      k8s: ${{ steps.filter.outputs.k8s }}
      tofu: ${{ steps.filter.outputs.tofu }}
      mcp: ${{ steps.filter.outputs.mcp }}
      lidarr_ui: ${{ steps.filter.outputs.lidarr_ui }}
      ci_runner: ${{ steps.filter.outputs.ci_runner }}
      adguard: ${{ steps.filter.outputs.adguard }}
      musicbrainz: ${{ steps.filter.outputs.musicbrainz }}
      foundry: ${{ steps.filter.outputs.foundry }}
    steps:
      # fetch-depth 2 so paths-filter has a parent commit to diff against on
      # workflow_dispatch runs — with the default shallow (depth 1) checkout
      # and no `base`, it can't resolve a diff at all and falls back to
      # treating every tracked file as newly added, marking every filter
      # (and therefore every deploy job) as changed regardless of what was
      # actually touched.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          base: ${{ github.event.before || 'HEAD~1' }}
          filters: |
            docker:
              - 'playbooks/provision/files/docker/**'
              - 'playbooks/provision/files/seedbox/**'
              - 'playbooks/provision/files/scrutiny/**'
              - 'playbooks/update_docker.yml'
            monitoring:
              - 'playbooks/provision/monitoring.yml'
              - 'playbooks/provision/files/monitoring/**'
              - 'playbooks/provision/templates/monitoring/**'
            vps:
              - 'playbooks/provision/vps.yml'
              - 'playbooks/provision/files/vps/**'
              - 'playbooks/provision/templates/wireguard/**'
            pve:
              - 'playbooks/provision/pve.yml'
              - 'playbooks/provision/templates/pve/**'
            k8s:
              - 'playbooks/provision/k8s.yml'
              - 'playbooks/provision/templates/k8s/**'
            tofu:
              - 'terraform/**'
            mcp:
              - 'mcp/**'
            lidarr_ui:
              - 'lidarr-ui/**'
            ci_runner:
              - 'ci/runner/**'
            adguard:
              - 'playbooks/provision/adguard.yml'
              - 'playbooks/provision/templates/adguard/**'
            musicbrainz:
              - 'playbooks/provision/musicbrainz.yml'
              - 'playbooks/provision/templates/musicbrainz/**'
            foundry:
              - 'playbooks/provision/foundry.yml'
              - 'playbooks/provision/files/foundry/**'
              - 'playbooks/provision/templates/foundry/**'

  deploy-musicbrainz:
    needs: changes
    if: needs.changes.outputs.musicbrainz == 'true' || inputs.force_musicbrainz == true
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run musicbrainz playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/musicbrainz.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit musicbrainz

  deploy-adguard:
    needs: changes
    if: needs.changes.outputs.adguard == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run adguard playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/adguard.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit 'adguard,dns-secondary'

  deploy-foundry:
    needs: changes
    if: needs.changes.outputs.foundry == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run foundry playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/foundry.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit foundry

  deploy-docker:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run update_docker playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/update_docker.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no"

  deploy-monitoring:
    needs: changes
    if: needs.changes.outputs.monitoring == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run monitoring playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/monitoring.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit monitoring

  deploy-vps:
    needs: changes
    if: needs.changes.outputs.vps == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run vps playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/vps.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit vps-proxy

  deploy-pve:
    needs: changes
    if: needs.changes.outputs.pve == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run pve playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/pve.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit pve

  deploy-tofu:
    needs: changes
    if: needs.changes.outputs.tofu == 'true'
    runs-on: self-hosted
    env:
      TF_PLUGIN_CACHE_DIR: /opt/terraform-plugin-cache
      TF_STATE_DIR: /opt/terraform-state/nest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write secrets.tfvars
        env:
          TF_SECRETS: ${{ secrets.TF_SECRETS_TFVARS }}
        run: |
          printf '%s' "$TF_SECRETS" > terraform/secrets.tfvars
          chmod 600 terraform/secrets.tfvars

      - name: Restore OpenTofu state
        # Fail hard if the state is missing: applying with an empty state
        # re-creates every resource (duplicated AdGuard rewrites and orphaned
        # the gamma VM on 2026-06-11 when saves had been silently failing).
        run: |
          if [ ! -f "$TF_STATE_DIR/terraform.tfstate" ]; then
            echo "::error::No OpenTofu state at $TF_STATE_DIR — refusing a stateless apply. Restore the state manually first."
            exit 1
          fi
          cp "$TF_STATE_DIR/terraform.tfstate" terraform/terraform.tfstate
          cp "$TF_STATE_DIR/terraform.tfstate.backup" terraform/terraform.tfstate.backup 2>/dev/null || true

      - name: Open VPS AdGuard tunnel
        run: |
          ssh -f -N -L 13000:localhost:3000 \
            -i "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o ExitOnForwardFailure=yes \
            root@66.42.79.175
          for _ in $(seq 1 10); do nc -z 127.0.0.1 13000 2>/dev/null && break; sleep 1; done

      - name: OpenTofu init
        run: tofu -chdir=terraform init -input=false

      - name: OpenTofu apply
        run: |
          tofu -chdir=terraform apply -var-file=secrets.tfvars -auto-approve -input=false \
            2>&1 | tee "$RUNNER_TEMP/tofu-apply.log"

      - name: Notify on Vultr API IP allowlist block
        # tofu apply fails at plan/refresh time for ALL resources (not just
        # Vultr's) whenever Vultr's account-level API Access Control rejects
        # the runner's current egress IP — a silent CI-only failure otherwise.
        # Pushed into Alertmanager (not HA directly) to reuse the existing
        # severity routing/repeat-interval/grouping instead of a bespoke path.
        # See 2026-07-15 Talos v1.13.6 deploy failure.
        if: failure()
        run: |
          LOG="$RUNNER_TEMP/tofu-apply.log"
          if [ -f "$LOG" ] && grep -q "Unauthorized IP address" "$LOG"; then
            IP=$(grep -oP 'Unauthorized IP address: \K[0-9.]+' "$LOG" | head -1)
            curl -sf -X POST "http://192.168.1.44:9093/api/v2/alerts" \
              -H "Content-Type: application/json" \
              -d "[{\"labels\":{\"alertname\":\"VultrAPIBlocked\",\"severity\":\"warning\",\"instance\":\"ci\"},\"annotations\":{\"summary\":\"Vultr API blocked CI deploy\",\"description\":\"tofu apply failed: Vultr rejected CI IP ${IP}. Add it under Account > API > Access Control in the Vultr console.\"}}]" \
              || echo "::warning::Failed to push VultrAPIBlocked alert to Alertmanager"
          fi

      - name: Upgrade Talos nodes if version changed
        env:
          TALOSCONFIG_DATA: ${{ secrets.TALOSCONFIG }}
        run: |
          install -d -m 700 "$RUNNER_TEMP/.talos"
          printf '%s' "$TALOSCONFIG_DATA" > "$RUNNER_TEMP/.talos/config"
          chmod 600 "$RUNNER_TEMP/.talos/config"
          TC="$RUNNER_TEMP/.talos/config"

          TARGET=$(grep 'talos_version' terraform/terraform.tfvars | grep -oP 'v[\d.]+')
          SCHEMATIC=$(grep 'talos_schematic_id' terraform/terraform.tfvars | grep -oP '"[a-f0-9]+"' | tr -d '"')
          IMAGE="factory.talos.dev/installer/${SCHEMATIC}:${TARGET}"

          curl -sL "https://github.com/siderolabs/talos/releases/download/${TARGET}/talosctl-linux-amd64" \
            -o "$RUNNER_TEMP/talosctl"
          chmod +x "$RUNNER_TEMP/talosctl"
          TALOSCTL="$RUNNER_TEMP/talosctl"

          for NODE in 192.168.1.110; do
            RUNNING=$("$TALOSCTL" --talosconfig "$TC" version --nodes "$NODE" 2>/dev/null | awk '/Tag:/{print $2}' | tail -1)
            if [ "$RUNNING" != "$TARGET" ]; then
              echo "Upgrading $NODE: $RUNNING → $TARGET"
              "$TALOSCTL" --talosconfig "$TC" upgrade --nodes "$NODE" --image "$IMAGE" --wait
            else
              echo "$NODE already on $TARGET, skipping"
            fi
          done

      - name: Save OpenTofu state
        # No error suppression here: the runner user must be able to write
        # $TF_STATE_DIR (it silently could not between 06-11 and 06-12, so
        # every apply ran against a stale state). A failed save fails the job.
        if: always()
        run: |
          pkill -f "ssh -f -N -L 13000" 2>/dev/null || true
          cp terraform/terraform.tfstate "$TF_STATE_DIR/terraform.tfstate"
          cp terraform/terraform.tfstate.backup "$TF_STATE_DIR/terraform.tfstate.backup" 2>/dev/null || true

  deploy-k8s:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Write kubeconfig
        run: |
          install -d -m 700 "$RUNNER_TEMP/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_TALOS }}" > "$RUNNER_TEMP/.kube/config"
          chmod 600 "$RUNNER_TEMP/.kube/config"

      - name: Apply k8s secrets
        env:
          KUBECONFIG: "${{ runner.temp }}/.kube/config"
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/k8s.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass"

  build-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Multi-arch (amd64+arm64) so this can schedule onto beta-rpi5/gamma-rpi5 —
      # plain python:3.14-slim base with no arch-specific deps, so no emulation
      # surprises expected.
      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: mcp/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/arishaig/nest-mcp:latest

  deploy-mcp:
    needs: [changes, build-mcp]
    if: needs.changes.outputs.mcp == 'true'
    runs-on: self-hosted
    steps:
      - name: Write kubeconfig
        run: |
          install -d -m 700 "$RUNNER_TEMP/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_TALOS }}" > "$RUNNER_TEMP/.kube/config"
          chmod 600 "$RUNNER_TEMP/.kube/config"

      - name: Rollout restart
        env:
          KUBECONFIG: "${{ runner.temp }}/.kube/config"
        run: |
          if kubectl get deployment/nest-mcp -n nest-mcp &>/dev/null; then
            kubectl rollout restart deployment/nest-mcp -n nest-mcp
          else
            echo "Deployment not yet created by Flux — skipping rollout restart"
          fi

  build-lidarr-ui:
    needs: changes
    if: needs.changes.outputs.lidarr_ui == 'true' || inputs.force_lidarr_ui == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Multi-arch (amd64+arm64) so this can schedule onto beta-rpi5 — plain
      # python:3.14-slim base with no arch-specific deps, so no emulation
      # surprises expected.
      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: lidarr-ui/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/arishaig/lidarr-ui:latest

  deploy-lidarr-ui:
    needs: [changes, build-lidarr-ui]
    if: needs.changes.outputs.lidarr_ui == 'true' || inputs.force_lidarr_ui == true
    runs-on: self-hosted
    steps:
      - name: Write kubeconfig
        run: |
          install -d -m 700 "$RUNNER_TEMP/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_TALOS }}" > "$RUNNER_TEMP/.kube/config"
          chmod 600 "$RUNNER_TEMP/.kube/config"

      - name: Rollout restart
        env:
          KUBECONFIG: "${{ runner.temp }}/.kube/config"
        run: |
          if kubectl get deployment/lidarr-ui -n media &>/dev/null; then
            kubectl rollout restart deployment/lidarr-ui -n media
          else
            echo "Deployment not yet applied by Flux — skipping rollout restart"
          fi

  # Custom runner image for the ARC arc-lint scale set. Built on a
  # GitHub-hosted runner (cluster-independent — no bootstrap loop), pushed to
  # GHCR. ARC pulls :latest per ephemeral pod (imagePullPolicy Always), so no
  # rollout step is needed — the next lint job picks up the new image.
  build-ci-runner:
    needs: changes
    if: needs.changes.outputs.ci_runner == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t ghcr.io/arishaig/nest-ci-runner:latest ci/runner/
          docker push ghcr.io/arishaig/nest-ci-runner:latest
