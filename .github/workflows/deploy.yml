name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys: never let two ansible runs hit the same hosts at once.
# Queue rather than cancel — interrupting a half-applied playbook is worse
# than waiting.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: self-hosted
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
      vps: ${{ steps.filter.outputs.vps }}
      pve: ${{ steps.filter.outputs.pve }}
      k8s: ${{ steps.filter.outputs.k8s }}
      terraform: ${{ steps.filter.outputs.terraform }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            docker:
              - 'playbooks/provision/files/docker/**'
              - 'playbooks/provision/files/seedbox/**'
              - 'playbooks/provision/files/scrutiny/**'
              - 'playbooks/update_docker.yml'
            monitoring:
              - 'playbooks/provision/monitoring.yml'
              - 'playbooks/provision/files/monitoring/**'
              - 'playbooks/provision/templates/monitoring/**'
            vps:
              - 'playbooks/provision/vps.yml'
              - 'playbooks/provision/files/vps/**'
              - 'playbooks/provision/templates/wireguard/**'
            pve:
              - 'playbooks/provision/pve.yml'
              - 'playbooks/provision/templates/pve/**'
            k8s:
              - 'playbooks/provision/k8s.yml'
              - 'playbooks/provision/templates/k8s/**'
            terraform:
              - 'terraform/**'
            mcp:
              - 'mcp/**'

  deploy-docker:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run update_docker playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/update_docker.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no"

  deploy-monitoring:
    needs: changes
    if: needs.changes.outputs.monitoring == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run monitoring playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/monitoring.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit monitoring

  deploy-vps:
    needs: changes
    if: needs.changes.outputs.vps == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run vps playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/vps.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit vps-proxy

  deploy-pve:
    needs: changes
    if: needs.changes.outputs.pve == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Run pve playbook
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/pve.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass" \
            --private-key "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            --ssh-extra-args "-o StrictHostKeyChecking=no" \
            --limit pve

  deploy-terraform:
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: self-hosted
    env:
      TF_PLUGIN_CACHE_DIR: /opt/terraform-plugin-cache
      TF_STATE_DIR: /opt/terraform-state/nest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Write SSH key
        run: |
          install -d -m 700 "$RUNNER_TEMP/.ssh"
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > "$RUNNER_TEMP/.ssh/ansible-on-nest"
          chmod 600 "$RUNNER_TEMP/.ssh/ansible-on-nest"

      - name: Write secrets.tfvars
        env:
          TF_SECRETS: ${{ secrets.TF_SECRETS_TFVARS }}
        run: |
          printf '%s' "$TF_SECRETS" > terraform/secrets.tfvars
          chmod 600 terraform/secrets.tfvars

      - name: Restore terraform state
        # Fail hard if the state is missing: applying with an empty state
        # re-creates every resource (duplicated AdGuard rewrites and orphaned
        # the gamma VM on 2026-06-11 when saves had been silently failing).
        run: |
          if [ ! -f "$TF_STATE_DIR/terraform.tfstate" ]; then
            echo "::error::No terraform state at $TF_STATE_DIR — refusing a stateless apply. Restore the state manually first."
            exit 1
          fi
          cp "$TF_STATE_DIR/terraform.tfstate" terraform/terraform.tfstate
          cp "$TF_STATE_DIR/terraform.tfstate.backup" terraform/terraform.tfstate.backup 2>/dev/null || true

      - name: Open VPS AdGuard tunnel
        run: |
          ssh -f -N -L 13000:localhost:3000 \
            -i "$RUNNER_TEMP/.ssh/ansible-on-nest" \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            -o ExitOnForwardFailure=yes \
            root@66.42.79.175
          for _ in $(seq 1 10); do nc -z 127.0.0.1 13000 2>/dev/null && break; sleep 1; done

      - name: Terraform init
        run: terraform -chdir=terraform init -input=false

      - name: Terraform apply
        run: terraform -chdir=terraform apply -var-file=secrets.tfvars -auto-approve -input=false

      - name: Save terraform state
        # No error suppression here: the runner user must be able to write
        # $TF_STATE_DIR (it silently could not between 06-11 and 06-12, so
        # every apply ran against a stale state). A failed save fails the job.
        if: always()
        run: |
          pkill -f "ssh -f -N -L 13000" 2>/dev/null || true
          cp terraform/terraform.tfstate "$TF_STATE_DIR/terraform.tfstate"
          cp terraform/terraform.tfstate.backup "$TF_STATE_DIR/terraform.tfstate.backup" 2>/dev/null || true

  deploy-k8s:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASS }}" > "$RUNNER_TEMP/vault-pass"
          chmod 600 "$RUNNER_TEMP/vault-pass"

      - name: Write kubeconfig
        run: |
          install -d -m 700 "$RUNNER_TEMP/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_TALOS }}" > "$RUNNER_TEMP/.kube/config"
          chmod 600 "$RUNNER_TEMP/.kube/config"

      - name: Apply k8s secrets
        env:
          KUBECONFIG: "${{ runner.temp }}/.kube/config"
        run: |
          source /opt/ansible-runner/venv/bin/activate
          ansible-playbook \
            -i inventory/hosts.yml \
            playbooks/provision/k8s.yml \
            --vault-password-file "$RUNNER_TEMP/vault-pass"

  build-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: mcp
          push: true
          tags: ghcr.io/arishaig/nest-mcp:latest

  deploy-mcp:
    needs: [changes, build-mcp]
    if: needs.changes.outputs.mcp == 'true'
    runs-on: self-hosted
    steps:
      - name: Write kubeconfig
        run: |
          install -d -m 700 "$RUNNER_TEMP/.kube"
          printf '%s' "${{ secrets.KUBECONFIG_TALOS }}" > "$RUNNER_TEMP/.kube/config"
          chmod 600 "$RUNNER_TEMP/.kube/config"

      - name: Rollout restart
        env:
          KUBECONFIG: "${{ runner.temp }}/.kube/config"
        run: |
          if kubectl get deployment/nest-mcp -n nest-mcp &>/dev/null; then
            kubectl rollout restart deployment/nest-mcp -n nest-mcp
          else
            echo "Deployment not yet created by Flux — skipping rollout restart"
          fi
