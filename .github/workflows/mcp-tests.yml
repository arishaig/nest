name: MCP Tests

# Unit tests + coverage for the nest_mcp server (mcp/). Runs on every PR that
# touches mcp/ as a gate (pytest enforces --cov-fail-under). On push to main it
# also regenerates the self-hosted coverage badge (assets/coverage.svg) and
# commits it back, mirroring the docs.yml diagram-regeneration pattern.
on:
  pull_request:
    branches: [main]
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-tests.yml'
  push:
    branches: [main]
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-tests.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mcp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install and run tests with coverage
        working-directory: mcp
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pytest

      - name: Regenerate coverage badge
        working-directory: mcp
        run: genbadge coverage -i coverage.xml -o ../assets/coverage.svg

      - name: Commit badge if changed (main only)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/arishaig/nest.git"
          git add assets/coverage.svg
          git diff --staged --quiet || git commit -m "chore: update mcp coverage badge [skip ci]"
          git push
