name: MCP Tests

# Unit tests + coverage for the nest_mcp server (mcp/). Runs only on PRs that
# touch mcp/, before merge — pytest enforces --cov-fail-under, and the job also
# verifies the committed coverage badge (assets/coverage.svg) is current. The
# badge is regenerated and committed by whoever changes mcp/ (genbadge); this
# gate fails the PR if it drifts, so the badge stays honest without a redundant
# post-merge run.
on:
  pull_request:
    branches: [main]
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-tests.yml'
  workflow_dispatch:

jobs:
  mcp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install and run tests with coverage
        working-directory: mcp
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pytest

      - name: Verify the committed coverage badge is current
        working-directory: mcp
        run: |
          genbadge coverage -i coverage.xml -o /tmp/coverage.svg
          fresh=$(grep -oE 'coverage: [0-9.]+%' /tmp/coverage.svg | head -1)
          committed=$(grep -oE 'coverage: [0-9.]+%' ../assets/coverage.svg | head -1)
          echo "committed badge: ${committed:-<none>} | actual: ${fresh}"
          if [ "$fresh" != "$committed" ]; then
            echo "::error::Coverage badge is stale. Regenerate and commit it:"
            echo "::error::  cd mcp && genbadge coverage -i coverage.xml -o ../assets/coverage.svg"
            exit 1
          fi
