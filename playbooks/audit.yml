---
# audit.yml
# Run: ansible-playbook -i hosts.yml audit.yml
#
# Dumps current state of all infrastructure to ./audit-output/
# Sensitive values (tokens, passwords) are redacted where possible.
# Review output before committing to git.

- name: Prepare local output directory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Create audit output directories
      file:
        path: "./audit-output/{{ item }}"
        state: directory
      loop:
        - proxmox
        - proxmox/lxc-configs
        - proxmox/vm-configs
        - proxmox/zfs
        - proxmox/network
        - proxmox/firewall
        - lxc
        - pbs
        - docker
        - integrations
        - service-configs
        - service-configs/docker
        - service-configs/monitoring
        - service-configs/fileserver
        - dns
        - vps

# =========================================================================
# PLAY 1: Proxmox Host
# =========================================================================
- name: Audit Proxmox host
  hosts: proxmox
  gather_facts: true
  tasks:
    # --- System Info ---
    - name: Gather system info
      shell: |
        echo "=== HOSTNAME ==="
        hostname -f
        echo ""
        echo "=== PROXMOX VERSION ==="
        pveversion -v
        echo ""
        echo "=== KERNEL ==="
        uname -a
        echo ""
        echo "=== UPTIME ==="
        uptime
        echo ""
        echo "=== CPU ==="
        lscpu | grep -E 'Model name|Socket|Core|Thread|CPU\(s\)'
        echo ""
        echo "=== MEMORY ==="
        free -h
        echo ""
        echo "=== BLOCK DEVICES ==="
        lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT,MODEL
        echo ""
        echo "=== SATA CONTROLLERS ==="
        lspci | grep -i sata
      register: system_info

    - name: Save system info
      copy:
        content: "{{ system_info.stdout }}"
        dest: "./audit-output/proxmox/system-info.txt"
      delegate_to: localhost

    # --- ZFS ---
    - name: Gather ZFS pool status
      shell: zpool status -v
      register: zpool_status

    - name: Gather ZFS pool properties
      shell: zpool get all
      register: zpool_props

    - name: Gather ZFS dataset list with properties
      shell: zfs list -o name,used,avail,refer,mountpoint,compression,recordsize,quota,reservation -t all
      register: zfs_list

    - name: Gather ZFS dataset detailed properties
      shell: |
        for ds in $(zfs list -H -o name -t filesystem); do
          echo "=== $ds ==="
          zfs get all "$ds" | grep -v -E '^\s*$'
          echo ""
        done
      register: zfs_props

    - name: Save ZFS data
      copy:
        content: "{{ item.content }}"
        dest: "./audit-output/proxmox/zfs/{{ item.name }}"
      delegate_to: localhost
      loop:
        - { name: "zpool-status.txt", content: "{{ zpool_status.stdout }}" }
        - { name: "zpool-properties.txt", content: "{{ zpool_props.stdout }}" }
        - { name: "zfs-list.txt", content: "{{ zfs_list.stdout }}" }
        - { name: "zfs-dataset-properties.txt", content: "{{ zfs_props.stdout }}" }

    # --- Network ---
    - name: Gather network configuration
      shell: |
        echo "=== /etc/network/interfaces ==="
        cat /etc/network/interfaces
        echo ""
        echo "=== IP ADDRESSES ==="
        ip -4 addr show
        echo ""
        echo "=== BRIDGES ==="
        brctl show 2>/dev/null || bridge link show
        echo ""
        echo "=== ROUTES ==="
        ip route show
        echo ""
        echo "=== DNS ==="
        cat /etc/resolv.conf
      register: network_info

    - name: Save network config
      copy:
        content: "{{ network_info.stdout }}"
        dest: "./audit-output/proxmox/network/network-config.txt"
      delegate_to: localhost

    # --- LXC Configs ---
    - name: List LXC config files
      find:
        paths: /etc/pve/lxc
        patterns: "*.conf"
      register: lxc_configs

    - name: Read LXC configs
      slurp:
        src: "{{ item.path }}"
      register: lxc_config_contents
      loop: "{{ lxc_configs.files }}"

    - name: Save LXC configs
      copy:
        content: "{{ item.content | b64decode }}"
        dest: "./audit-output/proxmox/lxc-configs/{{ item.source | basename }}"
      delegate_to: localhost
      loop: "{{ lxc_config_contents.results }}"

    # --- VM Configs ---
    - name: List VM config files
      find:
        paths: /etc/pve/qemu-server
        patterns: "*.conf"
      register: vm_configs

    - name: Read VM configs
      slurp:
        src: "{{ item.path }}"
      register: vm_config_contents
      loop: "{{ vm_configs.files }}"

    - name: Save VM configs
      copy:
        content: "{{ item.content | b64decode }}"
        dest: "./audit-output/proxmox/vm-configs/{{ item.source | basename }}"
      delegate_to: localhost
      loop: "{{ vm_config_contents.results }}"

    # --- Storage Configuration ---
    - name: Gather Proxmox storage config
      shell: |
        echo "=== /etc/pve/storage.cfg ==="
        cat /etc/pve/storage.cfg
        echo ""
        echo "=== pvesm status ==="
        pvesm status
      register: storage_config

    - name: Save storage config
      copy:
        content: "{{ storage_config.stdout }}"
        dest: "./audit-output/proxmox/storage-config.txt"
      delegate_to: localhost

    # --- SSH Keys ---
    - name: Gather SSH authorized keys
      shell: |
        echo "=== /root/.ssh/authorized_keys ==="
        cat /root/.ssh/authorized_keys 2>/dev/null || echo "(none)"
        echo ""
        echo "=== SSH host key fingerprints ==="
        for f in /etc/ssh/ssh_host_*_key.pub; do
          ssh-keygen -lf "$f" 2>/dev/null
        done
      register: ssh_keys

    - name: Save SSH keys
      copy:
        content: "{{ ssh_keys.stdout }}"
        dest: "./audit-output/proxmox/ssh-keys.txt"
      delegate_to: localhost

    # --- Startup Order / HA ---
    - name: Gather container and VM startup order
      shell: |
        echo "=== LXC Startup ==="
        for f in /etc/pve/lxc/*.conf; do
          id=$(basename "$f" .conf)
          startup=$(grep '^onboot\|^startup' "$f" 2>/dev/null)
          echo "LXC $id: $startup"
        done
        echo ""
        echo "=== VM Startup ==="
        for f in /etc/pve/qemu-server/*.conf; do
          id=$(basename "$f" .conf)
          startup=$(grep '^onboot\|^startup' "$f" 2>/dev/null)
          echo "VM $id: $startup"
        done
      register: startup_order

    - name: Save startup order
      copy:
        content: "{{ startup_order.stdout }}"
        dest: "./audit-output/proxmox/startup-order.txt"
      delegate_to: localhost

    # --- Cron and Systemd Timers ---
    - name: Gather scheduled tasks on host
      shell: |
        echo "=== CRONTABS ==="
        crontab -l 2>/dev/null || echo "(no root crontab)"
        echo ""
        echo "=== /etc/cron.d/ ==="
        ls -la /etc/cron.d/ 2>/dev/null
        for f in /etc/cron.d/*; do
          echo "--- $f ---"
          cat "$f" 2>/dev/null
        done
        echo ""
        echo "=== SYSTEMD TIMERS ==="
        systemctl list-timers --all --no-pager
      register: scheduled_tasks

    - name: Save scheduled tasks
      copy:
        content: "{{ scheduled_tasks.stdout }}"
        dest: "./audit-output/proxmox/scheduled-tasks.txt"
      delegate_to: localhost

    # --- Firewall Rules ---
    - name: Gather PVE firewall config directory
      shell: |
        echo "=== CLUSTER FIREWALL ==="
        cat /etc/pve/firewall/cluster.fw 2>/dev/null || echo "(no cluster.fw)"
        echo ""
        echo "=== PER-VM/LXC FIREWALL FILES ==="
        for f in /etc/pve/firewall/*.fw; do
          [ -f "$f" ] || continue
          echo "--- $f ---"
          cat "$f"
          echo ""
        done
      register: pve_firewall

    - name: Save PVE firewall config
      copy:
        content: "{{ pve_firewall.stdout }}"
        dest: "./audit-output/proxmox/firewall/pve-firewall.txt"
      delegate_to: localhost

    - name: Gather nftables ruleset on PVE host
      shell: nft list ruleset 2>/dev/null || echo "(nftables not active)"
      register: pve_nft
      ignore_errors: true

    - name: Save PVE nftables rules
      copy:
        content: "{{ pve_nft.stdout }}"
        dest: "./audit-output/proxmox/firewall/nft-ruleset.txt"
      delegate_to: localhost

    # --- Proxmox Users / ACLs / Roles ---
    - name: Gather PVE user and ACL config
      shell: |
        echo "=== USERS ==="
        pveum user list 2>/dev/null || echo "(pveum not available)"
        echo ""
        echo "=== API TOKENS ==="
        pveum user token list root@pam 2>/dev/null || echo "(no tokens or pveum error)"
        echo ""
        echo "=== ROLES ==="
        pveum role list 2>/dev/null || echo "(pveum not available)"
        echo ""
        echo "=== ACLs ==="
        pveum acl list 2>/dev/null || echo "(pveum not available)"
      register: pve_users

    - name: Save PVE users/ACLs
      copy:
        content: "{{ pve_users.stdout }}"
        dest: "./audit-output/proxmox/users-acls.txt"
      delegate_to: localhost

    # --- /etc/hosts ---
    - name: Gather /etc/hosts
      slurp:
        src: /etc/hosts
      register: pve_hosts

    - name: Save PVE /etc/hosts
      copy:
        content: "{{ pve_hosts.content | b64decode }}"
        dest: "./audit-output/proxmox/etc-hosts.txt"
      delegate_to: localhost

    # --- Certbot / ACME ---
    - name: Gather certbot/ACME config
      shell: |
        echo "=== CERTBOT CERTIFICATES ==="
        certbot certificates 2>/dev/null || echo "(certbot not installed)"
        echo ""
        echo "=== LETSENCRYPT RENEWAL CONFIGS ==="
        for f in /etc/letsencrypt/renewal/*.conf; do
          [ -f "$f" ] || continue
          echo "--- $f ---"
          cat "$f"
          echo ""
        done 2>/dev/null || echo "(no renewal configs)"
        echo ""
        echo "=== PVE ACME ACCOUNT ==="
        pvenode acme account list 2>/dev/null || echo "(no ACME accounts)"
      register: pve_certbot
      ignore_errors: true

    - name: Save certbot/ACME config
      copy:
        content: "{{ pve_certbot.stdout }}"
        dest: "./audit-output/proxmox/certbot-acme.txt"
      delegate_to: localhost

    # --- PBS Backup Job Definitions (via PVE API) ---
    - name: Gather PBS backup job definitions from PVE
      shell: |
        echo "=== BACKUP JOBS (vzdump.cron / jobs.cfg) ==="
        cat /etc/pve/jobs.cfg 2>/dev/null || echo "(no jobs.cfg)"
        echo ""
        echo "=== VZDUMP DEFAULTS ==="
        cat /etc/vzdump.conf 2>/dev/null || echo "(no vzdump.conf)"
        echo ""
        echo "=== PVESH BACKUP JOBS ==="
        pvesh get /cluster/backup --output-format text 2>/dev/null || echo "(pvesh not available or no jobs)"
      register: pve_backup_jobs
      ignore_errors: true

    - name: Save PVE backup job definitions
      copy:
        content: "{{ pve_backup_jobs.stdout }}"
        dest: "./audit-output/proxmox/backup-jobs.txt"
      delegate_to: localhost

# =========================================================================
# PLAY 2: All LXC Containers
# =========================================================================
- name: Audit LXC containers
  hosts: lxcs
  gather_facts: true
  tasks:
    - name: Create per-host output directory
      file:
        path: "./audit-output/lxc/{{ inventory_hostname }}"
        state: directory
      delegate_to: localhost

    # --- System Info ---
    - name: Gather LXC system info
      shell: |
        echo "=== HOSTNAME ==="
        hostname
        echo ""
        echo "=== OS ==="
        cat /etc/os-release
        echo ""
        echo "=== KERNEL ==="
        uname -a
        echo ""
        echo "=== RESOURCES ==="
        echo "CPU cores: $(nproc)"
        free -h
        echo ""
        echo "=== DISK USAGE ==="
        df -h
        echo ""
        echo "=== MOUNTS ==="
        mount | grep -v -E 'proc|sys|cgroup|devpts|tmpfs'
        echo ""
        echo "=== FSTAB ==="
        cat /etc/fstab 2>/dev/null || echo "(no fstab)"
      register: lxc_system
      ignore_errors: true

    - name: Save LXC system info
      copy:
        content: "{{ lxc_system.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/system-info.txt"
      delegate_to: localhost

    # --- Users and Groups ---
    - name: Gather users and groups
      shell: |
        # ... existing commands ...
        echo "=== SUDOERS ==="
        cat /etc/sudoers 2>/dev/null
        ls -la /etc/sudoers.d/ 2>/dev/null
        for f in /etc/sudoers.d/*; do
          [ -f "$f" ] || continue
          echo "--- $f ---"
          cat "$f" 2>/dev/null
        done
      register: users_groups
      ignore_errors: true

    - name: Save users and groups
      copy:
        content: "{{ users_groups.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/users-groups.txt"
      delegate_to: localhost

    # --- Installed Packages ---
    - name: Gather installed packages
      shell: |
        if command -v dpkg &>/dev/null; then
          dpkg -l | grep '^ii'
        elif command -v apk &>/dev/null; then
          apk list --installed
        elif command -v rpm &>/dev/null; then
          rpm -qa --queryformat '%{NAME} %{VERSION}-%{RELEASE}\n' | sort
        fi
      register: packages
      ignore_errors: true

    - name: Save installed packages
      copy:
        content: "{{ packages.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/packages.txt"
      delegate_to: localhost

    # --- SSH Keys ---
    - name: Gather SSH authorized keys for all users
      shell: |
        for dir in /root /home/*; do
          user=$(basename "$dir")
          keyfile="$dir/.ssh/authorized_keys"
          if [ -f "$keyfile" ]; then
            echo "=== $user ($keyfile) ==="
            cat "$keyfile"
            echo ""
          fi
        done
      register: ssh_authorized
      ignore_errors: true

    - name: Save SSH authorized keys
      copy:
        content: "{{ ssh_authorized.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/ssh-authorized-keys.txt"
      delegate_to: localhost

    # --- Systemd Services and Timers ---
    - name: Gather enabled systemd services and timers
      shell: |
        echo "=== ENABLED SERVICES ==="
        systemctl list-unit-files --type=service --state=enabled --no-pager 2>/dev/null
        echo ""
        echo "=== RUNNING SERVICES ==="
        systemctl list-units --type=service --state=running --no-pager 2>/dev/null
        echo ""
        echo "=== TIMERS ==="
        systemctl list-timers --all --no-pager 2>/dev/null
        echo ""
        echo "=== CRONTAB ==="
        crontab -l 2>/dev/null || echo "(no root crontab)"
        echo ""
        echo "=== /etc/cron.d/ ==="
        for f in /etc/cron.d/*; do
          [ -f "$f" ] && echo "--- $f ---" && cat "$f"
        done 2>/dev/null
      register: services
      ignore_errors: true

    - name: Save services
      copy:
        content: "{{ services.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/services.txt"
      delegate_to: localhost

    # --- Sysctl and Kernel Modules ---
    - name: Gather sysctl and modules
      shell: |
        echo "=== CUSTOM SYSCTL ==="
        if [ -d /etc/sysctl.d ]; then
          for f in /etc/sysctl.d/*.conf; do
            [ -f "$f" ] && echo "--- $f ---" && cat "$f"
          done
        fi
        cat /etc/sysctl.conf 2>/dev/null | grep -v '^#' | grep -v '^$'
        echo ""
        echo "=== LOADED MODULES ==="
        lsmod 2>/dev/null || echo "(lsmod not available in container)"
      register: sysctl
      ignore_errors: true

    - name: Save sysctl
      copy:
        content: "{{ sysctl.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/sysctl-modules.txt"
      delegate_to: localhost

    # --- Network ---
    - name: Gather network config
      shell: |
        echo "=== IP ADDRESSES ==="
        ip -4 addr show
        echo ""
        echo "=== ROUTES ==="
        ip route show
        echo ""
        echo "=== DNS ==="
        cat /etc/resolv.conf
        echo ""
        echo "=== HOSTS ==="
        cat /etc/hosts
        echo ""
        echo "=== LISTENING PORTS ==="
        ss -tlnp
      register: network
      ignore_errors: true

    - name: Save network
      copy:
        content: "{{ network.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/network.txt"
      delegate_to: localhost

    # --- nftables Rules ---
    - name: Gather nftables ruleset
      shell: nft list ruleset 2>/dev/null || echo "(nftables not active)"
      register: nft_rules
      ignore_errors: true

    - name: Save nftables rules
      copy:
        content: "{{ nft_rules.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/nft-ruleset.txt"
      delegate_to: localhost

    # --- Custom Systemd Unit Files ---
    - name: Find custom systemd unit files
      shell: |
        find /etc/systemd/system -maxdepth 1 \( -name '*.service' -o -name '*.timer' \) \
          ! -name 'dbus-*' -type f 2>/dev/null | sort
      register: custom_units
      ignore_errors: true

    - name: Read custom systemd unit files
      shell: |
        {% for unit in custom_units.stdout_lines %}
        echo "=== {{ unit }} ==="
        cat "{{ unit }}"
        echo ""
        {% endfor %}
        {% if custom_units.stdout_lines | length == 0 %}
        echo "(no custom units found)"
        {% endif %}
      register: custom_unit_contents
      ignore_errors: true

    - name: Save custom systemd units
      copy:
        content: "{{ custom_unit_contents.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/custom-systemd-units.txt"
      delegate_to: localhost

    # --- Samba Config (conditional) ---
    - name: Check if smbd is installed
      shell: command -v smbd
      register: smbd_check
      ignore_errors: true
      changed_when: false

    - name: Gather Samba config
      shell: |
        echo "=== /etc/samba/smb.conf ==="
        cat /etc/samba/smb.conf 2>/dev/null || echo "(not found)"
        echo ""
        echo "=== SAMBA USERS ==="
        pdbedit -L -v 2>/dev/null || echo "(pdbedit not available)"
      register: samba_config
      when: smbd_check.rc == 0
      ignore_errors: true

    - name: Save Samba config
      copy:
        content: "{{ samba_config.stdout }}"
        dest: "./audit-output/lxc/{{ inventory_hostname }}/samba-config.txt"
      delegate_to: localhost
      when: smbd_check.rc == 0

# =========================================================================
# PLAY 3: Docker Hosts — compose files, env, running state
# =========================================================================
- name: Audit Docker hosts
  hosts: docker_hosts
  gather_facts: false
  tasks:
    - name: Create docker output directory
      file:
        path: "./audit-output/docker/{{ inventory_hostname }}"
        state: directory
      delegate_to: localhost

    # --- Docker System Info ---
    - name: Gather Docker info
      shell: |
        echo "=== DOCKER VERSION ==="
        docker version 2>/dev/null
        echo ""
        echo "=== DOCKER INFO ==="
        docker info 2>/dev/null
        echo ""
        echo "=== DOCKER NETWORKS ==="
        docker network ls 2>/dev/null
        echo ""
        echo "=== DOCKER VOLUMES ==="
        docker volume ls 2>/dev/null
      register: docker_info
      ignore_errors: true

    - name: Save Docker info
      copy:
        content: "{{ docker_info.stdout }}"
        dest: "./audit-output/docker/{{ inventory_hostname }}/docker-info.txt"
      delegate_to: localhost

    # --- Running Containers ---
    - name: Gather running containers
      shell: |
        docker ps --format 'table {{ "{{" }}.Names{{ "}}" }}\t{{ "{{" }}.Image{{ "}}" }}\t{{ "{{" }}.Status{{ "}}" }}\t{{ "{{" }}.Ports{{ "}}" }}' 2>/dev/null
        echo ""
        echo "=== ALL CONTAINERS (including stopped) ==="
        docker ps -a --format 'table {{ "{{" }}.Names{{ "}}" }}\t{{ "{{" }}.Image{{ "}}" }}\t{{ "{{" }}.Status{{ "}}" }}' 2>/dev/null
      register: containers
      ignore_errors: true

    - name: Save container list
      copy:
        content: "{{ containers.stdout }}"
        dest: "./audit-output/docker/{{ inventory_hostname }}/containers.txt"
      delegate_to: localhost

    # --- Compose Files ---
    - name: Find compose files
      find:
        paths: "{{ compose_dirs }}"
        patterns:
          - "docker-compose.yml"
          - "docker-compose.yaml"
          - "compose.yml"
          - "compose.yaml"
        recurse: yes
        depth: 3
      register: compose_files

    - name: Read compose files
      slurp:
        src: "{{ item.path }}"
      register: compose_contents
      loop: "{{ compose_files.files }}"

    - name: Save compose files
      copy:
        content: "{{ item.content | b64decode }}"
        dest: "./audit-output/docker/{{ inventory_hostname }}/{{ item.source | replace('/', '_') }}"
      delegate_to: localhost
      loop: "{{ compose_contents.results }}"

    # --- Env Files (REDACTED) ---
    - name: Find env files
      find:
        paths: "{{ compose_dirs }}"
        patterns:
          - ".env"
          - "*.env"
        recurse: yes
        depth: 3
        hidden: yes
      register: env_files

    - name: Read and redact env files
      shell: |
        echo "=== {{ item.path }} ==="
        sed -E 's/(TOKEN|KEY|SECRET|PASSWORD|PASS|APIKEY|API_KEY)=.*/\1=REDACTED/gi' "{{ item.path }}"
        echo ""
      loop: "{{ env_files.files }}"
      register: env_contents
      ignore_errors: true

    - name: Save redacted env files
      copy:
        content: "{{ env_contents.results | map(attribute='stdout') | join('\n') }}"
        dest: "./audit-output/docker/{{ inventory_hostname }}/env-files-redacted.txt"
      delegate_to: localhost

    # --- Container Inspect (restart policy, mounts, env) ---
    - name: Gather container details
      shell: |
        for c in $(docker ps -a --format '{{ "{{" }}.Names{{ "}}" }}'); do
          echo "=== $c ==="
          docker inspect "$c" --format '
          Image: {{ "{{" }}.Config.Image{{ "}}" }}
          RestartPolicy: {{ "{{" }}.HostConfig.RestartPolicy.Name{{ "}}" }}
          NetworkMode: {{ "{{" }}.HostConfig.NetworkMode{{ "}}" }}
          Mounts: {{ "{{" }}range .Mounts{{ "}}" }}
            {{ "{{" }}.Type{{ "}}" }}: {{ "{{" }}.Source{{ "}}" }} -> {{ "{{" }}.Destination{{ "}}" }} ({{ "{{" }}.Mode{{ "}}" }}){{ "{{" }}end{{ "}}" }}
          Ports: {{ "{{" }}json .HostConfig.PortBindings{{ "}}" }}'
          echo ""
        done 2>/dev/null
      register: container_details
      ignore_errors: true

    - name: Save container details
      copy:
        content: "{{ container_details.stdout }}"
        dest: "./audit-output/docker/{{ inventory_hostname }}/container-details.txt"
      delegate_to: localhost

    # --- Docker Network Details ---
    - name: Gather docker network details
      shell: |
        for net in $(docker network ls --format '{{ "{{" }}.Name{{ "}}" }}' | grep -v -E '^(bridge|host|none)$'); do
          echo "=== $net ==="
          docker network inspect "$net" --format '
          Name: {{ "{{" }}.Name{{ "}}" }}
          Driver: {{ "{{" }}.Driver{{ "}}" }}
          Scope: {{ "{{" }}.Scope{{ "}}" }}
          IPAM: {{ "{{" }}json .IPAM{{ "}}" }}
          Options: {{ "{{" }}json .Options{{ "}}" }}
          Containers: {{ "{{" }}range $k, $v := .Containers{{ "}}" }}
            {{ "{{" }}$v.Name{{ "}}" }}: {{ "{{" }}$v.IPv4Address{{ "}}" }}{{ "{{" }}end{{ "}}" }}'
          echo ""
        done 2>/dev/null
      register: docker_networks
      ignore_errors: true

    - name: Save docker network details
      copy:
        content: "{{ docker_networks.stdout }}"
        dest: "./audit-output/docker/{{ inventory_hostname }}/network-details.txt"
      delegate_to: localhost

# =========================================================================
# PLAY 4: Service Configuration Files
# =========================================================================
- name: Capture service configs — docker LXC
  hosts: docker
  gather_facts: false
  tasks:
    # --- Traefik ---
    - name: Read Traefik static config
      slurp:
        src: /mnt/app_config/traefik/traefik.yml
      register: traefik_static
      ignore_errors: true

    - name: Save Traefik static config
      copy:
        content: "{{ traefik_static.content | b64decode }}"
        dest: "./audit-output/service-configs/docker/traefik.yml"
      delegate_to: localhost
      when: traefik_static is succeeded

    - name: Find Traefik dynamic configs
      find:
        paths: /mnt/app_config/traefik/dynamic
        patterns: "*.yml"
      register: traefik_dynamic_files
      ignore_errors: true

    - name: Read Traefik dynamic configs
      slurp:
        src: "{{ item.path }}"
      register: traefik_dynamic_contents
      loop: "{{ traefik_dynamic_files.files | default([]) }}"

    - name: Create Traefik dynamic output dir
      file:
        path: "./audit-output/service-configs/docker/traefik-dynamic"
        state: directory
      delegate_to: localhost

    - name: Save Traefik dynamic configs
      copy:
        content: "{{ item.content | b64decode }}"
        dest: "./audit-output/service-configs/docker/traefik-dynamic/{{ item.source | basename }}"
      delegate_to: localhost
      loop: "{{ traefik_dynamic_contents.results | default([]) }}"

    # --- Authelia ---
    - name: Read Authelia config
      shell: |
        cat /mnt/app_config/authelia/configuration.yml 2>/dev/null || echo "(not found)"
      register: authelia_raw
      ignore_errors: true

    - name: Save Authelia config (redacted)
      copy:
        content: >-
          {{ authelia_raw.stdout
            | regex_replace('(secret|password|key|token|encryption_key|hmac_secret):.*', '\1: REDACTED')
          }}
        dest: "./audit-output/service-configs/docker/authelia-configuration.yml"
      delegate_to: localhost

    # --- Recyclarr ---
    - name: Read Recyclarr config
      slurp:
        src: /mnt/app_config/recyclarr/recyclarr.yml
      register: recyclarr_config
      ignore_errors: true

    - name: Save Recyclarr config (redacted)
      copy:
        content: >-
          {{ (recyclarr_config.content | b64decode)
            | regex_replace('(api_key|base_url):.*', '\1: REDACTED')
          }}
        dest: "./audit-output/service-configs/docker/recyclarr.yml"
      delegate_to: localhost
      when: recyclarr_config is succeeded

    # --- SSL/TLS ACME domains ---
    - name: List ACME certificate domains from Traefik
      shell: |
        if [ -f /mnt/app_config/traefik/acme.json ]; then
          python3 -c "
        import json, sys
        with open('/mnt/app_config/traefik/acme.json') as f:
            data = json.load(f)
        for resolver, info in data.items():
            print(f'=== Resolver: {resolver} ===')
            if 'Account' in info:
                print(f'  Email: {info[\"Account\"].get(\"Email\", \"N/A\")}')
            for cert in info.get('Certificates', []):
                domain = cert.get('domain', {})
                print(f'  Main: {domain.get(\"main\", \"N/A\")}')
                sans = domain.get('sans', [])
                if sans:
                    print(f'  SANs: {sans}')
        " 2>/dev/null || echo "(python3 parse failed, file exists but unreadable)"
        else
          echo "(acme.json not found)"
        fi
      register: acme_domains
      ignore_errors: true

    - name: Save ACME domain list
      copy:
        content: "{{ acme_domains.stdout }}"
        dest: "./audit-output/service-configs/docker/acme-domains.txt"
      delegate_to: localhost

