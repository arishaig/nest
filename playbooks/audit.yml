      delegate_to: localhost

# =========================================================================
# PLAY 5: PBS — backup jobs, rclone, retention
# =========================================================================
- name: Audit PBS
  hosts: pbs
  gather_facts: true
  tasks:
    - name: Create PBS output directory
      file:
        path: "./audit-output/pbs"
        state: directory
      delegate_to: localhost

    - name: Gather PBS info
      shell: |
        echo "=== PBS VERSION ==="
        proxmox-backup-manager version 2>/dev/null || dpkg -l | grep proxmox-backup
        echo ""
        echo "=== DATASTORES ==="
        proxmox-backup-manager datastore list 2>/dev/null || echo "(check via API)"
        echo ""
        echo "=== DISK USAGE ==="
        df -h
        echo ""
        echo "=== SYNC/VERIFY JOBS ==="
        proxmox-backup-manager sync-job list 2>/dev/null || echo "(none or check via API)"
        proxmox-backup-manager verify-job list 2>/dev/null || echo "(none or check via API)"
      register: pbs_info
      ignore_errors: true

    - name: Save PBS info
      copy:
        content: "{{ pbs_info.stdout }}"
        dest: "./audit-output/pbs/pbs-info.txt"
      delegate_to: localhost

    # --- rclone config ---
    - name: Check for rclone config
      shell: |
        echo "=== RCLONE REMOTES ==="
        rclone listremotes 2>/dev/null || echo "(rclone not installed)"
        echo ""
        echo "=== RCLONE CONFIG (redacted) ==="
        if [ -f /root/.config/rclone/rclone.conf ]; then
          sed -E 's/(token|client_id|client_secret|password).*=.*/\1 = REDACTED/gi' /root/.config/rclone/rclone.conf
        elif [ -f ~/.config/rclone/rclone.conf ]; then
          sed -E 's/(token|client_id|client_secret|password).*=.*/\1 = REDACTED/gi' ~/.config/rclone/rclone.conf
        else
          echo "(no rclone.conf found)"
        fi
        echo ""
        echo "=== RCLONE CRON/TIMERS ==="
        crontab -l 2>/dev/null | grep -i rclone || echo "(no rclone crontab)"
        systemctl list-timers --all --no-pager 2>/dev/null | grep -i rclone || echo "(no rclone timers)"
        echo ""
        echo "=== RCLONE SYNC SCRIPTS ==="
        find /root /opt /usr/local/bin -name '*rclone*' -o -name '*backup*' -o -name '*sync*' 2>/dev/null | head -20
      register: rclone_info
      ignore_errors: true

    - name: Save rclone info
      copy:
        content: "{{ rclone_info.stdout }}"
        dest: "./audit-output/pbs/rclone-config.txt"
      delegate_to: localhost

    # --- Sync/Backup Scripts ---
    - name: Read sync-backup script
      slurp:
        src: /root/sync-backup.sh
      register: sync_backup_script
      ignore_errors: true

    - name: Save sync-backup script
      copy:
        content: "{{ sync_backup_script.content | b64decode }}"
        dest: "./audit-output/pbs/sync-backup.sh"
      delegate_to: localhost
      when: sync_backup_script is succeeded

    # --- PBS Backup Job Definitions ---
    - name: Gather PBS backup/prune jobs
      shell: |
        echo "=== BACKUP GROUPS ==="
        proxmox-backup-manager datastore list 2>/dev/null
        echo ""
        echo "=== GARBAGE COLLECTION JOBS ==="
        proxmox-backup-manager garbage-collection status 2>/dev/null || echo "(not available)"
        echo ""
        echo "=== PRUNE JOBS ==="
        proxmox-backup-manager prune-job list 2>/dev/null || echo "(not available)"
        echo ""
        echo "=== SYNC JOBS ==="
        proxmox-backup-manager sync-job list 2>/dev/null || echo "(not available)"
        echo ""
        echo "=== VERIFY JOBS ==="
        proxmox-backup-manager verify-job list 2>/dev/null || echo "(not available)"
      register: pbs_jobs
      ignore_errors: true

    - name: Save PBS jobs
      copy:
        content: "{{ pbs_jobs.stdout }}"
        dest: "./audit-output/pbs/pbs-jobs.txt"
      delegate_to: localhost

    # --- Certbot on PBS ---
    - name: Gather certbot config on PBS
      shell: |
        echo "=== CERTBOT CERTIFICATES ==="
        certbot certificates 2>/dev/null || echo "(certbot not installed)"
        echo ""
        echo "=== LETSENCRYPT RENEWAL CONFIGS ==="
        for f in /etc/letsencrypt/renewal/*.conf; do
          [ -f "$f" ] || continue
          echo "--- $f ---"
          cat "$f"
          echo ""
        done 2>/dev/null || echo "(no renewal configs)"
      register: pbs_certbot
      ignore_errors: true

    - name: Save PBS certbot config
      copy:
        content: "{{ pbs_certbot.stdout }}"
        dest: "./audit-output/pbs/certbot-acme.txt"
      delegate_to: localhost

    # --- SSH keys and scheduled tasks ---
    - name: Gather PBS scheduled tasks and keys
      shell: |
        echo "=== AUTHORIZED KEYS ==="
        cat /root/.ssh/authorized_keys 2>/dev/null || echo "(none)"
        echo ""
        echo "=== CRONTAB ==="
        crontab -l 2>/dev/null || echo "(no crontab)"
        echo ""
        echo "=== SYSTEMD TIMERS ==="
        systemctl list-timers --all --no-pager
      register: pbs_tasks
      ignore_errors: true

    - name: Save PBS tasks
      copy:
        content: "{{ pbs_tasks.stdout }}"
        dest: "./audit-output/pbs/scheduled-tasks.txt"
      delegate_to: localhost

# =========================================================================
# PLAY 6: Integration-specific checks
# =========================================================================
- name: Audit integrations on docker LXC
  hosts: docker
  gather_facts: false
  tasks:
    # --- Inter-service API keys ---
    - name: Gather arr API keys (keys exist, values redacted)
      shell: |
        echo "=== SERVICE API KEY PRESENCE ==="
        for svc in sonarr radarr lidarr prowlarr bazarr seerr; do
          if docker exec "$svc" test -f /config/config.xml 2>/dev/null; then
            has_key=$(docker exec "$svc" grep -c 'ApiKey' /config/config.xml 2>/dev/null || echo 0)
            echo "$svc: ApiKey present=$has_key"
          else
            echo "$svc: config.xml not found or container not running"
          fi
        done
      register: api_keys
      ignore_errors: true

    - name: Save API key audit
      copy:
        content: "{{ api_keys.stdout }}"
        dest: "./audit-output/integrations/api-keys.txt"
      delegate_to: localhost

- name: Audit integrations on seedbox
  hosts: seedbox
  gather_facts: false
  tasks:
    # --- Gluetun/VPN ---
    - name: Gather VPN config
      shell: |
        echo "=== GLUETUN ENV (redacted) ==="
        docker inspect gluetun --format '{{ "{{" }}range .Config.Env{{ "}}" }}{{ "{{" }}println .{{ "}}" }}{{ "{{" }}end{{ "}}" }}' 2>/dev/null | \
          sed -E 's/(KEY|TOKEN|PASSWORD|SECRET|PRIVATE)=.*/\1=REDACTED/gi'
        echo ""
        echo "=== GLUETUN PORT FORWARDING ==="
        docker inspect gluetun --format '{{ "{{" }}json .HostConfig.PortBindings{{ "}}" }}' 2>/dev/null
        echo ""
        echo "=== QBITTORRENT NETWORK MODE ==="
        docker inspect qbittorrent --format 'NetworkMode: {{ "{{" }}.HostConfig.NetworkMode{{ "}}" }}' 2>/dev/null
      register: vpn_info
      ignore_errors: true

    - name: Save VPN info
      copy:
        content: "{{ vpn_info.stdout }}"
        dest: "./audit-output/integrations/vpn-seedbox.txt"
      delegate_to: localhost

# =========================================================================
# PLAY 7: DNS — AdGuard Home + Unbound (Pi)
# =========================================================================
- name: Audit DNS (AdGuard Home + Unbound)
  hosts: dns
  gather_facts: true
  tasks:
    - name: Create DNS output directory
      file:
        path: "./audit-output/dns"
        state: directory
      delegate_to: localhost

    # --- System Info ---
    - name: Gather Pi system info
      shell: |
        echo "=== HOSTNAME ==="
        hostname
        echo ""
        echo "=== OS ==="
        cat /etc/os-release
        echo ""
        echo "=== KERNEL ==="
        uname -a
        echo ""
        echo "=== RESOURCES ==="
        echo "CPU cores: $(nproc)"
        free -h
        echo ""
        echo "=== DISK USAGE ==="
        df -h
      register: pi_system
      ignore_errors: true

    - name: Save Pi system info
      copy:
        content: "{{ pi_system.stdout }}"
        dest: "./audit-output/dns/system-info.txt"
      delegate_to: localhost

    # --- AdGuard Home Config ---
    - name: Read AdGuard Home config
      shell: |
        cat /opt/AdGuardHome/AdGuardHome.yaml 2>/dev/null || echo "(not found)"
      register: adguard_raw
      ignore_errors: true

    - name: Save AdGuard Home config (redacted)
      copy:
        content: >-
          {{ adguard_raw.stdout
            | regex_replace('password:.*', 'password: REDACTED')
          }}
        dest: "./audit-output/dns/adguard-config.yml"
      delegate_to: localhost

    # --- AdGuard Home DNS rewrites (extracted for quick reference) ---
    - name: Extract DNS rewrites from AdGuard config
      shell: |
        python3 -c "
        import yaml, sys
        try:
            with open('/opt/AdGuardHome/AdGuardHome.yaml') as f:
                cfg = yaml.safe_load(f)
            rewrites = cfg.get('filtering', {}).get('rewrites', [])
            if not rewrites:
                print('(no rewrites found)')
            else:
                print(f'Total rewrites: {len(rewrites)}')
                print()
                for r in rewrites:
                    status = 'enabled' if r.get('enabled', True) else 'disabled'
                    print(f'{r[\"domain\"]:45s} -> {r[\"answer\"]:20s} [{status}]')
        except Exception as e:
            print(f'Error: {e}')
        " 2>/dev/null || echo "(python3 or pyyaml not available)"
      register: dns_rewrites
      ignore_errors: true

    - name: Save DNS rewrites
      copy:
        content: "{{ dns_rewrites.stdout }}"
        dest: "./audit-output/dns/adguard-rewrites.txt"
      delegate_to: localhost

    # --- AdGuard Home version ---
    - name: Gather AdGuard Home version
      shell: |
        /opt/AdGuardHome/AdGuardHome --version 2>/dev/null || echo "(version check failed)"
      register: adguard_version
      ignore_errors: true

    - name: Save AdGuard version
      copy:
        content: "{{ adguard_version.stdout }}"
        dest: "./audit-output/dns/adguard-version.txt"
      delegate_to: localhost

    # --- Unbound Config ---
    - name: Read Unbound main config
      shell: |
        cat /etc/unbound/unbound.conf 2>/dev/null || echo "(not found)"
      register: unbound_main
      ignore_errors: true

    - name: Save Unbound main config
      copy:
        content: "{{ unbound_main.stdout }}"
        dest: "./audit-output/dns/unbound.conf"
      delegate_to: localhost

    - name: Find Unbound include configs
      find:
        paths: /etc/unbound/unbound.conf.d
        patterns: "*.conf"
      register: unbound_includes
      ignore_errors: true

    - name: Read Unbound include configs
      slurp:
        src: "{{ item.path }}"
      register: unbound_include_contents
      loop: "{{ unbound_includes.files | default([]) }}"

    - name: Save Unbound include configs
      copy:
        content: "{{ item.content | b64decode }}"
        dest: "./audit-output/dns/unbound-{{ item.source | basename }}"
      delegate_to: localhost
      loop: "{{ unbound_include_contents.results | default([]) }}"

    # --- TLS certs for DNS-over-TLS/HTTPS ---
    - name: Check AdGuard TLS cert details
      shell: |
        if [ -f /opt/AdGuardHome/ssl/fullchain.pem ]; then
          echo "=== CERTIFICATE INFO ==="
          openssl x509 -in /opt/AdGuardHome/ssl/fullchain.pem -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null
          echo ""
          echo "=== CERTBOT RENEWAL ==="
          certbot certificates 2>/dev/null || echo "(certbot not installed)"
          echo ""
          for f in /etc/letsencrypt/renewal/*.conf; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            cat "$f"
            echo ""
          done 2>/dev/null
        else
          echo "(no TLS cert found at /opt/AdGuardHome/ssl/)"
        fi
      register: adguard_tls
      ignore_errors: true

    - name: Save AdGuard TLS info
      copy:
        content: "{{ adguard_tls.stdout }}"
        dest: "./audit-output/dns/adguard-tls.txt"
      delegate_to: localhost

    # --- Network and services ---
    - name: Gather Pi network and services
      shell: |
        echo "=== IP ADDRESSES ==="
        ip -4 addr show
        echo ""
        echo "=== LISTENING PORTS ==="
        ss -tlnp
        echo ""
        echo "=== ENABLED SERVICES ==="
        systemctl list-unit-files --type=service --state=enabled --no-pager 2>/dev/null
        echo ""
        echo "=== CRONTAB ==="
        crontab -l 2>/dev/null || echo "(no crontab)"
      register: pi_network
      ignore_errors: true

    - name: Save Pi network info
      copy:
        content: "{{ pi_network.stdout }}"
        dest: "./audit-output/dns/network-services.txt"
      delegate_to: localhost

