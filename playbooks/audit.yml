        echo ""
        echo "=== ALLOY SERVICE ==="
        systemctl status alloy --no-pager 2>/dev/null
        echo ""
        echo "=== ALLOY CONFIG ==="
        cat /etc/alloy/config.alloy 2>/dev/null || echo "(not found)"
      register: vps_alloy
      ignore_errors: true

    - name: Save Alloy status
      copy:
        content: "{{ vps_alloy.stdout }}"
        dest: "./audit-output/vps/alloy.txt"
      delegate_to: localhost

    - name: Gather VPS network and services
      shell: |
        echo "=== LISTENING PORTS ==="
        ss -tlnp
        echo ""
        echo "=== ENABLED SERVICES ==="
        systemctl list-unit-files --type=service --state=enabled --no-pager 2>/dev/null
        echo ""
        echo "=== FAIL2BAN STATUS ==="
        fail2ban-client status 2>/dev/null || echo "(fail2ban not running)"
        echo ""
        echo "=== FAIL2BAN JAILS ==="
        fail2ban-client status sshd 2>/dev/null || true
        fail2ban-client status traefik 2>/dev/null || true
      register: vps_network
      ignore_errors: true

    - name: Save VPS network info
      copy:
        content: "{{ vps_network.stdout }}"
        dest: "./audit-output/vps/network-services.txt"
      delegate_to: localhost

# =========================================================================
# PLAY 9: Summary
# =========================================================================
- name: Generate audit summary
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Create summary
      shell: |
        echo "========================================="
        echo " HOMELAB AUDIT COMPLETE"
        echo " $(date)"
        echo "========================================="
        echo ""
        echo "Output: ./audit-output/"
        echo ""
        echo "=== FILES GENERATED ==="
        find ./audit-output -type f | sort
        echo ""
        echo "=== MANUAL CHECKS NEEDED ==="
        echo ""
        echo "These cannot be captured via SSH and need"
        echo "manual documentation or screenshots:"
        echo ""
        echo "  1. UniFi firewall rules and VLAN config"
        echo "     - Export from UDM controller UI"
        echo "     - Zone-based rules + legacy LAN IN rules"
        echo "     - Object groups"
        echo ""
        echo "  2. Home Assistant integrations"
        echo "     - Scrutiny webhook config"
        echo "     - Any other automations tied to infra"
        echo ""
        echo "  3. Google Drive OAuth token for rclone"
        echo "     - Must be re-authorized on rebuild"
        echo ""
        echo "  4. ProtonVPN WireGuard key"
        echo "     - Must be regenerated on rebuild"
        echo ""
      register: summary

    - name: Display summary
      debug:
        msg: "{{ summary.stdout_lines }}"

    - name: Save summary
      copy:
        content: "{{ summary.stdout }}"
        dest: "./audit-output/SUMMARY.txt"