---
# site.yml — full converge of the whole estate.
#
# Runs every host's provision playbook (applies all repo-defined config:
# packages, services, compose stacks, Traefik, monitoring rules, firewall),
# then refreshes OS packages, container images, and the Proxmox host.
#
# Usage:  ansible-playbook playbooks/site.yml --ask-vault-pass
#
# Not covered here — run separately:
#   - OpenTofu (LXC/VM definitions, AdGuard DNS rewrites): `tofu apply`
#   - provision/pve-passthrough.yml: parametrized (lxc_id), run per-container
#     by Terraform, not as part of a full converge.
#   - provision/k8s.yml: k8s secrets (requires vault + kubectl pointing at cluster)

# --- Provision: converge each host to the configuration in this repo ---
# common.yml runs once here; the provision playbooks no longer import it.
- name: "Provision: PVE host (ZFS datasets, NFS exports)"
  import_playbook: provision/pve.yml
- name: "Provision: common base config"
  import_playbook: provision/common.yml
- name: "Provision: AdGuard DNS"
  import_playbook: provision/adguard.yml
- name: "Provision: Docker host"
  import_playbook: provision/docker-host.yml
- name: "Provision: VPS proxy"
  import_playbook: provision/vps.yml
- name: "Provision: file server"
  import_playbook: provision/fileserver.yml
- name: "Provision: monitoring stack"
  import_playbook: provision/monitoring.yml
- name: "Provision: MusicBrainz"
  import_playbook: provision/musicbrainz.yml
- name: "Provision: Scrutiny"
  import_playbook: provision/scrutiny.yml
- name: "Provision: seedbox"
  import_playbook: provision/seedbox.yml
- name: "Provision: FoundryVTT"
  import_playbook: provision/foundry.yml
- name: "Provision: Proxmox Backup Server"
  import_playbook: provision/pbs.yml
- name: "Provision: nftables firewall"
  import_playbook: provision/nftables.yml
- name: "Provision: Alloy log shipper"
  import_playbook: provision/alloy.yml

# --- Update: refresh OS packages, container images, and Proxmox ---
- name: "Update: OS packages"
  import_playbook: update_apt.yml
- name: "Update: container images"
  import_playbook: update_docker.yml
- name: "Update: Proxmox host"
  import_playbook: update_proxmox.yml
