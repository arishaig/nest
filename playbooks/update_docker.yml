---
- name: Update Docker containers
  hosts: docker_hosts
  become: true
  tasks:
    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/provision/files/docker/docker-compose.yml"
        dest: /mnt/app_config/docker-compose.yml
        mode: "0644"
      when: inventory_hostname == 'docker'

    - name: Copy seedbox docker-compose.yml
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/provision/files/seedbox/docker-compose.yml"
        dest: /opt/seedbox/docker-compose.yml
        mode: "0644"
      when: inventory_hostname == 'seedbox'

    - name: Copy Traefik static config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/provision/files/docker/traefik/traefik.yml"
        dest: /mnt/app_config/traefik/traefik.yml
        mode: "0644"
      when: inventory_hostname == 'docker'

    - name: Copy Traefik dynamic configs
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/provision/files/docker/traefik/dynamic/"
        dest: /mnt/app_config/traefik/dynamic/
        mode: "0644"
      when: inventory_hostname == 'docker'

    - name: Ensure Redis data directory exists
      ansible.builtin.file:
        path: /mnt/app_config/redis
        state: directory
        mode: "0755"
      when: inventory_hostname == 'docker'

    - name: Template Authelia configuration
      ansible.builtin.template:
        src: "{{ playbook_dir }}/provision/templates/docker/authelia-configuration.yml.j2"
        dest: /mnt/app_config/authelia/configuration.yml
        mode: "0644"
      when: inventory_hostname == 'docker'

    - name: Pull latest images and recreate updated containers
      community.docker.docker_compose_v2:
        project_src: "{{ item }}"
        state: present
        pull: always
        remove_orphans: true
      loop: "{{ compose_dirs }}"

    - name: Prune images older than 7 days
      community.docker.docker_prune:
        images: true
        images_filters:
          until: "168h"

    - name: Show disk usage
      command: docker system df
      register: df_output
      changed_when: false

    - name: Docker disk usage
      debug:
        var: df_output.stdout_lines