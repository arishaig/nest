---
# Provision k8s cluster state that cannot live in git (secrets).
# Idempotent: uses kubectl apply with --dry-run=client to detect drift,
# then applies only if the secret would change.
#
# Requires: vault.yml (--ask-vault-pass or --vault-password-file)
# Requires: kubectl configured and pointing at the Talos cluster

- name: K8s secrets provisioning
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create media namespace secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ item.name }}"
            namespace: media
          type: Opaque
          stringData: "{{ item.data }}"
      loop:
        - name: postgres-secret
          data:
            POSTGRES_USER: "{{ mealie_postgres_user }}"
            POSTGRES_PASSWORD: "{{ mealie_postgres_password }}"
        - name: lidarr-api-key
          data:
            APIKEY: "{{ lidarr_api_key }}"
        - name: bazarr-api-key
          data:
            APIKEY: "{{ bazarr_api_key }}"
        - name: prowlarr-api-key
          data:
            APIKEY: "{{ prowlarr_api_key }}"
        - name: subgen-secrets
          data:
            HF_TOKEN: "{{ hugging_face_access_token }}"
        - name: sonarr-api-key
          data:
            APIKEY: "{{ sonarr_api_key }}"
        - name: radarr-api-key
          data:
            APIKEY: "{{ radarr_api_key }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Create cert-manager namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: cert-manager

    - name: Create cert-manager cloudflare API token secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflare-api-token
            namespace: cert-manager
          type: Opaque
          stringData:
            api-token: "{{ traefik_cf_dns_api_token }}"
      no_log: true

    - name: Create authelia namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: authelia

    - name: Create authelia env secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: authelia-env-secret
            namespace: authelia
          type: Opaque
          stringData:
            AUTHELIA_SESSION_SECRET: "{{ authelia_session_secret }}"
            AUTHELIA_STORAGE_ENCRYPTION_KEY: "{{ authelia_storage_encryption_key }}"
            AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: "{{ authelia_jwt_secret }}"
      no_log: true

    - name: Create authelia config secret (rendered configuration.yml)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: authelia-config
            namespace: authelia
          type: Opaque
          stringData:
            configuration.yml: "{{ lookup('template', 'templates/k8s/authelia-configuration.yml.j2') }}"
      no_log: true

    - name: Create authelia users ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: authelia-users
            namespace: authelia
          data:
            users_database.yml: "{{ lookup('template', 'templates/docker/authelia-users.yml.j2') }}"

    - name: Create nest-mcp namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: nest-mcp

    - name: Create nest-mcp app secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: nest-mcp-secrets
            namespace: nest-mcp
          type: Opaque
          stringData:
            NEST_PROXMOX_TOKEN: "{{ nest_mcp_pve_token }}"
            NEST_VPS_VULTR_API_KEY: "{{ vultr_api_key }}"
            NEST_PBS_PASSWORD: "{{ pbs_password }}"
            NEST_UNIFI_USERNAME: "{{ unpoller_unifi_user }}"
            NEST_UNIFI_PASSWORD: "{{ unpoller_unifi_pass }}"
            NEST_ADGUARD_PASSWORD: "{{ adguard_admin_password }}"
            NEST_HA_TOKEN: "{{ homeassistant_bearer_token }}"
            NEST_GRAFANA_PASSWORD: "{{ grafana_admin_password }}"
            NEST_SONARR_KEY: "{{ sonarr_api_key }}"
            NEST_RADARR_KEY: "{{ radarr_api_key }}"
            NEST_LIDARR_KEY: "{{ lidarr_api_key }}"
            NEST_PROWLARR_KEY: "{{ prowlarr_api_key }}"
            NEST_JELLYSEERR_KEY: "{{ jellyseerr_api_key }}"
            NEST_JELLYFIN_KEY: "{{ jellyfin_api_key }}"
            NEST_MEALIE_KEY: "{{ nest_mcp_mealie_token }}"
            NEST_K8S_TOKEN: "{{ k8s_mcp_sa_token }}"
            MCP_PORT: "8765"
            MCP_AUTHELIA_ISSUER: "https://auth.arishaig.site"
            MCP_CLIENT_ID: "nest-mcp"
            MCP_CLIENT_SECRET: "{{ authelia_oidc_client_secret_nest_mcp }}"
      no_log: true

    - name: Create nest-mcp SSH key secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: nest-mcp-ssh-key
            namespace: nest-mcp
          type: Opaque
          stringData:
            ansible-on-nest: "{{ nest_mcp_ssh_private_key }}"
      no_log: true

    # ARC (Actions Runner Controller) auth for the arc-lint runner scale set.
    # The listener long-polls GitHub with this token; reuses the same PAT the
    # LXC runner provisioning uses. The namespace is also defined in the Flux
    # arc/ kustomization — created here too so the secret can apply before Flux
    # reconciles. TODO: migrate to a GitHub App (see docs/tech-debt.md).
    - name: Create arc-runners namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: arc-runners

    - name: Create ARC GitHub auth secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: arc-github-secret
            namespace: arc-runners
          type: Opaque
          stringData:
            github_token: "{{ vault_github_runner_pat }}"
      no_log: true
