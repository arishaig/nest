---
# Provision k8s cluster state that cannot live in git (secrets).
# Idempotent: uses kubectl apply with --dry-run=client to detect drift,
# then applies only if the secret would change.
#
# Requires: vault.yml (--ask-vault-pass or --vault-password-file)
# Requires: kubectl configured and pointing at the Talos cluster

- name: k8s secrets provisioning
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Create media namespace secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ item.name }}"
            namespace: media
          type: Opaque
          stringData: "{{ item.data }}"
      loop:
        - name: postgres-secret
          data:
            POSTGRES_USER: "{{ mealie_postgres_user }}"
            POSTGRES_PASSWORD: "{{ mealie_postgres_password }}"
        - name: lidarr-api-key
          data:
            APIKEY: "{{ lidarr_api_key }}"
        - name: bazarr-api-key
          data:
            APIKEY: "{{ bazarr_api_key }}"
        - name: prowlarr-api-key
          data:
            APIKEY: "{{ prowlarr_api_key }}"
        - name: subgen-secrets
          data:
            HF_TOKEN: "{{ hugging_face_access_token }}"
        - name: sonarr-api-key
          data:
            APIKEY: "{{ sonarr_api_key }}"
        - name: radarr-api-key
          data:
            APIKEY: "{{ radarr_api_key }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Create cert-manager namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: cert-manager

    - name: Create cert-manager cloudflare API token secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflare-api-token
            namespace: cert-manager
          type: Opaque
          stringData:
            api-token: "{{ traefik_cf_dns_api_token }}"
      no_log: true

    - name: Create authelia namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: authelia

    - name: Create authelia env secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: authelia-env-secret
            namespace: authelia
          type: Opaque
          stringData:
            AUTHELIA_SESSION_SECRET: "{{ authelia_session_secret }}"
            AUTHELIA_STORAGE_ENCRYPTION_KEY: "{{ authelia_storage_encryption_key }}"
            AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: "{{ authelia_jwt_secret }}"
      no_log: true

    - name: Create authelia config secret (rendered configuration.yml)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: authelia-config
            namespace: authelia
          type: Opaque
          stringData:
            configuration.yml: "{{ lookup('template', 'templates/k8s/authelia-configuration.yml.j2') }}"
      no_log: true

    - name: Create authelia users ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: authelia-users
            namespace: authelia
          data:
            users_database.yml: "{{ lookup('template', 'templates/docker/authelia-users.yml.j2') }}"
