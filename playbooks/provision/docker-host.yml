---
# Provision a Docker host LXC (100: docker)
# Docker CE install and compose deployment.
# common.yml must run first (handled by site.yml and the Terraform provisioner).

- name: Docker host provisioning
  hosts: docker
  become: true
  gather_facts: true

  vars:
    compose_dir: /mnt/app_config
    docker_networks:
      - name: proxy-net
        subnet: "172.20.0.0/16"
      - name: internal-net
        subnet: "172.18.0.0/16"

  tasks:
    # --- Docker CE installation ---
    - name: Check if Docker is already installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker CE
      when: docker_check.rc != 0
      block:
        - name: Add Docker GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/debian/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

        - name: Add Docker repository
          ansible.builtin.deb822_repository:
            name: docker
            types: deb
            uris: https://download.docker.com/linux/debian
            suites: "{{ ansible_facts['distribution_release'] }}"
            components: stable
            architectures: amd64
            signed_by: /etc/apt/keyrings/docker.asc
            state: present

        - name: Install Docker CE packages
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true

        - name: Enable and start Docker
          ansible.builtin.systemd:
            name: docker
            enabled: true
            state: started

    # --- Create Docker networks ---
    - name: Create Docker networks
      community.docker.docker_network:
        name: "{{ item.name }}"
        ipam_config:
          - subnet: "{{ item.subnet }}"
        state: present
      loop: "{{ docker_networks }}"

    # --- Docker daemon config ---
    - name: Configure Docker daemon DNS and live-restore
      ansible.builtin.copy:
        content: |
          {"dns": ["192.168.7.7", "192.168.7.8"], "live-restore": true}
        dest: /etc/docker/daemon.json
        mode: "0644"
      notify: Restart Docker

    # --- Deploy configs ---
    - name: Create config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ compose_dir }}/traefik"
        - "{{ compose_dir }}/traefik/dynamic"
        - "{{ compose_dir }}/authelia"

    - name: Template .env from vault
      ansible.builtin.template:
        src: templates/docker/env.j2
        dest: "{{ compose_dir }}/.env"
        mode: "0600"

    - name: Create bazarr-sync config directory
      ansible.builtin.file:
        path: "{{ compose_dir }}/bazarr-sync"
        state: directory
        mode: "0755"

    - name: Template bazarr-sync config from vault
      ansible.builtin.template:
        src: templates/docker/bazarr-sync-config.yaml.j2
        dest: "{{ compose_dir }}/bazarr-sync/config.yaml"
        mode: "0600"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: files/docker/docker-compose.yml
        dest: "{{ compose_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Copy traefik static config
      ansible.builtin.copy:
        src: files/docker/traefik/traefik.yml
        dest: "{{ compose_dir }}/traefik/traefik.yml"
        mode: "0644"

    - name: Copy traefik dynamic configs
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ compose_dir }}/traefik/dynamic/"
        mode: "0644"
      with_fileglob:
        - files/docker/traefik/dynamic/*.yml

    - name: Template authelia config (embeds OIDC JWK key)
      ansible.builtin.template:
        src: templates/docker/authelia-configuration.yml.j2
        dest: "{{ compose_dir }}/authelia/configuration.yml"
        mode: "0644"
      notify: Restart authelia

    - name: Template authelia users database
      ansible.builtin.template:
        src: templates/docker/authelia-users.yml.j2
        dest: "{{ compose_dir }}/authelia/users_database.yml"
        mode: "0600"
      notify: Restart authelia

    - name: Ensure acme.json exists with correct permissions
      ansible.builtin.file:
        path: "{{ compose_dir }}/traefik/acme.json"
        state: touch
        mode: "0600"
        modification_time: preserve
        access_time: preserve

    - name: Create traefik log directory
      ansible.builtin.file:
        path: "{{ compose_dir }}/traefik/logs"
        state: directory
        mode: "0755"

    - name: Create homepage config directory
      ansible.builtin.file:
        path: "{{ compose_dir }}/homepage"
        state: directory
        mode: "0755"

    - name: Deploy homepage config files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ compose_dir }}/homepage/"
        mode: "0644"
      with_fileglob:
        - files/docker/homepage/*.yaml

    # postgres:18 changed the mount layout — data now lives at 18/main inside
    # the /var/lib/postgresql mount point. Migrate if not already done.
    - name: Create postgres:18 parent directory
      ansible.builtin.file:
        path: "{{ compose_dir }}/mealie-pg/18"
        state: directory
        mode: "0700"
        owner: "999"
        group: "999"

    - name: Check if data still at old layout
      ansible.builtin.stat:
        path: "{{ compose_dir }}/mealie-pgdata/PG_VERSION"
      register: pg_old

    - name: Stop postgres before data layout migration
      ansible.builtin.command:
        cmd: docker stop postgres
      changed_when: true
      ignore_errors: true
      when: pg_old.stat.exists

    - name: Move mealie-pgdata to postgres:18 layout (atomic rename)
      ansible.builtin.command:
        cmd: mv {{ compose_dir }}/mealie-pgdata {{ compose_dir }}/mealie-pg/18/main
      when: pg_old.stat.exists

    - name: Fix ownership on postgres data directory
      ansible.builtin.file:
        path: "{{ compose_dir }}/mealie-pg"
        state: directory
        owner: "999"
        group: "999"
        recurse: false

    - name: Start Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ compose_dir }}"
      changed_when: true
      register: compose_result
      ignore_errors: true

    - name: Fail if compose failed for reasons other than postgres healthcheck
      ansible.builtin.fail:
        msg: "docker compose up failed: {{ compose_result.stderr | default('') }}"
      when:
        - compose_result.failed
        - "'postgres' not in (compose_result.stderr | default(''))"

    # --- Arr app authentication ---
    # Sets External auth so apps trust the Remote-User header from Authelia
    # forward auth instead of showing their own login prompt.
    - name: Set External authentication in arr config.xml
      ansible.builtin.replace:
        path: "{{ compose_dir }}/{{ item }}/config.xml"
        regexp: '<AuthenticationMethod>[^<]*</AuthenticationMethod>'
        replace: '<AuthenticationMethod>External</AuthenticationMethod>'
      loop:
        - sonarr
        - radarr
        - prowlarr
        - lidarr
      notify: Restart arr containers

    - name: Restart authelia to load OIDC config
      ansible.builtin.command:
        cmd: docker restart authelia
      changed_when: true

    # --- WireGuard (tunnel to VPS proxy) ---
    - name: Install wireguard-tools
      ansible.builtin.apt:
        name: wireguard-tools
        state: present
      tags: wireguard

    - name: Deploy Nest WireGuard config
      ansible.builtin.template:
        src: templates/wireguard/wg0-nest.conf.j2
        dest: /etc/wireguard/wg0.conf
        mode: "0600"
      notify: Restart WireGuard nest
      tags: wireguard

    - name: Enable and start WireGuard
      ansible.builtin.systemd:
        name: wg-quick@wg0
        enabled: true
        state: started
      tags: wireguard

    - name: Enable IP forwarding for WireGuard routing
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_file: /etc/sysctl.d/99-wg-forward.conf
        reload: true
      tags: wireguard

    - name: Deploy WireGuard masquerade systemd unit
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=WireGuard to LAN masquerade rule
          After=network.target docker.service wg-quick@wg0.service
          Wants=wg-quick@wg0.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/sh -c '\
            iptables -t nat -C POSTROUTING -o eth0 -s 10.10.0.0/24 -j MASQUERADE 2>/dev/null || iptables -t nat -A POSTROUTING -o eth0 -s 10.10.0.0/24 -j MASQUERADE; \
            iptables -t nat -C POSTROUTING -o wg0 -j MASQUERADE 2>/dev/null || iptables -t nat -A POSTROUTING -o wg0 -j MASQUERADE; \
            iptables -C FORWARD -i eth0 -o wg0 -j ACCEPT 2>/dev/null || iptables -I FORWARD 1 -i eth0 -o wg0 -j ACCEPT; \
            iptables -C FORWARD -i wg0 -o eth0 -j ACCEPT 2>/dev/null || iptables -I FORWARD 2 -i wg0 -o eth0 -j ACCEPT'
          ExecStop=/bin/sh -c '\
            iptables -t nat -D POSTROUTING -o eth0 -s 10.10.0.0/24 -j MASQUERADE 2>/dev/null || true; \
            iptables -t nat -D POSTROUTING -o wg0 -j MASQUERADE 2>/dev/null || true; \
            iptables -D FORWARD -i eth0 -o wg0 -j ACCEPT 2>/dev/null || true; \
            iptables -D FORWARD -i wg0 -o eth0 -j ACCEPT 2>/dev/null || true'

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/wg-masquerade.service
        mode: "0644"
      notify: Reload systemd
      tags: wireguard

    - name: Enable and start WireGuard masquerade service
      ansible.builtin.systemd:
        name: wg-masquerade
        enabled: true
        state: started
        daemon_reload: true
      tags: wireguard

    # --- fail2ban ---
    - name: Install fail2ban and rsyslog
      ansible.builtin.apt:
        name:
          - fail2ban
          - rsyslog
        state: present
        update_cache: true
      tags: fail2ban

    - name: Enable and start rsyslog
      ansible.builtin.systemd:
        name: rsyslog
        enabled: true
        state: started
      tags: fail2ban

    - name: Deploy fail2ban jail config
      ansible.builtin.template:
        src: templates/fail2ban/jail.local.j2
        dest: /etc/fail2ban/jail.local
        mode: "0644"
      notify: Reload fail2ban
      tags: fail2ban

    - name: Deploy fail2ban traefik filter
      ansible.builtin.template:
        src: templates/fail2ban/filter.d/traefik.conf.j2
        dest: /etc/fail2ban/filter.d/traefik.conf
        mode: "0644"
      notify: Reload fail2ban
      tags: fail2ban

    - name: Enable and start fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started
      tags: fail2ban

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: reloaded

    - name: Restart WireGuard nest
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: restarted

    - name: Restart authelia
      ansible.builtin.command:
        cmd: docker restart authelia
      changed_when: true

    - name: Restart postgres
      ansible.builtin.command:
        cmd: docker restart postgres
      changed_when: true

    - name: Restart arr containers
      ansible.builtin.command:
        cmd: docker restart sonarr radarr prowlarr lidarr
      changed_when: true
