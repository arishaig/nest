groups:
  - name: watchdog
    rules:
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: watchdog
        annotations:
          summary: "Alerting pipeline is operational"
          description: "Weekly confirmation that Prometheus → Alertmanager → HA → phone is working."

  - name: hosts
    rules:
      - alert: HostDown
        expr: up{job=~"node|vps"} == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Host {{ $labels.instance }} is down"
          description: "node_exporter on {{ $labels.instance }} has been unreachable for 2 minutes."

      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.0f\" $value }}% for 10 minutes."

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.0f\" $value }}% for 2 hours."

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"} / node_filesystem_size_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "{{ $labels.mountpoint }} is {{ printf \"%.0f\" $value }}% full."

      - alert: DiskSpaceCritical
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"} / node_filesystem_size_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critical on {{ $labels.instance }}"
          description: "{{ $labels.mountpoint }} is {{ printf \"%.0f\" $value }}% full."

      - alert: DiskReadonly
        expr: node_filesystem_readonly{fstype!~"tmpfs|fuse.lxcfs|squashfs|erofs"} == 1
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem read-only on {{ $labels.instance }}"
          description: "{{ $labels.mountpoint }} has been mounted read-only."

  - name: services
    rules:
      - alert: CAdvisorDown
        expr: up{job="cadvisor"} == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "cAdvisor unreachable on {{ $labels.instance }}"
          description: "Cannot scrape container metrics from {{ $labels.instance }}."

      - alert: ContainerDown
        expr: |
          time() - container_last_seen{
            job="cadvisor",
            image!="",
            name=~"/.+"
          } > 120
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container {{ $labels.name }} on {{ $labels.instance }} has not been seen for over 2 minutes."

      - alert: ContainerRestarting
        expr: |
          changes(container_start_time_seconds{
            job="cadvisor",
            image!="",
            name=~"/.+"
          }[15m]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} is crash-looping"
          description: "Container {{ $labels.name }} on {{ $labels.instance }} has restarted {{ $value | printf \"%.0f\" }} times in the last 15 minutes."

      - alert: ProxmoxNodeDown
        expr: up{job="proxmox"} == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox exporter unreachable"
          description: "pve-exporter has been unreachable for 2 minutes."

      - alert: AdGuardDown
        expr: up{job="adguard"} == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "AdGuard Home down ({{ $labels.dns_role }})"
          description: "AdGuard Home exporter ({{ $labels.dns_role }}, {{ $labels.instance }}) has been unreachable for 2 minutes."

      - alert: QBittorrentDown
        expr: up{job="qbittorrent"} == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "qBittorrent exporter is down"
          description: "qBittorrent metrics have been unreachable for 5 minutes."

      - alert: HomeAssistantDown
        expr: absent_over_time(alloy_build_info{servername="HomeAssistant"}[30m])
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Home Assistant metrics are down"
          description: "No metrics received from Grafana Alloy on Home Assistant in the last 10 minutes."

      - alert: ZFSPoolDegraded
        expr: node_zfs_zpool_state{instance="proxmox.local.arishaig.site", state=~"degraded|faulted|suspended|unavail"} == 1
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "ZFS pool {{ $labels.zpool }} is {{ $labels.state }}"
          description: "ZFS pool {{ $labels.zpool }} on proxmox entered state {{ $labels.state }}."

      - alert: UnboundDown
        expr: unbound_up == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Unbound is down ({{ $labels.dns_role }}, {{ $labels.instance }})"
          description: "Unbound recursive resolver ({{ $labels.dns_role }}, {{ $labels.instance }}) has been unreachable for 2 minutes. DNS resolution may be degraded."

      - alert: OOMKill
        expr: increase(node_vmstat_oom_kill[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "OOM kill on {{ $labels.instance }}"
          description: "A process was OOM-killed on {{ $labels.instance }}."

      - alert: TraefikVPSDown
        expr: up{job="traefik-vps"} == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "VPS Traefik proxy is down"
          description: "Traefik on the VPS proxy has been unreachable for 2 minutes. All inbound traffic through the VPS is broken."

      - alert: TraefikK8sDown
        expr: up{job="traefik-k8s"} == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "k8s Traefik ingress is down"
          description: "Traefik on the Talos k8s node has been unreachable for 2 minutes. All cluster ingress is broken."

      - alert: AutheliaDown
        expr: up{job="authelia"} == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Authelia is down"
          description: "Authelia metrics endpoint has been unreachable for 2 minutes. Authentication for all protected services is broken."

      - alert: PBSBackupStale
        expr: time() - pbs_backup_last_snapshot_timestamp_seconds > 30 * 3600
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "PBS backup stale for {{ $labels.guest_type }}/{{ $labels.guest }}"
          description: "No new PBS backup for {{ $labels.guest_type }}/{{ $labels.guest }} in over 30 hours (newest is {{ $value | humanizeDuration }} old)."

  - name: endpoints
    rules:
      - alert: ExternalEndpointDown
        expr: probe_success{job="blackbox"} == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "External endpoint {{ $labels.instance }} is unreachable"
          description: "{{ $labels.instance }} has been unreachable for 2 minutes. DNS, Cloudflare, VPS proxy, or the service itself may be down."

  - name: network
    rules:
      - alert: UnpollerNoData
        expr: absent(unpoller_client_uptime_seconds)
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Unpoller is not collecting client metrics"
          description: "No unpoller_client_uptime_seconds series for 5 minutes — unpoller may be failing to reach the UniFi controller."

  - name: media
    rules:
      - alert: MediaAppDown
        expr: up{job=~"sonarr|radarr|lidarr|prowlarr|bazarr"} == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been unreachable for 5 minutes."

  - name: logging
    rules:
      # Replaces the old self-referential LokiIngestionBackpressure ruler alert.
      # loki_discarded_samples_total is the authoritative drop counter (by reason),
      # so this catches real rate-limit/per-stream drops that the log-scrape never did.
      - alert: LokiDiscardingLogs
        expr: sum(increase(loki_discarded_samples_total[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki is discarding log samples"
          description: "Loki has dropped {{ $value | printf \"%.0f\" }} log samples in the last 15 minutes (rate or per-stream limits). Log-based alerts may be unreliable; check loki_discarded_samples_total by reason."
