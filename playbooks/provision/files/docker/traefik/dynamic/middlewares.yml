http:
  middlewares:
    rate-limit:
      rateLimit:
        average: 200
        burst: 100
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1

    local-only:
      ipAllowList:
        sourceRange:
          - "192.168.0.0/16"

    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/authz/forward-auth"
        trustForwardHeader: true
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Email"
        maxResponseBodySize: 1048576
