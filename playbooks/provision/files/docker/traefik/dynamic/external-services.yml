      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    proxmox:
      rule: "Host(`proxmox.arishaig.site`)"
      entryPoints: [websecure]
      service: proxmox
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    # FoundryVTT — no authelia@file; Foundry has its own auth
    foundry:
      rule: "Host(`foundry.arishaig.site`)"
      entryPoints: [websecure]
      service: foundry
      tls:
        certResolver: cloudflare

    tdarr:
      rule: "Host(`tdarr.arishaig.site`)"
      entryPoints: [websecure]
      service: tdarr
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    # MCP server — no authelia@file; validates Bearer JWT itself
    nest-mcp:
      rule: "Host(`mcp.arishaig.site`)"
      entryPoints: [websecure]
      service: nest-mcp
      tls:
        certResolver: cloudflare

    # --- Authelia-free .local. routes (direct app access) ---
