      entryPoints: [websecure]
      service: backlight
      tls:
        certResolver: cloudflare

    musicbrainz-local:
      rule: "Host(`musicbrainz.local.arishaig.site`)"
      entryPoints: [websecure]
      service: musicbrainz
      tls:
        certResolver: cloudflare

    # --- k8s-migrated services ---
    jellyfin:
      rule: "Host(`jellyfin.arishaig.site`)"
      entryPoints: [websecure]
      service: jellyfin
      tls:
        certResolver: cloudflare

    lidarr:
