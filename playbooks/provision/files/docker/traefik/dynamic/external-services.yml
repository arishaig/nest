http:
  routers:
    monitoring:
      rule: "Host(`monitoring.arishaig.site`)"
      entryPoints: [websecure]
      service: monitoring
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    backup:
      rule: "Host(`backup.arishaig.site`)"
      entryPoints: [websecure]
      service: backup
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    scrutiny:
      rule: "Host(`scrutiny.arishaig.site`)"
      entryPoints: [websecure]
      service: scrutiny
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    torrent:
