http:
  routers:
    monitoring:
      rule: "Host(`monitoring.arishaig.site`)"
      entryPoints: [websecure]
      service: monitoring
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    backup:
      rule: "Host(`backup.arishaig.site`)"
      entryPoints: [websecure]
      service: backup
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    scrutiny:
      rule: "Host(`scrutiny.arishaig.site`)"
      entryPoints: [websecure]
      service: scrutiny
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    torrent:
      rule: "Host(`torrent.arishaig.site`)"
      entryPoints: [websecure]
      service: torrent
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    proxmox:
      rule: "Host(`proxmox.arishaig.site`)"
      entryPoints: [websecure]
      service: proxmox
      middlewares: [authelia@file]
      tls:
        certResolver: cloudflare

    # FoundryVTT — no authelia@file; Foundry has its own auth
    foundry:
      rule: "Host(`foundry.arishaig.site`)"
      entryPoints: [websecure]
      service: foundry
      tls:
        certResolver: cloudflare

    # MCP server — no authelia@file; validates Bearer JWT itself
    nest-mcp:
      rule: "Host(`mcp.arishaig.site`)"
      entryPoints: [websecure]
      service: nest-mcp
      tls:
        certResolver: cloudflare

    # --- Authelia-free .local. routes (direct app access) ---
    torrent-local:
      rule: "Host(`torrent.local.arishaig.site`)"
      entryPoints: [websecure]
      service: torrent
      tls:
        certResolver: cloudflare

    scrutiny-local:
      rule: "Host(`scrutiny.local.arishaig.site`)"
      entryPoints: [websecure]
      service: scrutiny
      tls:
        certResolver: cloudflare

    backlight-local:
      rule: "Host(`backlight.local.arishaig.site`)"
      entryPoints: [websecure]
      service: backlight
      tls:
        certResolver: cloudflare

    musicbrainz-local:
      rule: "Host(`musicbrainz.local.arishaig.site`)"
      entryPoints: [websecure]
      service: musicbrainz
      tls:
        certResolver: cloudflare

  services:
    monitoring:
      loadBalancer:
        servers:
          - url: "http://192.168.1.44:3000"

    backup:
      loadBalancer:
        serversTransport: skipVerify
        servers:
          - url: "https://192.168.1.113:8007"

    scrutiny:
      loadBalancer:
        servers:
          - url: "http://192.168.1.46:8888"

    torrent:
      loadBalancer:
        servers:
          - url: "http://192.168.1.182:8090"

    proxmox:
      loadBalancer:
        serversTransport: skipVerify
        servers:
          - url: "https://192.168.1.16:8006"

    backlight:
      loadBalancer:
        servers:
          - url: "http://192.168.4.97:80"

    musicbrainz:
      loadBalancer:
        servers:
          - url: "http://192.168.1.197:80"

    foundry:
      loadBalancer:
        servers:
          - url: "http://192.168.1.21:30000"

    nest-mcp:
      loadBalancer:
        servers:
          - url: "http://192.168.1.19:8765"

    foundry:
      loadBalancer:
        servers:
          - url: "http://192.168.1.20:30000"

  serversTransports:
    skipVerify:
      insecureSkipVerify: true
