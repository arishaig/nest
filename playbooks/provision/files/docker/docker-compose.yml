services:
  ##### *arr Stack Media Apps #####

  # Bazarr — migrated to k8s (k8s/apps/media/bazarr-*.yaml)
  # bazarr: ...

  # Bazarr-Sync - Bulk subtitle sync CLI for Bazarr
  bazarr-sync:
    image: ghcr.io/ajmandourah/bazarr-sync:v0.3.1
    container_name: bazarr-sync
    profiles:
      - tools
    volumes:
      - /mnt/app_config/bazarr-sync/config.yaml:/usr/src/app/config.yaml:ro
    networks:
      - default
    restart: "no"

  # Jellyfin - Media Server
  jellyfin:
    image: linuxserver/jellyfin:10.11.10
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/jellyfin:/config
      - /mnt/media_root:/data
    ports:
      - 8096:8096
    networks:
      - default
      - proxy-net
    labels:
      # No Authelia middleware in otder to support clients that cannot handle auth redirects
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.arishaig.site`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      #- "traefik.http.routers.jellyfin.middlewares=authelia@file"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    healthcheck:
      test: curl -sf http://localhost:8096/System/Ping
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Lidarr — migrated to k8s (k8s/apps/media/lidarr-*.yaml)
  # lidarr:
  #   image: ghcr.io/linuxserver-labs/prarr:lidarr-plugins
  #   container_name: lidarr
  #   ... (see k8s/apps/media/lidarr-deployment.yaml)

  # MediaLyze - Analyze media formats and sizes
  medialyze:
    image: ghcr.io/frederikemmer/medialyze:latest
    container_name: medialyze
    environment:
      - TZ=America/Los_Angeles
    expose:
      - 8080
    volumes:
      - /mnt/app_config/medialyze:/config
      - /mnt/media_root:/media:ro
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.medialyze.rule=Host(`medialyze.arishaig.site`)"
      - "traefik.http.routers.medialyze.entrypoints=websecure"
      - "traefik.http.routers.medialyze.tls=true"
      - "traefik.http.routers.medialyze.middlewares=authelia@file"
      - "traefik.http.services.medialyze.loadbalancer.server.port=8080"
    restart: unless-stopped

  # MeTube — migrated to k8s (k8s/apps/media/metube-*.yaml)
  # metube: ...

  # Prowlarr — migrated to k8s (k8s/apps/media/prowlarr-*.yaml)
  # prowlarr: ...

  # Radarr — migrated to k8s (k8s/apps/media/radarr-*.yaml)
  # radarr: ...

  # Recommendarr - Recommends content
  recommendarr:
    image: tannermiddleton/recommendarr:v1.4.4
    container_name: recommendarr
    user: "1000:1000"
    expose:
      - "3000"
    volumes:
      - /mnt/app_config/recommendarr:/app/server/data
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.recommendarr.rule=Host(`recommendarr.arishaig.site`)"
      - "traefik.http.routers.recommendarr.entrypoints=websecure"
      - "traefik.http.routers.recommendarr.tls=true"
      - "traefik.http.routers.recommendarr.middlewares=authelia@file"
      - "traefik.http.services.recommendarr.loadbalancer.server.port=3000"
    restart: unless-stopped

  # Recyclarr - TRaSH Guide Settings Sync
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:7.3.0
    container_name: recyclarr
    user: 1000:1000
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/recyclarr:/config
    restart: unless-stopped

  # SABnzbd - Usenet Download Client
  sabnzbd:
    image: linuxserver/sabnzbd:5.0.3
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/sabnzbd:/config
      - /mnt/media_root:/data
      - /opt/sabnzbd-incomplete:/incomplete
    expose:
      - "8080"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd.rule=Host(`nzbd.arishaig.site`)"
      - "traefik.http.routers.sabnzbd.entrypoints=websecure"
      - "traefik.http.routers.sabnzbd.tls=true"
      - "traefik.http.routers.sabnzbd.middlewares=authelia@file"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/api?mode=version || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Seerr - Request management
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.3.0
    container_name: seerr
    init: true
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/seerr:/app/config
    expose:
      - "5055"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`seerr.arishaig.site`) || Host(`requests.arishaig.site`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls=true"
      # No Authelia middleware to support external users
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  # Sonarr - TV Series Management
  # Sonarr — migrated to k8s (k8s/apps/media/sonarr-*.yaml)
  # sonarr: ...

  # Storyteller - Ebook/audiobook library and readalong processor
  storyteller:
    image: registry.gitlab.com/storyteller-platform/storyteller:latest
    container_name: storyteller
    volumes:
      - /mnt/app_config/storyteller:/config:rw
      - /mnt/media_root/storyteller:/data:rw
      - /mnt/media_root/media/books:/books:rw
    environment:
      - STORYTELLER_DB_DIR=/config
      - STORYTELLER_DATA_DIR=/data
      - STORYTELLER_SECRET_KEY=${STORYTELLER_SECRET_KEY}
    expose:
      - "8001"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storyteller.rule=Host(`storyteller.arishaig.site`)"
      - "traefik.http.routers.storyteller.entrypoints=websecure"
      - "traefik.http.routers.storyteller.tls=true"
      - "traefik.http.routers.storyteller.middlewares=authelia@file"
      - "traefik.http.services.storyteller.loadbalancer.server.port=8001"
      - "traefik.http.routers.storyteller-local.rule=Host(`storyteller.local.arishaig.site`)"
      - "traefik.http.routers.storyteller-local.entrypoints=websecure"
      - "traefik.http.routers.storyteller-local.tls=true"
      - "traefik.http.routers.storyteller-local.tls.certresolver=cloudflare"
      - "traefik.http.routers.storyteller-local.service=storyteller"
    restart: unless-stopped

  # Subgen (Whisper AI subtitle gen) — migrated to k8s (k8s/apps/media/subgen-*.yaml)
  # subgen: ...

  # Tdarr - Automated transcoding server
  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:2.50.01
    restart: unless-stopped
    network_mode: bridge
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    environment:
      - TZ=America/Los_Angeles
      - PUID=1000
      - PGID=1000
      - inContainer=true
    volumes:
      - /mnt/app_config/tdarr/server:/app/server
      - /mnt/app_config/tdarr/configs:/app/configs
      - /mnt/app_config/tdarr/logs:/app/logs
      - /mnt/media_root:/media
      - /opt/transcode_cache:/temp

  # Tdarr - Automated transcoding node
  tdarr-node:
    container_name: tdarr-node
    image: ghcr.io/haveagitgat/tdarr_node:2.50.02
    restart: unless-stopped
    network_mode: service:tdarr
    environment:
      - TZ=America/Los_Angeles
      - PUID=1000
      - PGID=1000
      - serverPort=8266
      - inContainer=true
    volumes:
      - /mnt/app_config/tdarr/configs:/app/configs
      - /mnt/app_config/tdarr/logs:/app/logs
      - /mnt/media_root:/media
      - /opt/transcode_cache:/temp

  # Tunarr - Create TV channels from local media
  tunarr:
    image: chrisbenincasa/tunarr:1.3.5
    container_name: tunarr
    # Uncomment if using the Nvidia container
    # runtime: nvidia
    environment:
      - LOG_LEVEL=${TUNARR_LOG_LEVEL:-INFO}
      - TZ=America/Los_Angeles
      # Uncomment if you'd like to adjust default config path
      # - TUNARR_DATABASE_PATH=/your/path/tunarr
    volumes:
      - /mnt/app_config/tunarr/data:/config/tunarr
    expose:
      - "8000"
    networks:
      - default
      - proxy-net
    labels:
      # Remove Authelia so that Jellyfin can communicate with Tunarr
      - "traefik.enable=true"
      - "traefik.http.routers.tunarr.rule=Host(`tunarr.arishaig.site`)"
      - "traefik.http.routers.tunarr.entrypoints=websecure"
      - "traefik.http.routers.tunarr.tls=true"
      - "traefik.http.routers.tunarr.middlewares=local-only@file"
      - "traefik.http.services.tunarr.loadbalancer.server.port=8000"
    restart: unless-stopped

  # Watcharr - Watchlist and view tracking
  watcharr:
    image: ghcr.io/sbondco/watcharr:v3.0.1
    container_name: watcharr
    expose:
      - "3080"
    volumes:
      - /mnt/app_config/watcharr:/data
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.watcharr.rule=Host(`watcharr.arishaig.site`)"
      - "traefik.http.routers.watcharr.entrypoints=websecure"
      - "traefik.http.routers.watcharr.tls=true"
      - "traefik.http.routers.watcharr.middlewares=local-only@file"
      - "traefik.http.services.watcharr.loadbalancer.server.port=3080"
    restart: unless-stopped

  watchback:
    image: ghcr.io/arishaig/watchback:latest
    container_name: watchback
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/app_config/watchback/config:/config
      - /mnt/app_config/watchback/static:/static
    expose:
      - "8484"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.watchback.rule=Host(`watchback.arishaig.site`)"
      - "traefik.http.routers.watchback.entrypoints=websecure"
      - "traefik.http.routers.watchback.tls=true"
      - "traefik.http.routers.watchback.middlewares=authelia@file"
      - "traefik.http.services.watchback.loadbalancer.server.port=8484"
    restart: unless-stopped

  ##### Monitoring and Dashboard Apps #####

  # Glances - System monitoring
  glances:
    image: nicolargo/glances:4.5.4
    container_name: glances
    expose:
      - "61208"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
    environment:
      - GLANCES_OPT=-w
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glances.rule=Host(`glances.arishaig.site`)"
      - "traefik.http.routers.glances.entrypoints=websecure"
      - "traefik.http.routers.glances.tls=true"
      - "traefik.http.routers.glances.middlewares=authelia@file"
      - "traefik.http.services.glances.loadbalancer.server.port=61208"
    restart: unless-stopped

  # Homepage - Dashboard
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.4.5
    container_name: homepage
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=dash.arishaig.site,localhost:3000
    volumes:
      - /mnt/app_config/homepage:/app/config
      - /mnt/app_config:/mnt/app_config:ro
      - /mnt/media_root:/mnt/media_root:ro
    expose:
      - "3000"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`dash.arishaig.site`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.routers.homepage.middlewares=authelia@file"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
    healthcheck:
      disable: true
    restart: unless-stopped


  ##### Other Apps #####

  # Copyparty - Simple file access
  copyparty:
    image: copyparty/ac:1.20.16
    container_name: copyparty
    command: --acao https://copyparty.arishaig.site
    expose:
      - "3923"
    volumes:
      - /mnt/app_config/copyparty:/cfg
      - /mnt/media_root:/w
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.copyparty.rule=Host(`copyparty.arishaig.site`)"
      - "traefik.http.routers.copyparty.entrypoints=websecure"
      - "traefik.http.routers.copyparty.tls=true"
      - "traefik.http.routers.copyparty.middlewares=authelia@file"
      - "traefik.http.services.copyparty.loadbalancer.server.port=3923"
    restart: unless-stopped

  # Mealie - Recipe tracker
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.19.2
    container_name: mealie
    ports:
      - "9001:9000"
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - /mnt/app_config/mealie-data:/app/data/
    environment:
      - ALLOW_SIGNUP=false
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - BASE_URL=https://mealie.arishaig.site
      - DB_ENGINE=postgres
      - OIDC_AUTH_ENABLED=true
      - OIDC_SIGNUP_ENABLED=true
      - OIDC_CONFIGURATION_URL=https://auth.arishaig.site/.well-known/openid-configuration
      - OIDC_CLIENT_ID=mealie
      - OIDC_CLIENT_SECRET=${MEALIE_OIDC_CLIENT_SECRET}
      - OIDC_PROVIDER_NAME=Authelia
      - OIDC_AUTO_REDIRECT=false
      - OIDC_SIGNING_ALGORITHM=RS256
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mealie
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mealie.rule=Host(`mealie.arishaig.site`)"
      - "traefik.http.routers.mealie.entrypoints=websecure"
      - "traefik.http.routers.mealie.tls=true"
      - "traefik.http.routers.mealie.middlewares=authelia@file"
      - "traefik.http.services.mealie.loadbalancer.server.port=9000"
    healthcheck:
      test: curl -sf http://localhost:9000/api/app/about
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # Postgres - Database for Mealie
  postgres:
    image: postgres:18.4
    container_name: postgres
    restart: unless-stopped
    volumes:
      - /mnt/app_config/mealie-pg:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - PGUSER=${POSTGRES_USER}
      - PGDATA=/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 30s
      timeout: 20s
      retries: 3

  ##### Monitoring Exporters #####

  # Docker monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    restart: unless-stopped
    healthcheck:
      disable: true
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /etc/machine-id:/etc/machine-id:ro
    devices:
      - /dev/kmsg

  # exportarr-bazarr — migrated to k8s alongside bazarr (k8s/apps/media/bazarr-deployment.yaml)
  # exportarr-bazarr: ...

  # exportarr-lidarr — migrated to k8s alongside lidarr (k8s/apps/media/lidarr-deployment.yaml)
  # exportarr-lidarr: ...

  # exportarr-prowlarr — migrated to k8s alongside prowlarr (k8s/apps/media/prowlarr-deployment.yaml)
  # exportarr-prowlarr: ...

  # exportarr-radarr — migrated to k8s alongside radarr (k8s/apps/media/radarr-deployment.yaml)
  # exportarr-radarr: ...

  # exportarr-sonarr — migrated to k8s alongside sonarr (k8s/apps/media/sonarr-deployment.yaml)
  # exportarr-sonarr: ...

  # Proxmox node monitoring
  ##### Networking and Auth Infrastructure #####

  authelia:
    image: authelia/authelia:4.39.20
    container_name: authelia
    networks:
      - proxy-net
    expose:
      - "9091"
    environment:
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}
    volumes:
      - /mnt/app_config/authelia:/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:9091/api/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.arishaig.site`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls=true"
      - "traefik.http.routers.authelia.tls.certresolver=cloudflare"
      - "traefik.http.routers.authelia.tls.domains[0].main=arishaig.site"
      - "traefik.http.routers.authelia.tls.domains[0].sans=*.arishaig.site"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:8.8.0-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - /mnt/app_config/redis:/data
    networks:
      - proxy-net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.84.0
    container_name: redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - proxy-net
    ports:
      - "9121:9121"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable
    ports:
      - "9187:9187"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  qbittorrent-exporter:
    image: ghcr.io/martabal/qbittorrent-exporter:v2.0.1
    container_name: qbittorrent-exporter
    environment:
      - QBITTORRENT_BASE_URL=http://192.168.1.182:8090
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD}
      # qBittorrent >= 5.2.0 renamed the WebUI session cookie from SID to
      # QBT_SID_<webui_port>; without this the exporter loops on
      # "Cookie changed, trying to reconnect" and /metrics returns 503.
      - QBITTORRENT_COOKIE_NAME=QBT_SID_8090
      - EXPORTER_PORT=9022
    ports:
      - "9022:9022"
    restart: unless-stopped

  # Dynamic DNS — migrated to k8s (k8s/apps/cloudflare-ddns/)
  # cloudflare-ddns:
  #   image: favonia/cloudflare-ddns:1.16.2
  #   container_name: cloudflare-ddns
  #   restart: always
  #   read_only: true
  #   cap_drop:
  #     - ALL
  #   security_opt:
  #     - no-new-privileges:true
  #   environment:
  #     - CF_API_TOKEN=${CLOUDFLARE_DYNAMIC_DNS_API_TOKEN}
  #     - DOMAINS=vpn.arishaig.site
  #     - PROXIED=false
  #     - TTL=300

  # FlareSolverr — migrated to k8s (k8s/apps/media/flaresolverr-*.yaml)
  # ClusterIP only; prowlarr pod resolves flaresolverr:8191 via cluster DNS
  # flaresolverr: ...

  traefik:
    image: traefik:v3.7.1
    container_name: traefik
    ports:
      - "443:443"
      - "80:80"
    networks:
      - proxy-net
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_TRAEFIK_API_TOKEN}
    volumes:
      - /mnt/app_config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /mnt/app_config/traefik/dynamic:/etc/traefik/dynamic:ro
      - /mnt/app_config/traefik/acme.json:/etc/traefik/acme.json
      - /mnt/app_config/traefik/logs:/var/log/traefik
    restart: unless-stopped

  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: socket-proxy
    environment:
      - CONTAINERS=1
      - SERVICES=0
      - TASKS=0
      - NETWORKS=0
      - NODES=0
      - VOLUMES=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy-net
    expose:
      - "2375"
    restart: unless-stopped

networks:
  default:
    name: internal-net
    external: true
  proxy-net:
    name: proxy-net
    external: true