# =============================================================================
# REMOVED SERVICES (retrieve full config from git history)
# =============================================================================
# satisfactory-server (wolveix/satisfactory-server:latest)
#   - Game server, removed 2025-02-11
#   - Ports: 7777/tcp+udp, 8888/tcp
#   - Config: /mnt/app_config/satisfactory-server
#   - Memory: 4-12GB reserved
#
# qbittorrent (linuxserver/qbittorrent:latest)
#   - Torrent client, removed 2025-02-11
#   - Ports: 8080, 6881/tcp+udp
#   - Config: /mnt/app_config/qbittorrent
#
# calibre (lscr.io/linuxserver/calibre:latest)
#   - Desktop GUI for ebook management, removed 2025-02-11
#   - Ports: 8082, 8081
#   - Config: /mnt/app_config/calibre
# =============================================================================

services:
  ##### *arr Stack Media Apps #####

  # Audiobookshelf - Audiobook Hosting
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    expose:
      - "80"
    volumes:
      - /mnt/media_root/media/audiobooks:/audiobooks
      - /mnt/media_root/media/podcasts:/podcasts
      - /mnt/app_config/audiobookshelf/config:/config
      - /mnt/app_config/audiobookshelf/metadata:/metadata
    networks:
      - default
      - proxy-net
    labels:
      # No Authelia middleware to support mobile app
      - "traefik.enable=true"
      - "traefik.http.routers.audiobookshelf.rule=Host(`audiobooks.arishaig.site`)"
      - "traefik.http.routers.audiobookshelf.entrypoints=websecure"
      - "traefik.http.routers.audiobookshelf.tls=true"
      # - "traefik.http.routers.audiobookshelf.middlewares=authelia@file"
      - "traefik.http.services.audiobookshelf.loadbalancer.server.port=80"
    restart: unless-stopped

  # Bazarr - Subtitle Management
  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/bazarr:/config
      - /mnt/media_root:/data
    expose:
      - "6767"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.arishaig.site`)"
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.tls=true"
      - "traefik.http.routers.bazarr.middlewares=authelia@file"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
    restart: unless-stopped

  # Jellyfin - Media Server
  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/jellyfin:/config
      - /mnt/media_root:/data
    ports:
      - 8096:8096
    networks:
      - default
      - proxy-net
    labels:
      # No Authelia middleware in otder to support clients that cannot handle auth redirects
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.arishaig.site`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      #- "traefik.http.routers.jellyfin.middlewares=authelia@file"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    restart: unless-stopped

  # Jellyseerr - Request management
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/jellyseerr:/app/config
    expose:
      - "5055"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.arishaig.site`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls=true"
      - "traefik.http.routers.jellyseerr.middlewares=authelia@file"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
    restart: unless-stopped

  # Lidarr - Music Management
  lidarr:
    image: ghcr.io/linuxserver-labs/prarr:lidarr-plugins
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/lidarr:/config
      - /mnt/media_root:/data
    expose:
      - "8686"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.arishaig.site`)"
      - "traefik.http.routers.lidarr.entrypoints=websecure"
      - "traefik.http.routers.lidarr.tls=true"
      - "traefik.http.routers.lidarr.middlewares=authelia@file"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
    restart: unless-stopped

  # MediaLyze - Analyze media formats and sizes
  medialyze:
    image: ghcr.io/frederikemmer/medialyze:latest
    container_name: medialyze
    environment:
      - TZ=America/Los_Angeles
    expose:
      - 8080
    volumes:
      - /mnt/app_config/medialyze:/config
      - /mnt/media_root:/media:ro
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.medialyze.rule=Host(`medialyze.arishaig.site`)"
      - "traefik.http.routers.medialyze.entrypoints=websecure"
      - "traefik.http.routers.medialyze.tls=true"
      - "traefik.http.routers.medialyze.middlewares=authelia@file"
      - "traefik.http.services.medialyze.loadbalancer.server.port=9696"
    restart: unless-stopped

  # Prowlarr - Indexer Management
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/prowlarr:/config
    expose:
      - "9696"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.arishaig.site`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.middlewares=authelia@file"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    restart: unless-stopped

  # Radarr - Movie Management
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/radarr:/config
      - /mnt/media_root:/data
    expose:
      - "7878"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.arishaig.site`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.middlewares=authelia@file"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    restart: unless-stopped

  # Recommendarr - Recommends content
  recommendarr:
    image: tannermiddleton/recommendarr:latest
    container_name: recommendarr
    user: "1000:1000"
    expose:
      - "3000"
    volumes:
      - /mnt/app_config/recommendarr:/app/server/data
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.recommendarr.rule=Host(`recommendarr.arishaig.site`)"
      - "traefik.http.routers.recommendarr.entrypoints=websecure"
      - "traefik.http.routers.recommendarr.tls=true"
      - "traefik.http.routers.recommendarr.middlewares=authelia@file"
      - "traefik.http.services.recommendarr.loadbalancer.server.port=3000"
    restart: unless-stopped

  # Recyclarr - TRaSH Guide Settings Sync
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    user: 1000:1000
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/recyclarr:/config
    restart: unless-stopped

  # SABnzbd - Usenet Download Client
  sabnzbd:
    image: linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/sabnzbd:/config
      - /mnt/media_root:/data
      - /opt/sabnzbd-incomplete:/incomplete
    expose:
      - "8080"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd.rule=Host(`nzbd.arishaig.site`)"
      - "traefik.http.routers.sabnzbd.entrypoints=websecure"
      - "traefik.http.routers.sabnzbd.tls=true"
      - "traefik.http.routers.sabnzbd.middlewares=authelia@file"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
    restart: unless-stopped

  # Sonarr - TV Series Management
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/sonarr:/config
      - /mnt/media_root:/data
    expose:
      - "8989"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.arishaig.site`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.middlewares=authelia@file"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    restart: unless-stopped

  # Subtitle generation powered by Whisper, used by Bazarr
  subgen:
    image: 'mccloud/subgen:cpu'
    container_name: subgenai
    networks:
      - default
      - proxy-net
    expose:
      - "9000"
    volumes:
      - '/mnt/app_config/subgen/models:/subgen/models'
      - '/mnt/app_config/subgen/subgen.env:/subgen/subgen.env:ro'
      - '/mnt/media_root:/data'
    environment:
      - "WEBHOOK_PORT=9000"
      - "WHISPER_MODEL=medium"
      - "WHISPER_THREADS=4"
      - "NAMESUBLANG=en"
      - "SKIPIFINTERNALSUBLANG=eng"
      - "DETECT_LANGUAGE_LENGTH=30"
      - "DETECT_LANGUAGE_OFFSET=60"
      - "SHOULD_WHISPER_DETECT_AUDIO_LANGUAGE=True"
      - "TRANSCRIBE_OR_TRANSLATE=translate"
      - "CONCURRENT_TRANSCRIPTIONS=2"
      - "WORD_LEVEL_HIGHLIGHT=False"
      - "DEBUG=True"
      - "TRANSCRIBE_DEVICE=cpu"
      - "SHOW_IN_SUBNAME_SUBGEN=True"
      - "SHOW_IN_SUBNAME_MODEL=True"
      - "MODEL_PATH=./models"
      - "UPDATE=False"
      - "APPEND=False"
      - "USE_MODEL_PROMPT=False"
      - "CUSTOM_MODEL_PROMPT="
      - "LRC_FOR_AUDIO_FILES=True"
      - "CUSTOM_REGROUP=cm_sl=84_sl=42++++++1"
      - "HF_TOKEN=${HUGGING_FACE_ACCESS_TOKEN}"

  # Tdarr - Automated transcoding server
  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: unless-stopped
    network_mode: bridge
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    environment:
      - TZ=America/Los_Angeles
      - PUID=1000
      - PGID=1000
      - inContainer=true
    volumes:
      - /mnt/app_config/tdarr/server:/app/server
      - /mnt/app_config/tdarr/configs:/app/configs
      - /mnt/app_config/tdarr/logs:/app/logs
      - /mnt/media_root:/media
      - /opt/transcode_cache:/temp

  # Tdarr - Automated transcoding node
  tdarr-node:
    container_name: tdarr-node
    image: ghcr.io/haveagitgat/tdarr_node:latest
    restart: unless-stopped
    network_mode: service:tdarr
    environment:
      - TZ=America/Los_Angeles
      - PUID=1000
      - PGID=1000
      - serverPort=8266
      - inContainer=true
    volumes:
      - /mnt/app_config/tdarr/configs:/app/configs
      - /mnt/app_config/tdarr/logs:/app/logs
      - /mnt/media_root:/media
      - /opt/transcode_cache:/temp

  # Tunarr - Create TV channels from local media
  tunarr:
    image: chrisbenincasa/tunarr:latest
    container_name: tunarr
    # Uncomment if using the Nvidia container
    # runtime: nvidia
    environment:
      - LOG_LEVEL=${TUNARR_LOG_LEVEL:-INFO}
      - TZ=America/Los_Angeles
      # Uncomment if you'd like to adjust default config path
      # - TUNARR_DATABASE_PATH=/your/path/tunarr
    volumes:
      - /mnt/app_config/tunarr/data:/config/tunarr
    expose:
      - "8000"
    networks:
      - default
      - proxy-net
    labels:
      # Remove Authelia so that Jellyfin can communicate with Tunarr
      - "traefik.enable=true"
      - "traefik.http.routers.tunarr.rule=Host(`tunarr.arishaig.site`)"
      - "traefik.http.routers.tunarr.entrypoints=websecure"
      - "traefik.http.routers.tunarr.tls=true"
      # - "traefik.http.routers.tunarr.middlewares=authelia@file"
      - "traefik.http.services.tunarr.loadbalancer.server.port=8000"
    restart: unless-stopped

  # Watcharr - Watchlist and view tracking
  watcharr:
    image: ghcr.io/sbondco/watcharr:latest
    container_name: watcharr
    expose:
      - "3080"
    volumes:
      - /mnt/app_config/watcharr:/data
    networks:
      - default
      - proxy-net
    labels:
      # No Authelia middleware because Watcharr login breaks with it enabled
      - "traefik.enable=true"
      - "traefik.http.routers.watcharr.rule=Host(`watcharr.arishaig.site`)"
      - "traefik.http.routers.watcharr.entrypoints=websecure"
      - "traefik.http.routers.watcharr.tls=true"
      - "traefik.http.services.watcharr.loadbalancer.server.port=3080"
    restart: unless-stopped

  watchback:
    image: ghcr.io/arishaig/watchback:latest
    container_name: watchback
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /mnt/app_config/watchback/config:/config
      - /mnt/app_config/watchback/static:/static
    expose:
      - "8484"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.watchback.rule=Host(`watchback.arishaig.site`)"
      - "traefik.http.routers.watchback.entrypoints=websecure"
      - "traefik.http.routers.watchback.tls=true"
      - "traefik.http.routers.watchback.middlewares=authelia@file"
      - "traefik.http.services.watchback.loadbalancer.server.port=8484"
    restart: unless-stopped

  ##### Book Media Apps #####

  # Calibre Auto-Import - Monitors folder and imports books automatically.
  # Also ensures the "Synced to Kobo" calibre-web shelf exists (creates on
  # startup if missing) and adds each newly-imported book to it.
  calibre-auto-import:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre-auto-import
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/media_root/media/calibre-books:/books
      - /mnt/media_root/manual-downloads/books:/imports
      - /mnt/app_config/calibre-web/config:/calibre-web-config
      - /mnt/app_config/calibre-auto-import/import.sh:/usr/local/bin/import.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/import.sh"]
    restart: unless-stopped

  # Calibre Web - Frontend for Calibre
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - DOCKER_MODS=linuxserver/mods:universal-calibre
    volumes:
      - /mnt/app_config/calibre-web/config:/config
      - /mnt/media_root/media/calibre-books:/books
    expose:
      - "8083"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calibre.rule=Host(`calibre.arishaig.site`)"
      - "traefik.http.routers.calibre.entrypoints=websecure"
      - "traefik.http.routers.calibre.tls=true"
      - "traefik.http.routers.calibre.middlewares=authelia@file"
      - "traefik.http.services.calibre.loadbalancer.server.port=8083"
    restart: unless-stopped

  # Chaptarr - Book Management
  chaptarr:
    image: robertlordhood/chaptarr:latest
    container_name: chaptarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/app_config/chaptarr:/config
      - /mnt/media_root:/data
    expose:
      - "8787"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chaptarr.rule=Host(`chaptarr.arishaig.site`)"
      - "traefik.http.routers.chaptarr.entrypoints=websecure"
      - "traefik.http.routers.chaptarr.tls=true"
      - "traefik.http.routers.chaptarr.middlewares=authelia@file"
      - "traefik.http.services.chaptarr.loadbalancer.server.port=8787"
    restart: unless-stopped

  ##### Monitoring and Dashboard Apps #####

  # Glances - System monitoring
  glances:
    image: nicolargo/glances:latest
    container_name: glances
    expose:
      - "61208"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
    environment:
      - GLANCES_OPT=-w
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glances.rule=Host(`glances.arishaig.site`)"
      - "traefik.http.routers.glances.entrypoints=websecure"
      - "traefik.http.routers.glances.tls=true"
      - "traefik.http.routers.glances.middlewares=authelia@file"
      - "traefik.http.services.glances.loadbalancer.server.port=61208"
    restart: unless-stopped

  # Homarr - Dashboard
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
    volumes:
      # Removed access for security hardening, services will show "Fetch Failed" in their tiles
      # - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/app_config/homarr:/appdata
    expose:
      - "7575"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`dash.arishaig.site`)"
      - "traefik.http.routers.homarr.entrypoints=websecure"
      - "traefik.http.routers.homarr.tls=true"
      - "traefik.http.routers.homarr.middlewares=authelia@file"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"
    restart: unless-stopped

  # Uptime Kuma - System monitor and alerts
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - /mnt/app_config/uptime-kuma:/app/data
    expose:
      - "3001"
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.arishaig.site`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls=true"
      - "traefik.http.routers.uptime-kuma.middlewares=authelia@file"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
    restart: unless-stopped

  ##### Other Apps #####

  # Copyparty - Simple file access
  copyparty:
    image: copyparty/ac
    container_name: copyparty
    command: --acao https://copyparty.arishaig.site
    expose:
      - "3923"
    volumes:
      - /mnt/app_config/copyparty:/cfg
      - /mnt/media_root:/w
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.copyparty.rule=Host(`copyparty.arishaig.site`)"
      - "traefik.http.routers.copyparty.entrypoints=websecure"
      - "traefik.http.routers.copyparty.tls=true"
      - "traefik.http.routers.copyparty.middlewares=authelia@file"
      - "traefik.http.services.copyparty.loadbalancer.server.port=3923"
    restart: unless-stopped

  # Mealie - Recipe tracker
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    expose:
      - "9000"
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - /mnt/app_config/mealie-data:/app/data/
    environment:
      - ALLOW_SIGNUP=false
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - BASE_URL=https://mealie.arishaig.site
      - DB_ENGINE=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mealie
    networks:
      - default
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mealie.rule=Host(`mealie.arishaig.site`)"
      - "traefik.http.routers.mealie.entrypoints=websecure"
      - "traefik.http.routers.mealie.tls=true"
      - "traefik.http.routers.mealie.middlewares=authelia@file"
      - "traefik.http.services.mealie.loadbalancer.server.port=9000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # Postgres - Database for Mealie
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    volumes:
      - /mnt/app_config/mealie-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - PGUSER=${POSTGRES_USER}
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 30s
      timeout: 20s
      retries: 3

  ##### Monitoring Exporters #####

  # Docker monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  # Export Bazarr logs to Grafana
  exportarr-bazarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-bazarr
    restart: unless-stopped
    command: bazarr
    environment:
      - PORT=9711
      - URL=http://bazarr:6767
      - APIKEY=${API_KEY_BAZARR}
    ports:
      - "9711:9711"

  # Export Lidarr logs to Grafana
  exportarr-lidarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-lidarr
    restart: unless-stopped
    command: lidarr
    environment:
      - PORT=9709
      - URL=http://lidarr:8686
      - APIKEY=${API_KEY_LIDARR}
    ports:
      - "9709:9709"

  # Export Prowlarr logs to Grafana
  exportarr-prowlarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-prowlarr
    restart: unless-stopped
    command: prowlarr
    environment:
      - PORT=9710
      - URL=http://prowlarr:9696
      - APIKEY=${API_KEY_PROWLARR}
    ports:
      - "9710:9710"

  # Export Radarr logs to Grafana
  exportarr-radarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-radarr
    restart: unless-stopped
    command: radarr
    environment:
      - PORT=9708
      - URL=http://radarr:7878
      - APIKEY=${API_KEY_RADARR}
    ports:
      - "9708:9708"

  # Export Sonarr logs to Grafana
  exportarr-sonarr:
    image: ghcr.io/onedr0p/exportarr:latest
    container_name: exportarr-sonarr
    restart: unless-stopped
    command: sonarr
    environment:
      - PORT=9707
      - URL=http://sonarr:8989
      - APIKEY=${API_KEY_SONARR}
    ports:
      - "9707:9707"

  # Proxmox node monitoring
  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.systemd"
      - "--collector.processes"

  ##### Networking and Auth Infrastructure #####

  authelia:
    image: authelia/authelia
    container_name: authelia
    networks:
      - proxy-net
    expose:
      - "9091"
    environment:
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}
    volumes:
      - /mnt/app_config/authelia:/config
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.arishaig.site`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls=true"
      - "traefik.http.routers.authelia.tls.certresolver=cloudflare"
      - "traefik.http.routers.authelia.tls.domains[0].main=arishaig.site"
      - "traefik.http.routers.authelia.tls.domains[0].sans=*.arishaig.site"

  # Cloudflared - Secure external connection
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - default
      - proxy-net

  # Dynamic DNS
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    restart: always
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - CF_API_TOKEN=${CLOUDFLARE_DYNAMIC_DNS_API_TOKEN}
      - DOMAINS=vpn.arishaig.site
      - PROXIED=false
      - TTL=300

  # Flare Solver - Cloudflare circumvention for prowlarr
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Los_Angeles
    expose:
      - "8191"
    restart: unless-stopped

  traefik:
    image: traefik:v3
    container_name: traefik
    ports:
      - "443:443"
      - "80:80"
    networks:
      - proxy-net
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_TRAEFIK_API_TOKEN}
    volumes:
      - /mnt/app_config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /mnt/app_config/traefik/dynamic:/etc/traefik/dynamic:ro
      - /mnt/app_config/traefik/acme.json:/etc/traefik/acme.json
      - /mnt/app_config/traefik/logs:/var/log/traefik
    restart: unless-stopped

  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: socket-proxy
    environment:
      - CONTAINERS=1
      - SERVICES=0
      - TASKS=0
      - NETWORKS=0
      - NODES=0
      - VOLUMES=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy-net
    expose:
      - "2375"
    restart: unless-stopped

networks:
  proxy-net:
    name: proxy-net