tcp:
  routers:
    adguard-doh:
      rule: "HostSNI(`dns3.arishaig.site`)"
      entryPoints: [websecure]
      priority: 10
      service: adguard-doh
      tls:
        passthrough: true
    https-passthrough:
      rule: "HostSNI(`*`)"
      entryPoints: [websecure]
      service: nest-https
      tls:
        passthrough: true

  services:
    adguard-doh:
      loadBalancer:
        servers:
          - address: "127.0.0.1:8443"
    nest-https:
      loadBalancer:
        proxyProtocol:
          version: 2
        servers:
          - address: "192.168.1.110:443"
