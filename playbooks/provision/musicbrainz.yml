---
# Provision LXC 101: MusicBrainz mirror
# common.yml must run first (handled by site.yml and the Terraform provisioner).
# Memory limits and reindex cron added 2026-06-25 (#248).

- name: MusicBrainz provisioning
  hosts: musicbrainz
  become: true
  gather_facts: true

  vars:
    musicbrainz_user: svc_musicbrainz
    musicbrainz_dir: /home/svc_musicbrainz/musicbrainz-docker

  tasks:
    # --- Docker CE installation ---
    - name: Check if Docker is already installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker CE
      when: docker_check.rc != 0
      block:
        - name: Add Docker GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/debian/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

        - name: Add Docker repository
          ansible.builtin.apt_repository:
            repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
            state: present

        - name: Install Docker CE packages
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true

        - name: Enable and start Docker
          ansible.builtin.systemd:
            name: docker
            enabled: true
            state: started

    # --- Docker daemon: listen on the unix socket only ---
    # daemon.json and the systemd override are a matched pair: the override
    # clears `-H fd://` from ExecStart so daemon.json's `hosts` key applies.
    # The daemon must never listen on tcp:// — that is unauthenticated root.
    - name: Ensure docker.service.d directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: "0755"

    - name: Configure Docker daemon (unix socket only)
      ansible.builtin.copy:
        content: |
          {
            "log-driver": "journald",
            "hosts": [
              "unix:///var/run/docker.sock"
            ]
          }
        dest: /etc/docker/daemon.json
        mode: "0600"
      notify: Restart docker

    - name: Install Docker systemd override so daemon.json hosts applies
      ansible.builtin.copy:
        content: |
          [Service]
          ExecStart=
          ExecStart=/usr/bin/dockerd
        dest: /etc/systemd/system/docker.service.d/override.conf
        mode: "0644"
      notify: Restart docker

    - name: Apply pending Docker daemon config before starting containers
      ansible.builtin.meta: flush_handlers

    # --- MusicBrainz setup ---
    - name: Create MusicBrainz service user
      ansible.builtin.user:
        name: "{{ musicbrainz_user }}"
        shell: /bin/bash
        create_home: true
        groups: docker
        append: true
        state: present

    - name: Clone MusicBrainz Docker repo
      ansible.builtin.git:
        repo: https://github.com/metabrainz/musicbrainz-docker.git
        dest: "{{ musicbrainz_dir }}"
        version: master
      become: true
      become_user: "{{ musicbrainz_user }}"

    - name: Template .env
      ansible.builtin.template:
        src: templates/musicbrainz/env.j2
        dest: "{{ musicbrainz_dir }}/.env"
        owner: "{{ musicbrainz_user }}"
        mode: "0644"

    - name: Ensure default directory exists
      ansible.builtin.file:
        path: "{{ musicbrainz_dir }}/default"
        state: directory
        owner: "{{ musicbrainz_user }}"
        mode: "0755"

    - name: Ensure local/compose directory exists
      ansible.builtin.file:
        path: "{{ musicbrainz_dir }}/local/compose"
        state: directory
        owner: "{{ musicbrainz_user }}"
        mode: "0755"

    - name: Template postgres.env
      ansible.builtin.template:
        src: templates/musicbrainz/postgres.env.j2
        dest: "{{ musicbrainz_dir }}/default/postgres.env"
        owner: "{{ musicbrainz_user }}"
        mode: "0600"

    - name: Template memory-settings.yml
      ansible.builtin.template:
        src: templates/musicbrainz/memory-settings.yml.j2
        dest: "{{ musicbrainz_dir }}/local/compose/memory-settings.yml"
        owner: "{{ musicbrainz_user }}"
        mode: "0644"
      notify: Recreate MusicBrainz stack

    - name: Schedule weekly search index rebuild
      ansible.builtin.cron:
        name: musicbrainz-reindex
        user: "{{ musicbrainz_user }}"
        minute: "0"
        hour: "1"
        weekday: "0"
        job: >-
          cd {{ musicbrainz_dir }} &&
          /usr/bin/docker compose exec -T indexer python -m sir reindex
          >> /home/{{ musicbrainz_user }}/reindex.log 2>&1

    - name: Start MusicBrainz stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ musicbrainz_dir }}"
      changed_when: true

  handlers:
    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
        daemon_reload: true

    - name: Recreate MusicBrainz stack
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ musicbrainz_dir }}"
      become: true
      become_user: "{{ musicbrainz_user }}"
      changed_when: true
