---
# Provision LXC 101: MusicBrainz mirror

- name: Common base setup
  ansible.builtin.import_playbook: common.yml

- name: MusicBrainz provisioning
  hosts: musicbrainz
  become: true
  gather_facts: true

  vars:
    musicbrainz_user: svc_musicbrainz
    musicbrainz_dir: /home/svc_musicbrainz/musicbrainz-docker

  tasks:
    # --- Docker CE installation ---
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # --- MusicBrainz setup ---
    - name: Create MusicBrainz service user
      ansible.builtin.user:
        name: "{{ musicbrainz_user }}"
        shell: /bin/bash
        create_home: true
        groups: docker
        append: true
        state: present

    - name: Clone MusicBrainz Docker repo
      ansible.builtin.git:
        repo: https://github.com/metabrainz/musicbrainz-docker.git
        dest: "{{ musicbrainz_dir }}"
        version: master
      become_user: "{{ musicbrainz_user }}"

    - name: Check if docker-compose.yml exists
      ansible.builtin.stat:
        path: "{{ musicbrainz_dir }}/docker-compose.yml"
      register: compose_file

    - name: Start MusicBrainz stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ musicbrainz_dir }}"
      when: compose_file.stat.exists
      changed_when: true
