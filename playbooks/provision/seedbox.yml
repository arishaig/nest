---
# Provision LXC 104: Seedbox with VPN
# common.yml must run first (handled by site.yml and the Terraform provisioner).

- name: Seedbox provisioning
  hosts: seedbox
  become: true
  gather_facts: true

  vars:
    seedbox_dir: /opt/seedbox

  tasks:
    # --- Docker CE installation ---
    - name: Check if Docker is already installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker CE
      when: docker_check.rc != 0
      block:
        - name: Add Docker GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/debian/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

        - name: Add Docker repository
          ansible.builtin.apt_repository:
            repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
            state: present

        - name: Install Docker CE packages
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true

        - name: Enable and start Docker
          ansible.builtin.systemd:
            name: docker
            enabled: true
            state: started

    # --- Seedbox setup ---
    - name: Create seedbox directory
      ansible.builtin.file:
        path: "{{ seedbox_dir }}"
        state: directory
        mode: "0755"

    - name: Template .env from vault
      ansible.builtin.template:
        src: templates/seedbox/env.j2
        dest: "{{ seedbox_dir }}/.env"
        mode: "0600"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: files/seedbox/docker-compose.yml
        dest: "{{ seedbox_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Start seedbox stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ seedbox_dir }}"
      changed_when: true
