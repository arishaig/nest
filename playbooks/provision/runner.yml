---
# Installs and registers a GitHub Actions self-hosted runner on the ci LXC.
# Re-running this playbook is safe — registration uses --replace to update an existing runner.
# To provision additional runners: ansible-playbook runner.yml -e runner_name=nest-runner-2
# Requires vault_github_runner_pat (fine-grained PAT with Actions: read/write on arishaig/nest).

- name: GitHub Actions runner setup
  hosts: ci
  become: true
  gather_facts: true

  vars:
    runner_version: "2.334.0"
    runner_arch: "linux-x64"
    runner_name: "nest-runner-1"
    runner_dir: "/opt/{{ runner_name }}"
    runner_home: "/opt/nest-runner-1"
    runner_service: "actions.runner.arishaig-nest.{{ runner_name }}"
    runner_user: github-runner
    runner_repo_url: "https://github.com/arishaig/nest"
    ansible_venv: /opt/ansible-runner/venv
    # promtool/amtool/kustomize/kubeconform back CI lint jobs (lint.yml). Versions
    # are renovate-managed; bumping them re-installs via the checksum-aware copy.
    prometheus_version: "3.12.0"
    alertmanager_version: "0.32.1"
    kubectl_version: "1.32.0"
    kustomize_version: "5.5.0"
    kubeconform_version: "0.6.7"

  tasks:
    - name: Install runner and Ansible dependencies
      ansible.builtin.apt:
        name:
          - git
          - python3-pip
          - python3-venv
          - curl
          - jq
          - sshpass
          - shellcheck
          - gnupg
          - graphviz
        state: present
        update_cache: true

    - name: Add HashiCorp apt signing key
      ansible.builtin.get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /usr/share/keyrings/hashicorp-archive-keyring.asc
        mode: "0644"

    - name: Add HashiCorp apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.asc] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        filename: hashicorp
        state: present

    - name: Install Terraform
      ansible.builtin.apt:
        name: terraform
        state: present
        update_cache: true

    - name: Add Docker apt signing key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /usr/share/keyrings/docker-archive-keyring.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/docker-archive-keyring.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker CLI and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce-cli
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Install promtool and amtool for CI config validation
      block:
        - name: Download Prometheus tarball
          ansible.builtin.get_url:
            url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
            dest: /tmp/prometheus.tar.gz
            mode: "0644"

        - name: Extract Prometheus tarball
          ansible.builtin.unarchive:
            src: /tmp/prometheus.tar.gz
            dest: /tmp
            remote_src: true

        - name: Install promtool binary
          ansible.builtin.copy:
            src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/promtool"
            dest: /usr/local/bin/promtool
            mode: "0755"
            remote_src: true

        - name: Download Alertmanager tarball
          ansible.builtin.get_url:
            url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
            dest: /tmp/alertmanager.tar.gz
            mode: "0644"

        - name: Extract Alertmanager tarball
          ansible.builtin.unarchive:
            src: /tmp/alertmanager.tar.gz
            dest: /tmp
            remote_src: true

        - name: Install amtool binary
          ansible.builtin.copy:
            src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/amtool"
            dest: /usr/local/bin/amtool
            mode: "0755"
            remote_src: true

        - name: Clean up promtool/amtool downloads
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/prometheus.tar.gz
            - /tmp/alertmanager.tar.gz
            - "/tmp/prometheus-{{ prometheus_version }}.linux-amd64"
            - "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64"

    - name: Install kustomize and kubeconform for CI k8s validation
      block:
        - name: Download kustomize tarball
          ansible.builtin.get_url:
            url: "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv{{ kustomize_version }}/kustomize_v{{ kustomize_version }}_linux_amd64.tar.gz"
            dest: /tmp/kustomize.tar.gz
            mode: "0644"

        - name: Extract kustomize tarball
          ansible.builtin.unarchive:
            src: /tmp/kustomize.tar.gz
            dest: /tmp
            remote_src: true

        - name: Install kustomize binary
          ansible.builtin.copy:
            src: /tmp/kustomize
            dest: /usr/local/bin/kustomize
            mode: "0755"
            remote_src: true

        - name: Download kubeconform tarball
          ansible.builtin.get_url:
            url: "https://github.com/yannh/kubeconform/releases/download/v{{ kubeconform_version }}/kubeconform-linux-amd64.tar.gz"
            dest: /tmp/kubeconform.tar.gz
            mode: "0644"

        - name: Extract kubeconform tarball
          ansible.builtin.unarchive:
            src: /tmp/kubeconform.tar.gz
            dest: /tmp
            remote_src: true

        - name: Install kubeconform binary
          ansible.builtin.copy:
            src: /tmp/kubeconform
            dest: /usr/local/bin/kubeconform
            mode: "0755"
            remote_src: true

        - name: Clean up kustomize/kubeconform downloads
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/kustomize.tar.gz
            - /tmp/kustomize
            - /tmp/kubeconform.tar.gz
            - /tmp/kubeconform

    - name: Create Ansible venv
      ansible.builtin.command:
        cmd: python3 -m venv {{ ansible_venv }}
        creates: "{{ ansible_venv }}/bin/activate"

    - name: Install ansible in venv
      ansible.builtin.pip:
        name:
          - ansible
          - ansible-lint
          - diagrams
          - pyyaml
          - kubernetes
        virtualenv: "{{ ansible_venv }}"
        state: present

    - name: Install ansible collections in venv
      ansible.builtin.command:
        cmd: "{{ ansible_venv }}/bin/ansible-galaxy collection install ansible.posix community.general kubernetes.core"
      changed_when: true

    - name: Create Terraform plugin cache directory
      ansible.builtin.file:
        path: /opt/terraform-plugin-cache
        state: directory
        owner: "{{ runner_user }}"
        mode: "0755"

    - name: Install kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: Create github-runner user
      ansible.builtin.user:
        name: "{{ runner_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ runner_home }}"
        create_home: true

    - name: Create runner directory
      ansible.builtin.file:
        path: "{{ runner_dir }}"
        state: directory
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
        mode: "0755"

    - name: Download runner tarball
      ansible.builtin.get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-{{ runner_arch }}-{{ runner_version }}.tar.gz"
        dest: "/tmp/actions-runner-{{ runner_version }}.tar.gz"
        mode: "0644"

    - name: Extract runner tarball
      ansible.builtin.unarchive:
        src: "/tmp/actions-runner-{{ runner_version }}.tar.gz"
        dest: "{{ runner_dir }}"
        remote_src: true
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
      args:
        creates: "{{ runner_dir }}/config.sh"

    - name: Check if runner is already configured
      ansible.builtin.stat:
        path: "{{ runner_dir }}/.runner"
      register: runner_configured

    - name: Stop runner service before reconfiguring (if already registered)
      ansible.builtin.systemd:
        name: "{{ runner_service }}"
        state: stopped
      failed_when: false
      when: runner_configured.stat.exists

    - name: Fetch runner registration token from GitHub API
      ansible.builtin.uri:
        url: "https://api.github.com/repos/arishaig/nest/actions/runners/registration-token"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_github_runner_pat }}"
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        status_code: 201
      register: runner_token_response
      no_log: true
      when: not runner_configured.stat.exists

    - name: Configure runner (first-time registration only)
      ansible.builtin.command:
        cmd: >
          ./config.sh
          --url {{ runner_repo_url }}
          --token {{ runner_token_response.json.token }}
          --name {{ runner_name }}
          --labels self-hosted,linux,nest
          --unattended
          --replace
        chdir: "{{ runner_dir }}"
      become: true
      become_user: "{{ runner_user }}"
      no_log: true
      when: not runner_configured.stat.exists

    - name: Install runner as systemd service
      ansible.builtin.command:
        cmd: ./svc.sh install {{ runner_user }}
        chdir: "{{ runner_dir }}"
      args:
        creates: /etc/systemd/system/{{ runner_service }}.service

    - name: Start and enable runner service
      ansible.builtin.systemd:
        name: "{{ runner_service }}"
        state: started
        enabled: true
        daemon_reload: true

    - name: Clean up tarball
      ansible.builtin.file:
        path: "/tmp/actions-runner-{{ runner_version }}.tar.gz"
        state: absent
