---
# Provision the PVE host itself (not the LXCs/VMs it runs).
# Covers: ZFS datasets and NFS exports for k8s and media storage.

- name: PVE host provisioning
  hosts: pve
  become: true
  gather_facts: false

  tasks:
    - name: Deploy IP-based NTP fallbacks for chrony
      ansible.builtin.copy:
        content: |
          server 129.6.15.28 iburst
          server 129.6.15.29 iburst
          server 129.6.15.30 iburst
          server 129.6.15.31 iburst
        dest: /etc/chrony/sources.d/ip-fallback.sources
        mode: "0644"
      notify: Restart chrony

    # Without a cap, ARC competes with VM memory; the host OOM-killed the PBS
    # VM (2026-06-11) when VMs + ARC exceeded physical RAM.
    - name: Cap ZFS ARC at 8 GiB (persistent)
      ansible.builtin.copy:
        content: |
          options zfs zfs_arc_max=8589934592
        dest: /etc/modprobe.d/zfs.conf
        mode: "0644"
      notify: Update initramfs

    - name: Cap ZFS ARC at 8 GiB (runtime, no reboot needed)
      ansible.builtin.shell: |
        if [ "$(cat /sys/module/zfs/parameters/zfs_arc_max)" != "8589934592" ]; then
          echo 8589934592 > /sys/module/zfs/parameters/zfs_arc_max
          echo changed
        fi
      register: arc_runtime
      changed_when: "'changed' in arc_runtime.stdout"

    # The no-subscription repo is already configured in proxmox.sources;
    # the enterprise repo 401s without a subscription and fails the daily
    # aptupdate task. PVE upgrades have re-created it before, so keep it
    # absent here rather than fixing it by hand.
    - name: Remove the unusable pve-enterprise apt repo
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/pve-enterprise.sources
        - /etc/apt/sources.list.d/pve-enterprise.list

    # Back up every guest instead of a hardcoded vmid list so new VMs/LXCs
    # are covered automatically. VM 500 is PBS itself — backing it up into
    # its own datastore is circular, so it stays excluded.
    - name: Switch the vzdump job to all guests with PBS excluded
      ansible.builtin.shell: |
        if ! grep -qE '^\s+all 1$' /etc/pve/jobs.cfg || ! grep -qE '^\s+exclude 500$' /etc/pve/jobs.cfg; then
          pvesh set /cluster/backup/backup-c4e43015-c035 --all 1 --exclude 500 --delete vmid
          echo changed
        fi
      register: vzdump_job
      changed_when: "'changed' in vzdump_job.stdout"

    - name: Install NFS server
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present
        update_cache: false

    - name: Create k8s config ZFS dataset
      community.general.zfs:
        name: rpool/data/k8s-configs
        state: present

    - name: Manage NFS exports
      ansible.builtin.template:
        src: templates/pve/exports.j2
        dest: /etc/exports
        owner: root
        group: root
        mode: "0644"
      notify: Reload exports

  handlers:
    - name: Update initramfs
      ansible.builtin.command: update-initramfs -u -k all
      changed_when: true

    - name: Restart chrony
      ansible.builtin.systemd:
        name: chrony
        state: restarted

    - name: Reload exports
      ansible.builtin.command: exportfs -ra
      changed_when: true
