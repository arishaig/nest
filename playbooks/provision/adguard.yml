---
# Provision the AdGuard Pi (Raspberry Pi at 192.168.7.7)
# Installs: Unbound, AdGuard Home, Certbot (Cloudflare DNS), Docker stack, unbound-exporter
# common.yml must run first (handled by site.yml and the Terraform provisioner).

- name: AdGuard Pi provisioning
  hosts: dns
  become: true
  gather_facts: true

  vars:
    unbound_exporter_version: "0.6.0"
    docker_dir: /opt/docker
    adguard_self_url: "{{ 'https://' + certbot_domain if adguard_tls | default(false) else 'http://127.0.0.1:3000' }}"
    adguard_exporter_username: "adguard"
    adguard_https_port: 443

  tasks:
    # ── Unbound (recursive resolver on 127.0.0.1:5335) ──

    - name: Install unbound
      ansible.builtin.apt:
        name: unbound
        state: present

    - name: Download root hints
      ansible.builtin.get_url:
        url: https://www.internic.net/domain/named.root
        dest: /var/lib/unbound/root.hints
        mode: "0644"

    - name: Deploy unbound server config
      ansible.builtin.template:
        src: templates/adguard/unbound.conf.j2
        dest: /etc/unbound/unbound.conf.d/adguard.conf
        mode: "0644"
      notify: Restart unbound

    - name: Enable and start unbound
      ansible.builtin.systemd:
        name: unbound
        enabled: true
        state: started

    # ── AdGuard Home (official install script) ──

    - name: Check if AdGuard Home is installed
      ansible.builtin.stat:
        path: /opt/AdGuardHome/AdGuardHome
      register: adguard_binary

    - name: Install AdGuard Home
      when: not adguard_binary.stat.exists
      block:
        - name: Download AdGuard Home install script
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/AdguardTeam/AdGuardHome/master/scripts/install.sh
            dest: /tmp/adguard_install.sh
            mode: "0755"

        - name: Run AdGuard Home install script
          ansible.builtin.command: /tmp/adguard_install.sh
          changed_when: true

        - name: Clean up install script
          ansible.builtin.file:
            path: /tmp/adguard_install.sh
            state: absent

    - name: Ensure AdGuardHome service enabled and started
      ansible.builtin.systemd:
        name: AdGuardHome
        enabled: true
        state: started

    # ── Certbot (TLS cert via Cloudflare DNS challenge) ──

    - name: Install certbot and Cloudflare plugin
      when: adguard_tls | default(false)
      ansible.builtin.apt:
        name:
          - certbot
          - python3-certbot-dns-cloudflare
        state: present

    - name: Create secrets directory
      when: adguard_tls | default(false)
      ansible.builtin.file:
        path: /root/.secrets
        state: directory
        mode: "0700"

    - name: Deploy Cloudflare credentials
      when: adguard_tls | default(false)
      ansible.builtin.template:
        src: templates/adguard/cloudflare.ini.j2
        dest: /root/.secrets/cloudflare.ini
        mode: "0600"

    - name: Check if cert already exists
      when: adguard_tls | default(false)
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ certbot_domain }}/fullchain.pem"
      register: cert_file

    - name: Obtain TLS certificate
      when: (adguard_tls | default(false)) and not cert_file.stat.exists
      ansible.builtin.command: >
        certbot certonly
        --dns-cloudflare
        --dns-cloudflare-credentials /root/.secrets/cloudflare.ini
        --non-interactive
        --agree-tos
        --email {{ certbot_email }}
        -d {{ certbot_domain }}
      changed_when: true

    - name: Create AdGuard SSL directory
      when: adguard_tls | default(false)
      ansible.builtin.file:
        path: /opt/AdGuardHome/ssl
        state: directory
        mode: "0755"

    - name: Copy certs to AdGuard SSL directory
      when: (adguard_tls | default(false)) and not cert_file.stat.exists
      ansible.builtin.shell: |
        cp /etc/letsencrypt/live/{{ certbot_domain }}/fullchain.pem /opt/AdGuardHome/ssl/fullchain.pem
        cp /etc/letsencrypt/live/{{ certbot_domain }}/privkey.pem /opt/AdGuardHome/ssl/privkey.pem
        chmod 600 /opt/AdGuardHome/ssl/privkey.pem
      changed_when: true

    - name: Configure AdGuard Home TLS in config file
      when: adguard_tls | default(false)
      ansible.builtin.shell:
        cmd: |
          python3 << 'PYEOF'
          import yaml
          path = '/opt/AdGuardHome/AdGuardHome.yaml'
          with open(path) as f:
              cfg = yaml.safe_load(f)
          tls = cfg.setdefault('tls', {})
          tls['enabled'] = True
          tls['server_name'] = '{{ certbot_domain }}'
          tls['force_https'] = False
          tls['port_https'] = {{ adguard_https_port }}
          tls['port_dns_over_tls'] = 853
          tls['port_dns_over_quic'] = 853
          tls['certificate_chain'] = ''
          tls['private_key'] = ''
          tls['certificate_path'] = '/opt/AdGuardHome/ssl/fullchain.pem'
          tls['private_key_path'] = '/opt/AdGuardHome/ssl/privkey.pem'
          with open(path, 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False, allow_unicode=True)
          PYEOF
      changed_when: true
      notify: Restart AdGuardHome

    - name: Deploy certbot renewal hook
      when: adguard_tls | default(false)
      ansible.builtin.template:
        src: templates/adguard/certbot-deploy-hook.sh.j2
        dest: /etc/letsencrypt/renewal-hooks/deploy/adguardhome.sh
        mode: "0755"

    - name: Ensure certbot timer is enabled
      when: adguard_tls | default(false)
      ansible.builtin.systemd:
        name: certbot.timer
        enabled: true
        state: started

    # ── Docker (adguard-exporter + cloudflare-ddns) ──

    - name: Check if Docker is installed
      when: adguard_exporter | default(true)
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker CE
      when: (adguard_exporter | default(true)) and docker_check.rc != 0
      block:
        - name: Add Docker GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/debian/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

        - name: Add Docker repository
          ansible.builtin.apt_repository:
            repo: "deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
            state: present

        - name: Install Docker CE packages
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true

        - name: Enable and start Docker
          ansible.builtin.systemd:
            name: docker
            enabled: true
            state: started

    - name: Create Docker compose directory
      when: adguard_exporter | default(true)
      ansible.builtin.file:
        path: "{{ docker_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy docker-compose.yml
      when: adguard_exporter | default(true)
      ansible.builtin.template:
        src: templates/adguard/docker-compose.yml.j2
        dest: "{{ docker_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy .env for Docker compose
      when: adguard_exporter | default(true)
      ansible.builtin.template:
        src: templates/adguard/env.j2
        dest: "{{ docker_dir }}/.env"
        mode: "0600"

    - name: Start Docker compose stack
      when: adguard_exporter | default(true)
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ docker_dir }}"
      changed_when: true

    # ── Chrony NTP server ──

    - name: Install chrony
      when: local_network | default(true)
      ansible.builtin.apt:
        name: chrony
        state: present

    - name: Deploy chrony config
      when: local_network | default(true)
      ansible.builtin.copy:
        content: |
          pool us.pool.ntp.org iburst maxsources 4
          server time-a-g.nist.gov iburst
          server time-b-g.nist.gov iburst
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
          allow 192.168.0.0/16
          local stratum 10
        dest: /etc/chrony/chrony.conf
        mode: "0644"
      notify: Restart chrony

    - name: Allow chrony to run without clock adjustment in LXC (no CAP_SYS_TIME)
      when: local_network | default(true) and ansible_virtualization_type == 'lxc'
      ansible.builtin.copy:
        content: "DAEMON_OPTS=\"-x\"\n"
        dest: /etc/default/chrony
        mode: "0644"
      notify: Restart chrony

    - name: Disable systemd-timesyncd (conflicts with chrony)
      when: local_network | default(true)
      ansible.builtin.systemd:
        name: systemd-timesyncd
        enabled: false
        state: stopped
      failed_when: false

    - name: Enable and start chrony
      when: local_network | default(true)
      ansible.builtin.systemd:
        name: chrony
        enabled: true
        state: started

    # ── unbound-exporter (port 9167, systemd) ──

    - name: Check if unbound_exporter is installed
      ansible.builtin.stat:
        path: /usr/bin/unbound_exporter
      register: unbound_exporter_binary
      when: ansible_facts['architecture'] == 'x86_64'

    - name: Install unbound_exporter from deb package
      when: ansible_facts['architecture'] == 'x86_64' and not unbound_exporter_binary.stat.exists
      block:
        - name: Download unbound_exporter deb
          ansible.builtin.get_url:
            url: "https://github.com/letsencrypt/unbound_exporter/releases/download/v{{ unbound_exporter_version }}/unbound_exporter-v{{ unbound_exporter_version }}.x86_64.deb"
            dest: /tmp/unbound_exporter.deb
            mode: "0644"

        - name: Install unbound_exporter deb
          ansible.builtin.apt:
            deb: /tmp/unbound_exporter.deb

        - name: Clean up deb package
          ansible.builtin.file:
            path: /tmp/unbound_exporter.deb
            state: absent

    - name: Create unbound_exporter systemd service
      when: ansible_facts['architecture'] == 'x86_64'
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Unbound Prometheus Exporter
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/unbound_exporter -unbound.host unix:///run/unbound.ctl -web.listen-address :9167
          Restart=always

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/unbound_exporter.service
        mode: "0644"
      notify: Restart unbound_exporter

    - name: Enable and start unbound_exporter
      when: ansible_facts['architecture'] == 'x86_64'
      ansible.builtin.systemd:
        name: unbound_exporter
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart chrony
      ansible.builtin.systemd:
        name: chrony
        state: restarted

    - name: Restart unbound
      ansible.builtin.systemd:
        name: unbound
        state: restarted

    - name: Restart unbound_exporter
      ansible.builtin.systemd:
        name: unbound_exporter
        state: restarted
        daemon_reload: true

    - name: Restart AdGuardHome
      ansible.builtin.systemd:
        name: AdGuardHome
        state: restarted
