---
# Provision LXC 103: Scrutiny disk health monitoring
# common.yml must run first (handled by site.yml and the Terraform provisioner).

- name: Scrutiny provisioning
  hosts: scrutiny
  become: true
  gather_facts: true

  vars:
    scrutiny_dir: /opt/scrutiny

  tasks:
    # --- Docker CE installation ---
    - name: Check if Docker is already installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker CE
      when: docker_check.rc != 0
      block:
        - name: Add Docker GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/debian/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

        - name: Add Docker repository
          ansible.builtin.apt_repository:
            repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
            state: present

        - name: Install Docker CE packages
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true

        - name: Enable and start Docker
          ansible.builtin.systemd:
            name: docker
            enabled: true
            state: started

    - name: Install smartmontools
      ansible.builtin.apt:
        name: smartmontools
        state: present

    # --- Scrutiny setup ---
    - name: Create scrutiny directory
      ansible.builtin.file:
        path: "{{ scrutiny_dir }}"
        state: directory
        mode: "0755"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: files/scrutiny/docker-compose.yml
        dest: "{{ scrutiny_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Start Scrutiny stack
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ scrutiny_dir }}"
      changed_when: true
