---
# Provision LXC 109: mcp — Nest MCP HTTP server
# common.yml must run first (handled by site.yml and the Terraform provisioner).

- name: MCP server provisioning
  hosts: mcp
  become: true
  gather_facts: true

  vars:
    mcp_dir: /opt/nest-mcp
    mcp_venv: /opt/nest-mcp/.venv
    mcp_secrets: /etc/nest-mcp/secrets.env
    # Backs the terraform_plan MCP tool, which shells out to `tofu`.
    # Renovate-managed; keep in sync with runner.yml's opentofu_version.
    opentofu_version: "1.12.0"

  tasks:
    - name: Install Python venv and pip
      ansible.builtin.apt:
        name:
          - python3-venv
          - python3-pip
          - unzip
        state: present

    - name: Install OpenTofu (backs the terraform_plan MCP tool)
      block:
        - name: Download OpenTofu zip
          ansible.builtin.get_url:
            url: "https://github.com/opentofu/opentofu/releases/download/v{{ opentofu_version }}/tofu_{{ opentofu_version }}_linux_amd64.zip"
            dest: /tmp/tofu.zip
            mode: "0644"

        - name: Extract OpenTofu zip
          ansible.builtin.unarchive:
            src: /tmp/tofu.zip
            dest: /tmp
            remote_src: true

        - name: Install tofu binary
          ansible.builtin.copy:
            src: /tmp/tofu
            dest: /usr/local/bin/tofu
            mode: "0755"
            remote_src: true

        - name: Clean up OpenTofu download
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/tofu.zip
            - /tmp/tofu

    - name: Create MCP app directory
      ansible.builtin.file:
        path: "{{ mcp_dir }}"
        state: directory
        mode: "0755"

    - name: Create MCP archive on control node
      ansible.builtin.archive:
        path: "{{ playbook_dir }}/../../mcp"
        dest: /tmp/nest-mcp.tar.gz
        exclude_path:
          - "{{ playbook_dir }}/../../mcp/.venv"
          - "{{ playbook_dir }}/../../mcp/.git"
        format: gz
      delegate_to: localhost
      become: false

    - name: Upload and extract MCP source
      ansible.builtin.unarchive:
        src: /tmp/nest-mcp.tar.gz
        dest: "{{ mcp_dir }}/"
        extra_opts: ["--strip-components=1"]
      notify: Restart nest-mcp

    # Guard on pip3, not python: a venv created before python3-venv was
    # installed has bin/python but no pip. Re-running `python3 -m venv` on the
    # existing dir runs ensurepip and repairs it now that python3-venv exists.
    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv {{ mcp_venv }}
        creates: "{{ mcp_venv }}/bin/pip3"

    - name: Install MCP package into venv
      ansible.builtin.pip:
        name: "{{ mcp_dir }}"
        extra_args: "-e"
        virtualenv: "{{ mcp_venv }}"
      notify: Restart nest-mcp

    - name: Create secrets directory
      ansible.builtin.file:
        path: /etc/nest-mcp
        state: directory
        mode: "0700"

    - name: Write MCP secrets file
      ansible.builtin.template:
        src: templates/mcp-secrets.env.j2
        dest: "{{ mcp_secrets }}"
        mode: "0600"
      notify: Restart nest-mcp

    - name: Install nest-mcp systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Nest MCP HTTP Server
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile={{ mcp_secrets }}
          ExecStart={{ mcp_venv }}/bin/python -m nest_mcp.serve
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/nest-mcp.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart nest-mcp

    - name: Enable and start nest-mcp
      ansible.builtin.systemd:
        name: nest-mcp
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart nest-mcp
      ansible.builtin.systemd:
        name: nest-mcp
        state: restarted
        daemon_reload: true
