---
# Provision LXC 109: mcp — Nest MCP HTTP server
# common.yml must run first (handled by site.yml and the Terraform provisioner).

- name: MCP server provisioning
  hosts: mcp
  become: true
  gather_facts: true

  vars:
    mcp_dir: /opt/nest-mcp
    mcp_venv: /opt/nest-mcp/.venv
    mcp_secrets: /etc/nest-mcp/secrets.env
    # Normalized so exclude_path matches the archived file paths. The previous
    # "{{ playbook_dir }}/../../mcp" form left a literal ../.. in the string,
    # which never matched the globbed paths — so the workstation's local .venv
    # got bundled and shipped onto the container.
    mcp_src: "{{ playbook_dir | dirname | dirname }}/mcp"
    # Backs the terraform_plan MCP tool, which shells out to `tofu`.
    # Renovate-managed; keep in sync with runner.yml's opentofu_version.
    opentofu_version: "1.12.1"

  tasks:
    - name: Install Python venv and pip
      ansible.builtin.apt:
        name:
          - python3-venv
          - python3-pip
          - unzip
        state: present

    - name: Install OpenTofu (backs the terraform_plan MCP tool)
      block:
        - name: Download OpenTofu zip
          ansible.builtin.get_url:
            url: "https://github.com/opentofu/opentofu/releases/download/v{{ opentofu_version }}/tofu_{{ opentofu_version }}_linux_amd64.zip"
            dest: /tmp/tofu.zip
            mode: "0644"

        - name: Extract OpenTofu zip
          ansible.builtin.unarchive:
            src: /tmp/tofu.zip
            dest: /tmp
            remote_src: true

        - name: Install tofu binary
          ansible.builtin.copy:
            src: /tmp/tofu
            dest: /usr/local/bin/tofu
            mode: "0755"
            remote_src: true

        - name: Clean up OpenTofu download
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/tofu.zip
            - /tmp/tofu

    - name: Create MCP app directory
      ansible.builtin.file:
        path: "{{ mcp_dir }}"
        state: directory
        mode: "0755"

    - name: Create MCP archive on control node
      ansible.builtin.archive:
        path: "{{ mcp_src }}"
        dest: /tmp/nest-mcp.tar.gz
        exclude_path:
          - "{{ mcp_src }}/.venv"
          - "{{ mcp_src }}/.git"
        format: gz
      delegate_to: localhost
      become: false

    - name: Upload and extract MCP source
      ansible.builtin.unarchive:
        src: /tmp/nest-mcp.tar.gz
        dest: "{{ mcp_dir }}/"
        extra_opts: ["--strip-components=1"]
      notify: Restart nest-mcp

    # Probe the exact binary the install step uses (bin/pip3), not the
    # interpreter: in a venv shipped from the workstation, bin/python resolves
    # fine but the console scripts (pip3 etc.) keep a shebang pointing at the
    # workstation venv path, so they fail to exec with ENOENT. rc != 0 covers
    # "missing" and "wrong shebang" alike.
    - name: Probe existing venv pip
      ansible.builtin.command: "{{ mcp_venv }}/bin/pip3 --version"
      register: mcp_venv_probe
      changed_when: false
      failed_when: false

    - name: Create or rebuild Python virtual environment
      ansible.builtin.command:
        cmd: "python3 -m venv --clear {{ mcp_venv }}"
      when: mcp_venv_probe.rc | default(1) != 0
      changed_when: true

    - name: Install MCP package into venv
      ansible.builtin.pip:
        name: "{{ mcp_dir }}"
        extra_args: "-e"
        virtualenv: "{{ mcp_venv }}"
      notify: Restart nest-mcp

    - name: Create secrets directory
      ansible.builtin.file:
        path: /etc/nest-mcp
        state: directory
        mode: "0700"

    - name: Write MCP secrets file
      ansible.builtin.template:
        src: templates/mcp-secrets.env.j2
        dest: "{{ mcp_secrets }}"
        mode: "0600"
      notify: Restart nest-mcp

    - name: Install nest-mcp systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Nest MCP HTTP Server
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile={{ mcp_secrets }}
          ExecStart={{ mcp_venv }}/bin/python -m nest_mcp.serve
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/nest-mcp.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart nest-mcp

    - name: Enable and start nest-mcp
      ansible.builtin.systemd:
        name: nest-mcp
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart nest-mcp
      ansible.builtin.systemd:
        name: nest-mcp
        state: restarted
        daemon_reload: true
