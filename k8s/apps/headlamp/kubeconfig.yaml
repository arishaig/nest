---
# Headlamp reads this kubeconfig via -kubeconfig flag and uses the pod's
# auto-mounted SA token to authenticate — no token prompt shown in the UI.
# The tokenFile path is the standard in-cluster SA mount location.
apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-kubeconfig
  namespace: headlamp
data:
  config: |
    apiVersion: v1
    kind: Config
    clusters:
    - cluster:
        certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        server: https://kubernetes.default.svc
      name: in-cluster
    contexts:
    - context:
        cluster: in-cluster
        user: headlamp-sa
      name: in-cluster
    current-context: in-cluster
    users:
    - name: headlamp-sa
      user:
        tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
