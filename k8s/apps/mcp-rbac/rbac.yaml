apiVersion: v1
kind: ServiceAccount
metadata:
  name: nest-mcp
  namespace: nest-mcp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nest-mcp-readonly
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nest-mcp-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nest-mcp-readonly
subjects:
  - kind: ServiceAccount
    name: nest-mcp
    namespace: nest-mcp
---
# k8s 1.24+ does not auto-create SA tokens; explicit Secret generates a long-lived token.
# After deploy: kubectl get secret nest-mcp-token -n nest-mcp -o jsonpath='{.data.token}' | base64 -d
# Store the decoded value as k8s_mcp_sa_token in ansible vault.
apiVersion: v1
kind: Secret
metadata:
  name: nest-mcp-token
  namespace: nest-mcp
  annotations:
    kubernetes.io/service-account.name: nest-mcp
type: kubernetes.io/service-account-token
