apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: watcharr
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      watcharr:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/sbondco/watcharr
              repository: ghcr.io/sbondco/watcharr
              tag: v3.0.1
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: watcharr
        type: NodePort
        ports:
          http:
            port: 3080
            targetPort: 3080
            nodePort: 30803
    persistence:
      data:
        existingClaim: watcharr-data
        advancedMounts:
          watcharr:
            app:
              - path: /data
