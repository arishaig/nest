apiVersion: apps/v1
kind: Deployment
metadata:
  name: anagnorisis
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: anagnorisis
  template:
    metadata:
      labels:
        app: anagnorisis
    spec:
      containers:
        - name: anagnorisis
          image: ghcr.io/arishaig/anagnorisis:latest
          imagePullPolicy: Always
          # Use bash wrapper so we can merge stderr→stdout and see why Python exits.
          # "exec" replaces bash with Python (clean PID 1 / signal handling).
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /app && python -u -c "
              import sys
              sys.stdout.write('step1: python ok\n'); sys.stdout.flush()
              import flask; sys.stdout.write('step2: flask ok\n'); sys.stdout.flush()
              import flask_socketio; sys.stdout.write('step3: flask_socketio ok\n'); sys.stdout.flush()
              import flask_migrate; sys.stdout.write('step4: flask_migrate ok\n'); sys.stdout.flush()
              import omegaconf; sys.stdout.write('step5: omegaconf ok\n'); sys.stdout.flush()
              from src.db_models import db; sys.stdout.write('step6: db_models ok\n'); sys.stdout.flush()
              from src.task_manager import TaskManager; sys.stdout.write('step7: task_manager ok\n'); sys.stdout.flush()
              from src.socket_events import CommonSocketEvents; sys.stdout.write('step8: socket_events ok\n'); sys.stdout.flush()
              from src.log_streamer import LogStreamer; sys.stdout.write('step9: log_streamer ok\n'); sys.stdout.flush()
              from src.app_factory import create_app; sys.stdout.write('step10: create_app imported\n'); sys.stdout.flush()
              sys.stdout.write('step11: calling create_app\n'); sys.stdout.flush()
              app, socketio, cfg = create_app('/app')
              sys.stdout.write('step12: create_app done - starting server\n'); sys.stdout.flush()
              socketio.run(app, host='0.0.0.0', port=5001, allow_unsafe_werkzeug=True)
              " 2>&1
          ports:
            - containerPort: 5001
          env:
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: anagnorisis-secret
                  key: FLASK_SECRET_KEY
            - name: RUNNING_IN_DOCKER
              value: "true"
            - name: CONTAINER_NAME
              value: "anagnorisis"
          volumeMounts:
            - name: config-yaml
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /config
            - name: media
              mountPath: /media
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config-yaml
          configMap:
            name: anagnorisis-config
        - name: data
          persistentVolumeClaim:
            claimName: anagnorisis-config
        - name: media
          persistentVolumeClaim:
            claimName: media-nfs
