apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sabnzbd
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: sabnzbd
          image: linuxserver/sabnzbd:5.0.3
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "America/Los_Angeles"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["ls", "/data"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # SABnzbd 5.x defaults to a ~1G article cache, so an active queue
          # blows past a 1Gi limit at startup. Once /incomplete became
          # persistent (#123) the queue resumed on every boot and the pod
          # OOM-looped 68 times; pre-#123 restarts wiped the queue, which
          # hid it. 12Gi gives cache + par2 repair + unpack real headroom.
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 12Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: data
          persistentVolumeClaim:
            claimName: media-nfs
