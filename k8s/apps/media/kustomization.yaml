apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - media-nfs-pv.yaml
  - media-nfs-pvc.yaml
  # --- *arr stack ---
  - lidarr-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - lidarr.yaml  # HelmRelease (app-template) — replaces deployment+service
  - lidarr-ui.yaml  # HelmRelease (app-template) — replaces deployment+service
  - bazarr-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - bazarr.yaml  # HelmRelease (app-template) — replaces deployment+service
  # bazarr-sync-job.yaml is intentionally NOT here — manual one-shot Job (TTL self-cleans)
  - subgen-models-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - subgen.yaml  # HelmRelease (app-template) — replaces deployment+service
  - prowlarr-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - prowlarr.yaml  # HelmRelease (app-template) — replaces deployment+service
  - sonarr-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - sonarr.yaml  # HelmRelease (app-template) — replaces deployment+service
  - radarr-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - radarr.yaml  # HelmRelease (app-template) — replaces deployment+service
  - flaresolverr.yaml  # HelmRelease (app-template) — replaces deployment+service
  # --- download clients ---
  - sabnzbd-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - sabnzbd.yaml  # HelmRelease (app-template) — replaces deployment+service
  - recyclarr-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - recyclarr.yaml  # HelmRelease (app-template) — replaces cronjob
  # --- request management ---
  - seerr-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - seerr.yaml  # HelmRelease (app-template) — replaces deployment+service
  - recommendarr-data-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - recommendarr.yaml  # HelmRelease (app-template) — replaces deployment+service
  # --- anagnorisis (music recommendation / rating) ---
  - anagnorisis-config-pvc.yaml
  - anagnorisis-config-map.yaml
  - anagnorisis-deployment.yaml
  - anagnorisis-service.yaml
  # --- media servers / tools ---
  - tunarr-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - tunarr.yaml  # HelmRelease (app-template) — replaces deployment+service
  - metube.yaml  # HelmRelease (app-template) — replaces deployment+service (no PVC; uses media-nfs)
  - medialyze-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - medialyze.yaml  # HelmRelease (app-template) — replaces deployment+service
  - storyteller-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - storyteller.yaml  # HelmRelease (app-template) — replaces deployment+service
  # --- tracking / watchlists ---
  - watcharr-data-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - watcharr.yaml  # HelmRelease (app-template) — replaces deployment+service
  - watchback-data-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - watchback.yaml  # HelmRelease (app-template) — replaces deployment+service
  # --- dashboard ---
  - homepage-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - homepage.yaml  # HelmRelease (app-template) — replaces deployment+service
  # --- file access ---
  - copyparty-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - copyparty.yaml  # HelmRelease (app-template) — replaces deployment+service
  # --- mealie + database ---
  - postgres-data-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - postgres.yaml  # HelmRelease (app-template) — replaces deployment+service
  - postgres-exporter.yaml  # HelmRelease (app-template) — replaces deployment+service
  - mealie-data-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - mealie.yaml  # HelmRelease (app-template) — replaces deployment+service
  # --- tdarr server + node ---
  - tdarr-pvc.yaml  # kept raw (data safety) — both HelmReleases bind via existingClaim (shared)
  - tdarr.yaml  # HelmRelease (app-template) — replaces tdarr-server deployment+service
  - tdarr-node.yaml  # HelmRelease (app-template) — replaces tdarr-node deployment (no service)
  # --- jellyfin (postgres backend; primary instance at jellyfin.arishaig.site) ---
  - jellyfin-pgsql-config-pvc.yaml  # kept raw (data safety) — HelmRelease binds via existingClaim
  - jellyfin-pgsql.yaml  # HelmRelease (app-template) — replaces deployment+service
  - ingress-routes.yaml

# Self-heal transient install/upgrade failures (e.g. helm-controller client
# rate-limiting during a large reconcile burst). Applies to every HelmRelease
# in this kustomization so individual files stay clean.
patches:
  - target:
      kind: HelmRelease
    patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: all
      spec:
        install:
          remediation:
            retries: 3
        upgrade:
          remediation:
            retries: 3
