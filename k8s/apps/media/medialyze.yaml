apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: medialyze
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      medialyze:
        strategy: Recreate
        containers:
          app:
            # ghcr.io/frederikemmer/medialyze:latest — rolling tag, no Renovate annotation.
            image:
              repository: ghcr.io/frederikemmer/medialyze
              tag: latest
            env:
              TZ: America/Los_Angeles
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            # 1Gi: 512Mi OOM-killed the scanner on large library passes.
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: medialyze
        type: NodePort
        ports:
          http:
            port: 8080
            targetPort: 8080
            nodePort: 30807
    persistence:
      config:
        existingClaim: medialyze-config
        advancedMounts:
          medialyze:
            app:
              - path: /config
      media:
        existingClaim: media-nfs
        advancedMounts:
          medialyze:
            app:
              - path: /media
                readOnly: true
