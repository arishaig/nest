apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      sonarr:
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
        containers:
          app:
            image:
              # renovate: datasource=docker depName=linuxserver/sonarr
              repository: linuxserver/sonarr
              tag: 4.0.19
            env:
              PUID: "0"
              PGID: "0"
              TZ: America/Los_Angeles
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["ls", "/data"]
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 15
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8989
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
          exportarr:
            image:
              # renovate: datasource=docker depName=ghcr.io/onedr0p/exportarr
              repository: ghcr.io/onedr0p/exportarr
              tag: v2.3.0
            args: ["sonarr"]
            env:
              PORT: "9707"
              URL: http://localhost:8989
              APIKEY:
                valueFrom:
                  secretKeyRef:
                    name: sonarr-api-key
                    key: APIKEY
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9707
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9707
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: sonarr
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: "192.168.1.116"
          metallb.io/allow-shared-ip: "metrics"
        ports:
          http:
            port: 8989
            targetPort: 8989
            nodePort: 30989
          metrics:
            port: 9707
            targetPort: 9707
            nodePort: 30707
    persistence:
      config:
        existingClaim: sonarr-config
        advancedMounts:
          sonarr:
            app:
              - path: /config
      data:
        existingClaim: media-nfs
        advancedMounts:
          sonarr:
            app:
              - path: /data
