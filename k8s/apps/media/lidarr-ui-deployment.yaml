apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr-ui
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lidarr-ui
  template:
    metadata:
      labels:
        app: lidarr-ui
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: lidarr-ui
          image: ghcr.io/arishaig/lidarr-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: LIDARR_UI_LIDARR_URL
              value: "http://lidarr:8686"
            - name: LIDARR_UI_LIDARR_KEY
              valueFrom:
                secretKeyRef:
                  name: lidarr-api-key
                  key: APIKEY
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
