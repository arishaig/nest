apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      postgres:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=postgres
              repository: postgres
              tag: "18.4"
            env:
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_PASSWORD
              PGUSER:
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_USER
              # PVC mounts at /var/lib/postgresql; the live DB lives in the
              # /data subdir of the PVC — must match exactly to find existing data.
              PGDATA: /var/lib/postgresql/data
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready"]
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["pg_isready"]
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: postgres
        ports:
          postgres:
            port: 5432
            targetPort: 5432
    persistence:
      data:
        existingClaim: postgres-data
        advancedMounts:
          postgres:
            app:
              - path: /var/lib/postgresql
