apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lidarr
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      lidarr:
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/linuxserver-labs/prarr versioning=regex:^lidarr-plugins-(?<major>\d+)\.(?<minor>\d+)\.\d+\.(?<patch>\d+)$
              repository: ghcr.io/linuxserver-labs/prarr
              tag: lidarr-plugins
            env:
              PUID: "0"
              PGID: "0"
              TZ: America/Los_Angeles
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8686
                  initialDelaySeconds: 30
                  periodSeconds: 60
                  timeoutSeconds: 15
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 8686
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
          exportarr:
            image:
              # renovate: datasource=docker depName=ghcr.io/onedr0p/exportarr
              repository: ghcr.io/onedr0p/exportarr
              tag: v2.3.0
            args: ["lidarr"]
            env:
              PORT: "9709"
              URL: http://localhost:8686
              APIKEY:
                valueFrom:
                  secretKeyRef:
                    name: lidarr-api-key
                    key: APIKEY
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9709
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9709
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: lidarr
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: "192.168.1.116"
          metallb.io/allow-shared-ip: "metrics"
        ports:
          http:
            port: 8686
            targetPort: 8686
            nodePort: 30686
          metrics:
            port: 9709
            targetPort: 9709
            nodePort: 30709
    persistence:
      config:
        existingClaim: lidarr-config
        advancedMounts:
          lidarr:
            app:
              - path: /config
      data:
        existingClaim: media-nfs
        advancedMounts:
          lidarr:
            app:
              - path: /data
