apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: copyparty
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      copyparty:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=copyparty/ac
              repository: copyparty/ac
              tag: 1.20.16
            args: ["--acao", "https://copyparty.arishaig.site"]
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: copyparty
        type: NodePort
        ports:
          http:
            port: 3923
            targetPort: 3923
            nodePort: 30806
    persistence:
      config:
        existingClaim: copyparty-config
        advancedMounts:
          copyparty:
            app:
              - path: /cfg
      media:
        existingClaim: media-nfs
        advancedMounts:
          copyparty:
            app:
              - path: /w
