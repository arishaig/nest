apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: recommendarr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: recommendarr
          image: tannermiddleton/recommendarr:v1.4.4
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /app/server/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: recommendarr-data
