apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.1.116"
    metallb.io/allow-shared-ip: "metrics"
spec:
  selector:
    app: bazarr
  ports:
    - name: http
      port: 6767
      targetPort: 6767
      nodePort: 30767
    - name: metrics
      port: 9711
      targetPort: 9711
      nodePort: 30711
  type: LoadBalancer
