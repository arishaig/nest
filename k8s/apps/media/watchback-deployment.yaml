apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchback
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchback
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: watchback
    spec:
      containers:
        - name: watchback
          image: ghcr.io/arishaig/watchback:latest
          securityContext:
            runAsUser: 0
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - containerPort: 8484
          volumeMounts:
            - name: data
              mountPath: /config
              subPath: config
            - name: data
              mountPath: /static
              subPath: static
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: watchback-data
