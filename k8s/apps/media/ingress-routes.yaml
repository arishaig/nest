---
# All media service IngressRoutes.
# Middleware references use namespace: traefik (cross-namespace, allowed by
# allowCrossNamespace: true in Traefik static config).
# tls: {} means Traefik uses the default TLSStore (wildcard *.arishaig.site cert).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: media
spec:
  entryPoints: [websecure]
  routes:
    - match: "Host(`sonarr.arishaig.site`)"
      kind: Rule
      middlewares:
        - name: authelia
          namespace: traefik
      services:
        - name: sonarr
          port: 8989
  tls: {}
