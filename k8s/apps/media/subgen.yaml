apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: subgen
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    # Pinned to alpha (nest.arishaig.site/workloads=general): the 4Gi memory
    # limit (whisper models) exceeds beta capacity, so it must never schedule
    # there once beta/delta are schedulable.
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nest.arishaig.site/workloads
                    operator: In
                    values: [general]
    controllers:
      subgen:
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
        containers:
          app:
            image:
              # renovate: datasource=docker depName=mccloud/subgen versioning=regex:^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)-cpu$
              repository: mccloud/subgen
              tag: 2026.06.6-cpu
            env:
              WEBHOOK_PORT: "9000"
              WHISPER_MODEL: medium
              WHISPER_THREADS: "4"
              NAMESUBLANG: en
              SKIP_ONLY_SUBGEN_SUBTITLES: "True"
              SKIP_IF_INTERNAL_SUBTITLES_LANGUAGE: ""
              DETECT_LANGUAGE_LENGTH: "30"
              DETECT_LANGUAGE_OFFSET: "60"
              SHOULD_WHISPER_DETECT_AUDIO_LANGUAGE: "True"
              TRANSCRIBE_OR_TRANSLATE: translate
              CONCURRENT_TRANSCRIPTIONS: "2"
              WORD_LEVEL_HIGHLIGHT: "False"
              DEBUG: "True"
              TRANSCRIBE_DEVICE: cpu
              SHOW_IN_SUBNAME_SUBGEN: "True"
              SHOW_IN_SUBNAME_MODEL: "True"
              MODEL_PATH: ./models
              UPDATE: "False"
              APPEND: "False"
              USE_MODEL_PROMPT: "False"
              CUSTOM_MODEL_PROMPT: ""
              LRC_FOR_AUDIO_FILES: "True"
              CUSTOM_REGROUP: "cm_sl=84_sl=42++++++1"
              HF_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: subgen-secrets
                    key: HF_TOKEN
            # subgen ran with no probes in the raw manifest — keep it that way
            # (webhook-driven worker, no health endpoint).
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
    service:
      app:
        controller: subgen
        ports:
          webhook:
            port: 9000
            targetPort: 9000
    persistence:
      models:
        existingClaim: subgen-models
        advancedMounts:
          subgen:
            app:
              - path: /subgen/models
      data:
        existingClaim: media-nfs
        advancedMounts:
          subgen:
            app:
              - path: /data
