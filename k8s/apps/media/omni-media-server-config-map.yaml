apiVersion: v1
kind: ConfigMap
metadata:
  name: omni-media-server-config
  namespace: media
data:
  nginx.conf: |
    events {}
    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;

      server {
        listen 8080;

        # No accounts — deliberately unauthenticated (no Authelia). Reachable
        # via https://omni-media.arishaig.site (Traefik, gated by the
        # local-only LAN IP allowlist middleware — see ingress-routes.yaml)
        # or directly via NodePort 30817, bypassing Traefik entirely.
        # Temporary: serves the omni-service GPU tool (see
        # anagnorisis/omni_service) with read-only, range-capable HTTP
        # access to the media share so it never needs an NFS mount itself.
        root /media;
        autoindex on;
        autoindex_format json;

        location / {
          add_header Accept-Ranges bytes always;
        }

        # Download page + bootstrap install scripts for the desktop app.
        location /get/ {
          alias /installer/;
          autoindex off;
          index index.html;
          default_type text/plain;
        }
      }
    }
