apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    # Prefer alpha (nest.arishaig.site/workloads=general): alpha has the most
    # headroom of the workers. Soft so it can still reschedule elsewhere if
    # alpha is unavailable.
    defaultPodOptions:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: nest.arishaig.site/workloads
                    operator: In
                    values: [general]
    controllers:
      bazarr:
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
        containers:
          app:
            image:
              # renovate: datasource=docker depName=linuxserver/bazarr
              repository: linuxserver/bazarr
              tag: 1.6.0
            env:
              PUID: "0"
              PGID: "0"
              TZ: America/Los_Angeles
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 6767
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 6767
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
          exportarr:
            image:
              # renovate: datasource=docker depName=ghcr.io/onedr0p/exportarr
              repository: ghcr.io/onedr0p/exportarr
              tag: v2.3.0
            args: ["bazarr"]
            env:
              PORT: "9711"
              URL: http://localhost:6767
              APIKEY:
                valueFrom:
                  secretKeyRef:
                    name: bazarr-api-key
                    key: APIKEY
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9711
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9711
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: bazarr
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: "192.168.1.116"
          metallb.io/allow-shared-ip: "metrics"
        ports:
          http:
            port: 6767
            targetPort: 6767
            nodePort: 30767
          metrics:
            port: 9711
            targetPort: 9711
            nodePort: 30711
    persistence:
      config:
        existingClaim: bazarr-config
        advancedMounts:
          bazarr:
            app:
              - path: /config
      data:
        existingClaim: media-nfs
        advancedMounts:
          bazarr:
            app:
              - path: /data
