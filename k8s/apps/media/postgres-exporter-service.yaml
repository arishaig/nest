apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: media
  annotations:
    metallb.io/loadBalancerIPs: "192.168.1.116"
    metallb.io/allow-shared-ip: "metrics"
spec:
  type: LoadBalancer
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187
      nodePort: 30187
