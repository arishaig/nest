apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recommendarr
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      recommendarr:
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
        containers:
          app:
            image:
              # renovate: datasource=docker depName=tannermiddleton/recommendarr
              repository: tannermiddleton/recommendarr
              tag: v1.4.4
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: recommendarr
        type: NodePort
        ports:
          http:
            port: 3000
            targetPort: 3000
            nodePort: 30809
    persistence:
      data:
        existingClaim: recommendarr-data
        advancedMounts:
          recommendarr:
            app:
              - path: /app/server/data
