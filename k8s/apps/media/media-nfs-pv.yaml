apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-nfs
spec:
  capacity:
    storage: 30Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.1.16
    path: /Tank/media_root
  mountOptions:
    - nfsvers=4.1
    - proto=tcp
  claimRef:
    namespace: media
    name: media-nfs
