apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: anagnorisis
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    # Pinned to alpha (nest.arishaig.site/workloads=general): the 6Gi memory
    # limit exceeds beta capacity, so it must never schedule there once
    # beta/delta are schedulable. See talos/patches/controlplane.yaml.
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nest.arishaig.site/workloads
                    operator: In
                    values: [general]
    controllers:
      anagnorisis:
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/arishaig/anagnorisis
              # Immutable sha tag from the docker-build workflow. Bump this to roll
              # out a new build — Flux reconciles the change from git (no kubectl).
              tag: sha-ae5bb21
              pullPolicy: IfNotPresent
            # Use sh wrapper so we can merge stderr→stdout (tracebacks land in
            # Loki); exec replaces sh with Python for clean PID 1 / signals.
            command: ["/bin/sh", "-c"]
            args:
              - "exec python -u app.py 2>&1"
            env:
              FLASK_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: anagnorisis-secret
                    key: FLASK_SECRET_KEY
              RUNNING_IN_DOCKER: "true"
              CONTAINER_NAME: anagnorisis
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 5001
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 5001
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 2Gi
              limits:
                cpu: "2"
                memory: 6Gi
    service:
      app:
        controller: anagnorisis
        ports:
          http:
            port: 5001
            targetPort: 5001
    persistence:
      config-yaml:
        type: configMap
        name: anagnorisis-config
        advancedMounts:
          anagnorisis:
            app:
              - path: /app/config.yaml
                subPath: config.yaml
                readOnly: true
      data:
        existingClaim: anagnorisis-config
        advancedMounts:
          anagnorisis:
            app:
              - path: /project_config
              - path: /app/models
                subPath: models
      media:
        existingClaim: media-nfs
        advancedMounts:
          anagnorisis:
            app:
              - path: /mnt
                readOnly: true
