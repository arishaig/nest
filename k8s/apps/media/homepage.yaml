apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    # Pinned to beta-rpi5 (nest.arishaig.site/workloads=rpi5): first real
    # workload trial on the Pi post-migration — stateless, low-consequence,
    # arm64-compatible. See talos/patches/worker-beta-rpi5.yaml.
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nest.arishaig.site/workloads
                    operator: In
                    values: [rpi5]
    controllers:
      homepage:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/gethomepage/homepage
              repository: ghcr.io/gethomepage/homepage
              tag: v1.4.5
            env:
              HOMEPAGE_ALLOWED_HOSTS: "dash.arishaig.site,localhost:3000"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: homepage
        type: NodePort
        ports:
          http:
            port: 3000
            targetPort: 3000
            nodePort: 30805
    persistence:
      config:
        existingClaim: homepage-config
        advancedMounts:
          homepage:
            app:
              - path: /app/config
      media:
        existingClaim: media-nfs
        advancedMounts:
          homepage:
            app:
              - path: /mnt/media_root
                readOnly: true
