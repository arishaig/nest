apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-exporter
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      postgres-exporter:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=prometheuscommunity/postgres-exporter
              repository: prometheuscommunity/postgres-exporter
              tag: v0.20.0
            # Original used DATA_SOURCE_NAME with $(VAR) interpolation, which
            # requires ordered env. app-template renders env from a sorted map,
            # so use the order-independent DATA_SOURCE_URI/USER/PASS form instead
            # (functionally identical — same user, same DB).
            env:
              DATA_SOURCE_URI: postgres.media.svc.cluster.local:5432/mealie?sslmode=disable
              DATA_SOURCE_USER:
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_USER
              DATA_SOURCE_PASS:
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_PASSWORD
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9187
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9187
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
    service:
      app:
        controller: postgres-exporter
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: "192.168.1.116"
          metallb.io/allow-shared-ip: "metrics"
        ports:
          metrics:
            port: 9187
            targetPort: 9187
            nodePort: 30187
