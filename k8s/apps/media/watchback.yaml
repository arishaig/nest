apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: watchback
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: watchback
      # renovate: datasource=docker depName=ghcr.io/arishaig/watchback
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: watchback
        namespace: flux-system
  values:
    service:
      type: NodePort
      port: 8484
      nodePort: 30804
    persistence:
      existingClaim: watchback-data
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
