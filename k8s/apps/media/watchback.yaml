apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: watchback
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: watchback
      # renovate: datasource=docker depName=ghcr.io/arishaig/watchback
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: watchback
        namespace: flux-system
  values:
    # ghcr.io/arishaig/watchback (own image, built in a separate repo) has no
    # arm64 build — pin off beta-rpi5 so it doesn't crash-loop there ("exec
    # format error") now that the Pi is schedulable. See
    # k8s/apps/media/homepage.yaml for the beta-rpi5 story.
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/arch: amd64
    service:
      type: NodePort
      port: 8484
      nodePort: 30804
    persistence:
      existingClaim: watchback-data
      subPath: data
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
