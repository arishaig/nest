apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metube
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      metube:
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
        containers:
          app:
            # ghcr.io/alexta69/metube:latest — rolling tag, no Renovate annotation.
            image:
              repository: ghcr.io/alexta69/metube
              tag: latest
            env:
              DOWNLOAD_DIR: /downloads
              TZ: America/Los_Angeles
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: metube
        type: NodePort
        ports:
          http:
            port: 8081
            targetPort: 8081
            nodePort: 30808
    persistence:
      media:
        existingClaim: media-nfs
        advancedMounts:
          metube:
            app:
              - path: /downloads
                subPath: downloads/metube
