apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin-pgsql
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    # Prefer alpha (nest.arishaig.site/workloads=general). Soft so it can
    # still reschedule if alpha is unavailable (delta is gone; the old "2Gi
    # fits delta" sizing rationale went with it).
    defaultPodOptions:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: nest.arishaig.site/workloads
                    operator: In
                    values: [general]
    controllers:
      jellyfin-pgsql:
        strategy: Recreate
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/jpvenson/jellyfin.pgsql
              repository: ghcr.io/jpvenson/jellyfin.pgsql
              tag: 10.11.8-1
            env:
              # Library DB lives in the shared `postgres` service (DB: jellyfin),
              # not a bundled instance — despite the image name.
              POSTGRES_HOST: postgres
              POSTGRES_PORT: "5432"
              POSTGRES_DB: jellyfin
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_USER
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: POSTGRES_PASSWORD
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8096
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8096
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: false
            # 4Gi: the 2Gi limit OOM-killed Jellyfin repeatedly during evening
            # streaming (3× on 2026-07-07 alone) — this is the Jellyfin server
            # itself despite the pgsql name, and transcode/stream buffers spike
            # past 2Gi under concurrent use.
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
    service:
      app:
        controller: jellyfin-pgsql
        type: NodePort
        ports:
          http:
            port: 8096
            targetPort: 8096
            nodePort: 30814
    persistence:
      config:
        existingClaim: jellyfin-pgsql-config
        advancedMounts:
          jellyfin-pgsql:
            app:
              - path: /config
      media:
        existingClaim: media-nfs
        advancedMounts:
          jellyfin-pgsql:
            app:
              - path: /data
                readOnly: true
