apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      recyclarr:
        type: cronjob
        cronjob:
          schedule: "0 */6 * * *"
          concurrencyPolicy: Forbid
        pod:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/recyclarr/recyclarr
              repository: ghcr.io/recyclarr/recyclarr
              tag: 7.3.0
            args: ["sync"]
            env:
              TZ: America/Los_Angeles
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        enabled: false
    persistence:
      config:
        existingClaim: recyclarr-config
        advancedMounts:
          recyclarr:
            app:
              - path: /config
