apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-ddns
  namespace: cloudflare-ddns
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      cloudflare-ddns:
        replicas: 1
        containers:
          app:
            image:
              repository: favonia/cloudflare-ddns
              tag: 1.16.2
            env:
              CF_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: cloudflare-ddns-token
                    key: CF_API_TOKEN
              DOMAINS: vpn.arishaig.site
              PROXIED: "false"
              TTL: "300"
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
