apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-mcp
  namespace: nest-mcp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nest-mcp
  template:
    metadata:
      labels:
        app: nest-mcp
    spec:
      serviceAccountName: nest-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # Copy SSH key secret (root-owned) to a writable emptyDir, chown to uid
      # 1000, and chmod 600 — required because OpenSSH rejects group-readable
      # keys and Secret volumes can't be chowned to non-root at mount time.
      initContainers:
        - name: setup-ssh
          image: busybox:stable
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              cp /ssh-secret/ansible-on-nest /ssh/ansible-on-nest &&
              chown 1000:1000 /ssh/ansible-on-nest &&
              chmod 600 /ssh/ansible-on-nest
          volumeMounts:
            - name: ssh-key-secret
              mountPath: /ssh-secret
              readOnly: true
            - name: ssh-key-writable
              mountPath: /ssh
      containers:
        - name: nest-mcp
          # NOTE: ghcr.io/arishaig/nest-mcp must be set to public visibility
          # at https://github.com/users/arishaig/packages/container/nest-mcp/settings
          # (no secrets are baked into the image — all secrets come from nest-mcp-secrets)
          image: ghcr.io/arishaig/nest-mcp:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8765
          envFrom:
            - secretRef:
                name: nest-mcp-secrets
          livenessProbe:
            tcpSocket:
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: ssh-key-writable
              mountPath: /home/app/.ssh
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: ssh-key-secret
          secret:
            secretName: nest-mcp-ssh-key
        - name: ssh-key-writable
          emptyDir: {}
