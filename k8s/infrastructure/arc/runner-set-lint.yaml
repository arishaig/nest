apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-lint
  namespace: arc-runners
spec:
  interval: 1h
  # CRDs (AutoscalingRunnerSet) ship with the controller chart — wait for it.
  dependsOn:
    - name: gha-runner-scale-set-controller
      namespace: arc-systems
  chart:
    spec:
      chart: gha-runner-scale-set
      version: 0.14.2
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  values:
    # Install name == runner scale set name == the `runs-on:` label in
    # .github/workflows/lint.yml.
    runnerScaleSetName: arc-lint
    githubConfigUrl: https://github.com/arishaig/nest
    # Point the manager RoleBinding at the controller's ServiceAccount
    # explicitly instead of relying on the chart's in-cluster Deployment
    # discovery (by label app.kubernetes.io/part-of=gha-rs-controller). The
    # name is <controller release>-gha-rs-controller in arc-systems — exactly
    # what discovery resolves to — so this is behaviour-preserving, removes a
    # runtime lookup, and lets the chart render offline for `flux-local test`.
    controllerServiceAccount:
      name: gha-runner-scale-set-controller-gha-rs-controller
      namespace: arc-systems
    # Pre-existing secret (key: github_token) created by
    # playbooks/provision/k8s.yml from vault_github_runner_pat.
    githubConfigSecret: arc-github-secret
    # Scale to zero when idle; burst up to 16 concurrent lint jobs.
    minRunners: 0
    maxRunners: 16
    # No lint job builds images, so default (non-dind) containerMode stays.
    template:
      spec:
        # ghcr.io/arishaig/nest-ci-runner is amd64-only (single-platform
        # image, no arm64 variant). beta-rpi5 became a general-purpose
        # schedulable worker as of the control-plane migration (2026-07-20,
        # Phase 2) — before that, both RPi5 nodes were control-plane-only
        # (NoSchedule) so this never mattered. Without this, roughly half of
        # ephemeral runner pods land on the arm64 node and fail immediately
        # ("exec format error"), which looked like ARC being "stuck" (churning
        # pods, queued jobs never completing) rather than a scheduling bug.
        nodeSelector:
          kubernetes.io/arch: amd64
        containers:
          - name: runner
            image: ghcr.io/arishaig/nest-ci-runner:latest
            command: ["/home/runner/run.sh"]
            # Lint jobs are short (≤~40s) and light, so requests are tiny: a
            # dozen-plus fit on alpha (the only schedulable amd64 node), which
            # has ~790m CPU free after existing workloads (12 × 50m = 600m).
            # With no CPU limit they burst on the otherwise-idle cores and
            # merely contend — slower, never failing — during a large batch.
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
