apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-lint
  namespace: arc-runners
spec:
  interval: 1h
  # CRDs (AutoscalingRunnerSet) ship with the controller chart — wait for it.
  dependsOn:
    - name: gha-runner-scale-set-controller
      namespace: arc-systems
  chart:
    spec:
      chart: gha-runner-scale-set
      version: 0.14.2
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  values:
    # Install name == runner scale set name == the `runs-on:` label in
    # .github/workflows/lint.yml.
    runnerScaleSetName: arc-lint
    githubConfigUrl: https://github.com/arishaig/nest
    # Pre-existing secret (key: github_token) created by
    # playbooks/provision/k8s.yml from vault_github_runner_pat.
    githubConfigSecret: arc-github-secret
    # Scale to zero when idle; burst up to 16 concurrent lint jobs.
    minRunners: 0
    maxRunners: 16
    # No lint job builds images, so default (non-dind) containerMode stays.
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/arishaig/nest-ci-runner:latest
            command: ["/home/runner/run.sh"]
            # Lint jobs are short (≤~40s) and light, so requests are tiny: a
            # dozen-plus fit on alpha (the only schedulable node — beta/delta
            # are control-plane NoSchedule), which has ~790m CPU free after
            # existing workloads (12 × 50m = 600m). With no CPU limit they
            # burst on the otherwise-idle cores and merely contend — slower,
            # never failing — during a large batch.
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
