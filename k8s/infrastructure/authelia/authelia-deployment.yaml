apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: authelia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authelia
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: authelia
    spec:
      enableServiceLinks: false
      containers:
        - name: authelia
          image: authelia/authelia:4.39.20
          command: ["authelia", "--config", "/etc/authelia/configuration.yml"]
          ports:
            - containerPort: 9091
            - containerPort: 9959
          envFrom:
            - secretRef:
                name: authelia-env-secret
          volumeMounts:
            - name: data
              mountPath: /config
            - name: authelia-config
              mountPath: /etc/authelia/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: authelia-users
              mountPath: /etc/authelia/users_database.yml
              subPath: users_database.yml
              readOnly: true
          # timeoutSeconds defaults to 1s — during the 2026-06-11 node memory
          # pressure that meant a kill every few minutes, taking auth (and
          # every forward-auth ingress route) down with it. A slow Authelia
          # beats no Authelia: allow 4 failures x 5s before restarting.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: authelia-data
        - name: authelia-config
          secret:
            secretName: authelia-config
        - name: authelia-users
          configMap:
            name: authelia-users
