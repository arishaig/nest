apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: authelia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.84.0
          env:
            - name: REDIS_ADDR
              value: "redis://redis.authelia.svc.cluster.local:6379"
          ports:
            - containerPort: 9121
