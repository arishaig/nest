# Recovery-side complement to rpi5-net-tuning: that DaemonSet tries to
# prevent the Pi 5 RP1/macb NIC from wedging under sustained traffic
# (siderolabs/sbc-raspberrypi#91) by disabling EEE/TSO/GSO up front, but if
# the link wedges anyway, nothing brings it back — flannel-watchdog only
# restarts the flannel pod, which can't help if the underlying link is down.
# This pings the gateway and bounces the interface after 3 consecutive
# failures, based on https://gist.github.com/serialx/8bf9e8eff425b1c7ddf1fa1d3785bbd0
# (adapted: configurable gateway, resource sizing, comments — code is ours).
#
# Talos v1.13.2+ (we're on v1.13.6) already carries lukaszraczylo's upstream
# macb kernel patches (siderolabs/pkgs#1526, #1546), which add a driver-level
# TX-stall detector that self-recovers most hangs in ~3s — so this is now
# defense-in-depth, not the primary mitigation. Two pieces below (IRQ
# affinity re-pin, kubeprism socket kill) are adapted from the DaemonSet
# lukaszraczylo still runs in production despite the kernel fix:
# https://github.com/siderolabs/sbc-raspberrypi/issues/91#issuecomment-4471965156
#
# Remove alongside rpi5-net-tuning once the upstream kernel fix is confirmed
# to fully eliminate the underlying race, not just auto-recover it.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rpi5-nic-watchdog
  namespace: kube-system
  labels:
    app.kubernetes.io/name: rpi5-nic-watchdog
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: rpi5-nic-watchdog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rpi5-nic-watchdog
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      tolerations:
        # The Pi nodes are control-plane only (allowSchedulingOnControlPlanes: false)
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      hostNetwork: true
      priorityClassName: system-node-critical
      containers:
        - name: watchdog
          image: alpine:3.24
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache iproute2 >/dev/null
              # Pi 5 onboard NIC; fall back to the first ethernet-ish
              # interface so a kernel rename doesn't break this.
              IFACE=end0
              [ -e "/sys/class/net/${IFACE}" ] || IFACE=$(ls /sys/class/net | grep -E '^(end|enp|eth)' | head -1)
              GATEWAY=192.168.1.1
              echo "nic-watchdog starting on ${NODE_NAME}, monitoring ${IFACE} via ${GATEWAY}"

              # Pin the NIC's IRQ off CPU0 so it doesn't contend with
              # everything else on the busiest core. Best-effort: harmless
              # if the driver doesn't expose a matching /proc/interrupts line.
              pin_irq() {
                IRQ=$(awk -v i="${IFACE}\$" '$0 ~ i {sub(/:/,"",$1); print $1; exit}' /proc/interrupts)
                [ -n "${IRQ}" ] && echo 8 > "/proc/irq/${IRQ}/smp_affinity" 2>/dev/null || true
              }
              pin_irq

              recover() {
                echo "$(date -u): ${IFACE} unreachable after 3 failed pings, bouncing link"
                ip link set "${IFACE}" down || true
                sleep 2
                ip link set "${IFACE}" up || true
                # Link down/up re-registers the IRQ and resets affinity to
                # default — re-pin it.
                pin_irq
                # Kubelet holds a long-lived TCP connection to the local
                # kubeprism proxy (127.0.0.1:7445); it doesn't notice the
                # link bounce on its own and can sit on a dead socket until
                # its own timeout. Force-close it so kubelet reconnects
                # immediately instead of silently stalling post-recovery.
                ss -K dst 127.0.0.1 dport = 7445 2>/dev/null || true
              }

              FAILS=0
              while true; do
                if ping -c1 -W2 "${GATEWAY}" >/dev/null 2>&1; then
                  FAILS=0
                else
                  FAILS=$((FAILS + 1))
                  echo "$(date -u): ping to ${GATEWAY} failed (${FAILS}/3)"
                  if [ "${FAILS}" -ge 3 ]; then
                    recover
                    FAILS=0
                    sleep 30
                    continue
                  fi
                fi
                sleep 10
              done
          resources:
            requests:
              cpu: 5m
              memory: 24Mi
            limits:
              memory: 64Mi
