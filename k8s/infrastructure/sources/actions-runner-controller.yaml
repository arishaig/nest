apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: actions-runner-controller
  namespace: flux-system
spec:
  # OCI registry — charts pulled as
  # oci://ghcr.io/actions/actions-runner-controller-charts/{gha-runner-scale-set-controller,gha-runner-scale-set}
  type: oci
  url: oci://ghcr.io/actions/actions-runner-controller-charts
  interval: 1h
