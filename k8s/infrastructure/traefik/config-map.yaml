apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: traefik
data:
  traefik.yml: |
    api:
      dashboard: true
      insecure: false

    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        address: ":443"
        proxyProtocol:
          trustedIPs:
            - "10.10.0.1/32"
        forwardedHeaders:
          trustedIPs:
            - "127.0.0.1/32"
            - "192.168.0.0/16"
        http:
          middlewares:
            - traefik-rate-limit@kubernetescrd

    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        allowExternalNameServices: true

    log:
      level: INFO

    accessLog:
      format: json
