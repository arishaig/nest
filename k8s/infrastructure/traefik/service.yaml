apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: traefik
  annotations:
    metallb.io/loadBalancerIPs: "192.168.1.117"
spec:
  type: LoadBalancer
  # Preserve the real client source IP (no SNAT) so the `local-only` ipAllowList
  # middleware sees the LAN client (192.168.0.0/16) instead of a SNAT'd pod IP,
  # which was causing 403s on local-only routes (tunarr, watcharr). Safe under
  # MetalLB L2: it only announces the VIP from a node with a ready traefik
  # endpoint, and traefik runs on the single schedulable node.
  externalTrafficPolicy: Local
  selector:
    app: traefik
  ports:
    - name: web
      port: 80
      targetPort: web
      protocol: TCP
    - name: websecure
      port: 443
      targetPort: websecure
      protocol: TCP
    - name: traefik
      port: 8080
      targetPort: traefik
      protocol: TCP
