# RPi5 control-plane node (8GB). Boots from SD card — u-boot on Pi5 cannot
# boot from NVMe yet (siderolabs/sbc-raspberrypi#23, confirmed 2026-07-17 on
# multiple drives, not a drive-compatibility issue). The M.2 NVMe is used as
# a data disk only once Linux is up. Replaces talos-delta-vm (VM 115) using
# the add-then-remove etcd flow rehearsed with gamma — see docs/rpi5-talos.md.
# Control-plane only: workloads stay on alpha (see controlplane-beta-vm.yaml).
cluster:
  allowSchedulingOnControlPlanes: false
  etcd:
    advertisedSubnets:
      - 192.168.1.0/24
  apiServer:
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
  controllerManager:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  scheduler:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

machine:
  install:
    disk: /dev/mmcblk0
    # Must be the Image Factory installer with the rpi_5 overlay — a plain
    # ghcr.io/siderolabs/installer would drop the Pi firmware/DTB on upgrade.
    # Renovate bumps this tag in lockstep with talos_version in
    # terraform/terraform.tfvars; CI cross-checks them.
    image: factory.talos.dev/installer/b01e4d4c84232eef19a4e5613ea847d99e9c080cd198273c18f7611fa41eed6f:v1.13.6
  network:
    interfaces:
      # Pi 5 onboard ethernet is end0 (RP1/macb), not eth0 like the Pi 4 —
      # select the only physical NIC instead of hardcoding the name.
      - deviceSelector:
          physical: true
        dhcp: false
        addresses:
          - 192.168.1.118/24
        vip:
          ip: 192.168.1.115
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    nameservers:
      - 192.168.7.7
      - 192.168.7.8
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.1.0/24
  time:
    servers:
      - 192.168.7.7
# Hostname lives in its own config document since Talos 1.13 — setting
# machine.network.hostname alongside it fails validation.
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: "off"
hostname: talos-gamma-rpi5
---
# Relocates EPHEMERAL (/var — etcd data, container images, kubelet state)
# onto the NVMe, off the SD card, since u-boot can't boot from NVMe but
# Talos's own kernel reads/writes it fine once booted (see comment above).
# Takes effect on first install since this node hasn't joined yet.
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  diskSelector:
    match: disk.transport == 'nvme' && !system_disk
