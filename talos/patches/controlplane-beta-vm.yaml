cluster:
  allowSchedulingOnControlPlanes: true
  etcd:
    advertisedSubnets:
      - 192.168.1.0/24

machine:
  network:
    interfaces:
      - interface: ens18
        dhcp: false
        addresses:
          - 192.168.1.111/24
        vip:
          ip: 192.168.1.115
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    nameservers:
      - 192.168.7.7
      - 192.168.7.8
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.1.0/24
  time:
    servers:
      - 192.168.7.7
