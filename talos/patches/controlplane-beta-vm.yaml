# Test control-plane VM (4GB): exists for control-plane HA only.
# Workloads stay on alpha — on 2026-06-11 the scheduler spread the media
# stack onto beta/gamma and both thrashed (memory ~100%, gamma re-reading
# 200MB/s of evicted page cache), crash-looping Authelia/MetalLB and
# stalling Loki on the shared NVMe.
cluster:
  allowSchedulingOnControlPlanes: false
  etcd:
    advertisedSubnets:
      - 192.168.1.0/24

machine:
  network:
    interfaces:
      - interface: ens18
        dhcp: false
        addresses:
          - 192.168.1.111/24
        vip:
          ip: 192.168.1.115
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    nameservers:
      - 192.168.7.7
      - 192.168.7.8
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.1.0/24
  time:
    servers:
      - 192.168.7.7
