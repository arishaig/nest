# Test control-plane VM (4GB). Schedulable as of 2026-06-15 to rehearse the
# multi-node topology before the RPi5s land. Workloads previously stayed on
# alpha — on 2026-06-11 the scheduler spread the media stack onto beta/gamma
# and both thrashed (memory ~100%, gamma re-reading 200MB/s of evicted page
# cache), crash-looping Authelia/MetalLB and stalling Loki on the shared NVMe.
# That risk is now contained by pinning the heavy/bursty pods to alpha
# (nest.arishaig.site/workloads=general in controlplane.yaml + nodeAffinity on
# the media HelmReleases), so only light services may land here.
# ROLLBACK: set this back to false and re-apply (talosctl patch mc) — the
# control-plane NoSchedule taint returns and roaming pods reschedule to alpha.
cluster:
  allowSchedulingOnControlPlanes: true
  etcd:
    advertisedSubnets:
      - 192.168.1.0/24
  apiServer:
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
  controllerManager:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  scheduler:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

machine:
  network:
    interfaces:
      - interface: ens18
        dhcp: false
        addresses:
          - 192.168.1.111/24
        vip:
          ip: 192.168.1.115
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    nameservers:
      - 192.168.7.7
      - 192.168.7.8
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.1.0/24
  time:
    servers:
      - 192.168.7.7
