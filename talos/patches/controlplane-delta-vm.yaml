# Test control-plane VM sized like an RPi5 (4 cores / 8GB): rehearses the
# node add/remove flow before the real Pis arrive. Schedulable as of
# 2026-06-15 to rehearse the multi-node topology; heavy/bursty pods are
# pinned to alpha so only light services land here (see controlplane-beta-vm.yaml).
# ROLLBACK: set this back to false and re-apply (talosctl patch mc).
cluster:
  allowSchedulingOnControlPlanes: true
  etcd:
    advertisedSubnets:
      - 192.168.1.0/24
  apiServer:
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
  controllerManager:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  scheduler:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

machine:
  network:
    interfaces:
      - interface: ens18
        dhcp: false
        addresses:
          - 192.168.1.114/24
        vip:
          ip: 192.168.1.115
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    nameservers:
      - 192.168.7.7
      - 192.168.7.8
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.1.0/24
  time:
    servers:
      - 192.168.7.7
