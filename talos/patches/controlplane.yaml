cluster:
  allowSchedulingOnControlPlanes: true
  etcd:
    advertisedSubnets:
      - 192.168.1.0/24
  apiServer:
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
  controllerManager:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  scheduler:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

machine:
  # alpha is the single workload node. Heavy/bursty pods (sabnzbd 12Gi,
  # anagnorisis 6Gi, subgen 4Gi, tdarr-node 4Gi, the DBs) are pinned here via
  # nodeAffinity. RPi5 nodes (beta/delta) will take lighter workloads once they
  # replace the temporary test VMs removed 2026-06-26.
  nodeLabels:
    nest.arishaig.site/workloads: general
  network:
    interfaces:
      - interface: ens18
        dhcp: false
        addresses:
          - 192.168.1.110/24
        vip:
          ip: 192.168.1.115
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    nameservers:
      - 192.168.7.7
      - 192.168.7.8
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.1.0/24
    extraArgs:
      # Reserve memory for kubelet/OS so pod pressure triggers eviction before
      # the OOM killer fires. Without this, kubelet itself was OOM-killed every
      # ~68 minutes on alpha (heavy AI workloads: sabnzbd 12Gi, anagnorisis 6Gi,
      # subgen 4Gi). Fixed long-term by reclaiming 12GB from beta/delta VMs
      # (2026-06-26), but eviction thresholds remain as a safety net.
      kube-reserved: memory=2Gi
      eviction-hard: memory.available<1Gi
  time:
    servers:
      - 192.168.7.7
