cluster:
  allowSchedulingOnControlPlanes: true
  etcd:
    advertisedSubnets:
      - 192.168.1.0/24
  apiServer:
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
  controllerManager:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  scheduler:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi

machine:
  # alpha is the large workload node. Heavy/bursty pods (sabnzbd 12Gi limit,
  # anagnorisis, tdarr, subgen, the DBs) are pinned here via nodeAffinity on
  # this label, so that when beta/delta become schedulable they only take the
  # light services — never the pods that thrashed the small nodes on
  # 2026-06-11 (see controlplane-beta-vm.yaml).
  nodeLabels:
    nest.arishaig.site/workloads: general
  network:
    interfaces:
      - interface: ens18
        dhcp: false
        addresses:
          - 192.168.1.110/24
        vip:
          ip: 192.168.1.115
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
    nameservers:
      - 192.168.7.7
      - 192.168.7.8
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.1.0/24
  time:
    servers:
      - 192.168.7.7
